<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KICKASS RECIPES</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Han+Sans&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f0e8;--red:#d42b2b;--orange:#e85d04;--yellow:#f9a825;--card:#111;--border:#252525;--muted:#555}
body{background:var(--black);color:var(--white);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:#2a2a2a}
.header{position:sticky;top:0;z-index:100;background:var(--black);border-bottom:1px solid var(--border);padding:0 24px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:20px;height:60px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--red);flex-shrink:0;cursor:pointer;user-select:none}
.logo span{color:var(--white)}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;background:#161616;border:1px solid var(--border);color:var(--white);font-family:'DM Mono',monospace;font-size:13px;padding:9px 16px 9px 36px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--red)}
.search-wrap input::placeholder{color:var(--muted)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.count-badge{font-size:11px;color:var(--muted);flex-shrink:0;white-space:nowrap}
.layout{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 60px)}
.sidebar{border-right:1px solid var(--border);padding:20px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}
.s-section{margin-bottom:22px}
.s-label{font-size:9px;letter-spacing:3px;color:var(--muted);padding:0 18px;margin-bottom:6px;text-transform:uppercase;display:block}
.f-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 18px;background:none;border:none;color:rgba(245,240,232,0.5);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;text-align:left;transition:all .15s}
.f-btn:hover{color:var(--white);background:#161616}
.f-btn.on{color:var(--red);background:#1a0000}
.f-btn .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;margin-right:7px;opacity:0}
.f-btn.on .dot{opacity:1}
.fl{display:flex;align-items:center}
.fc{font-size:10px;color:var(--muted)}
.vol-row{display:flex;gap:4px;padding:0 18px;margin-bottom:4px}
.v-btn{flex:1;padding:6px 4px;background:#161616;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;text-align:center}
.v-btn:hover{color:var(--white)}
.v-btn.on{background:var(--red);border-color:var(--red);color:var(--white)}
.main{padding:24px}
.hero{background:linear-gradient(135deg,#1a0000 0%,#0a0a0a 55%,#001500 100%);border:1px solid var(--border);padding:36px 40px;margin-bottom:28px;position:relative;overflow:hidden}
.hero::after{content:'KICKASS';position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:130px;color:rgba(212,43,43,0.05);line-height:1;pointer-events:none;letter-spacing:4px}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;line-height:1;margin-bottom:6px}
.hero h1 em{color:var(--red);font-style:normal}
.hero p{font-size:11px;color:var(--muted);letter-spacing:1px}
.stats{display:flex;gap:28px;margin-top:20px}
.sn{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--red);line-height:1}
.sl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.sec{margin-bottom:36px}
.cat-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.cat-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px}
.cat-line{flex:1;height:1px;background:var(--border)}
.cat-ct{font-size:10px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);padding:18px;cursor:pointer;transition:all .15s;position:relative}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .15s}
.card:hover{border-color:#333;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.card:hover::before{background:var(--red)}
.c-vol{font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:5px}
.c-name{font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:0.5px;line-height:1.25;margin-bottom:10px;color:var(--white)}
.c-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:9px;letter-spacing:1px;padding:2px 6px;border:1px solid;text-transform:uppercase}
.tag.pre{border-color:var(--yellow);color:var(--yellow)}
.tag.post{border-color:var(--orange);color:var(--orange)}
.tag.rec{border-color:#52b788;color:#52b788}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px)}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#111;border:1px solid #2a2a2a;max-width:660px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s}
.overlay.open .modal{transform:translateY(0)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:#2a2a2a}
.m-hdr{padding:26px 30px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#111;z-index:1}
.m-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.m-vol{font-size:9px;letter-spacing:2px;padding:2px 8px;background:var(--red);color:white}
.m-cat{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.m-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;line-height:1;color:var(--white);margin-bottom:10px}
.m-tags{display:flex;gap:5px;flex-wrap:wrap}
.m-close{position:absolute;top:18px;right:18px;background:none;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.m-close:hover{border-color:var(--red);color:var(--red)}
.m-body{padding:26px 30px}
.r-text{font-size:12px;line-height:1.85;color:#bbb;white-space:pre-wrap;font-family:'DM Mono',monospace}
.nores{text-align:center;padding:80px 20px;color:var(--muted)}
.nores-t{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;margin-bottom:8px;color:#222}
@media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border)}.hero{padding:24px}.hero h1{font-size:34px}.hero::after{font-size:70px}}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo" id="logoBtn">KICK<span>ASS</span></div>
    <div class="search-wrap">
      <span class="si">&#x2315;</span>
      <input type="text" id="searchInput" placeholder="Search 106 recipes..." autocomplete="off" spellcheck="false">
    </div>
    <div class="count-badge" id="countBadge">106 recipes</div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="s-section">
      <span class="s-label">Volume</span>
      <div class="vol-row">
        <button class="v-btn on" id="vbtn-all">ALL</button>
        <button class="v-btn" id="vbtn-1">VOL.1</button>
        <button class="v-btn" id="vbtn-2">VOL.2</button>
      </div>
    </div>
    <div class="s-section">
      <span class="s-label">Category</span>
      <button class="f-btn on" id="cbtn-all"><span class="fl"><span class="dot"></span>All</span><span class="fc">106</span></button>
      <button class="f-btn" id="cbtn-Breakfast"><span class="fl"><span class="dot"></span>Breakfast</span><span class="fc" id="cc-Breakfast">11</span></button>
      <button class="f-btn" id="cbtn-Dinner"><span class="fl"><span class="dot"></span>Dinner</span><span class="fc" id="cc-Dinner">36</span></button>
      <button class="f-btn" id="cbtn-Dessert"><span class="fl"><span class="dot"></span>Dessert</span><span class="fc" id="cc-Dessert">37</span></button>
      <button class="f-btn" id="cbtn-Snacks"><span class="fl"><span class="dot"></span>Snacks &amp; Sides</span><span class="fc" id="cc-Snacks">9</span></button>
      <button class="f-btn" id="cbtn-Sauces"><span class="fl"><span class="dot"></span>Sauces</span><span class="fc" id="cc-Sauces">14</span></button>
    </div>
    <div class="s-section">
      <span class="s-label">When to Eat</span>
      <button class="f-btn on" id="tbtn-all"><span class="fl"><span class="dot"></span>Any Time</span></button>
      <button class="f-btn" id="tbtn-PRE"><span class="fl"><span class="dot"></span>Pre-Workout</span></button>
      <button class="f-btn" id="tbtn-POST"><span class="fl"><span class="dot"></span>Post-Workout</span></button>
      <button class="f-btn" id="tbtn-REC"><span class="fl"><span class="dot"></span>Recovery</span></button>
    </div>
  </aside>
  <main class="main">
    <div class="hero">
      <h1>MADE WITH<br><em>REAL FOOD.</em></h1>
      <p>GUARANTEED TO BE KICKASS &nbsp;&middot;&nbsp; 106 RECIPES &nbsp;&middot;&nbsp; 2 VOLUMES</p>
      <div class="stats">
        <div><div class="sn">54</div><div class="sl">Vol. 1</div></div>
        <div><div class="sn">52</div><div class="sl">Vol. 2</div></div>
        <div><div class="sn">5</div><div class="sl">Categories</div></div>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="m-hdr">
      <button class="m-close" id="mClose">&#x2715;</button>
      <div class="m-meta"><span class="m-vol" id="mVol"></span><span class="m-cat" id="mCat"></span></div>
      <div class="m-title" id="mTitle"></div>
      <div class="m-tags" id="mTags"></div>
    </div>
    <div class="m-body"><div class="r-text" id="mText"></div></div>
  </div>
</div>

  var json = atob(b64);
  var RECIPES = JSON.parse(json);

  var CATS = ['Breakfast','Dinner','Dessert','Snacks & Sides','Sauces'];
  var CAT_IDS = ['Breakfast','Dinner','Dessert','Snacks','Sauces'];
  var st = {vol:'all', cat:'all', timing:'all', q:''};

  function tags(t){
    if(!t) return '';
    var m={PRE:'pre',POST:'post',RECOVERY:'rec'};
    var l={PRE:'Pre',POST:'Post',RECOVERY:'Recovery'};
    return t.split('/').map(function(x){return '<span class="tag '+(m[x]||'')+'">'+(l[x]||x)+'</span>';}).join('');
  }

  function hasTiming(r,t){
    if(t==='all') return true;
    if(!r.timing) return false;
    return r.timing.indexOf(t) !== -1;
  }

  function filtered(){
    var q=st.q.toLowerCase();
    return RECIPES.filter(function(r){
      if(st.vol!=='all' && r.volume!==st.vol) return false;
      if(st.cat!=='all' && r.category!==st.cat) return false;
      if(!hasTiming(r,st.timing)) return false;
      if(q && r.name.toLowerCase().indexOf(q)===-1 && r.text.toLowerCase().indexOf(q)===-1) return false;
      return true;
    });
  }

  function render(){
    var f=filtered();
    document.getElementById('countBadge').textContent=f.length+' recipe'+(f.length!==1?'s':'');
    var el=document.getElementById('content');
    if(!f.length){
      el.innerHTML='<div class="nores"><div class="nores-t">NO RECIPES FOUND</div><p>Adjust your search or filters</p></div>';
      return;
    }
    var cats=st.cat==='all'?CATS:[st.cat];
    var html='';
    cats.forEach(function(cat){
      var list=f.filter(function(r){return r.category===cat;});
      if(!list.length) return;
      html+='<div class="sec"><div class="cat-hdr"><div class="cat-title">'+cat.toUpperCase()+'</div><div class="cat-line"></div><div class="cat-ct">'+list.length+'</div></div><div class="grid">';
      list.forEach(function(r){
        var idx=RECIPES.indexOf(r);
        html+='<div class="card" data-idx="'+idx+'"><div class="c-vol">VOL. '+r.volume+'</div><div class="c-name">'+r.name+'</div><div class="c-tags">'+tags(r.timing)+'</div></div>';
      });
      html+='</div></div>';
    });
    el.innerHTML=html;
    el.querySelectorAll('.card').forEach(function(c){
      c.addEventListener('click',function(){openModal(parseInt(c.dataset.idx));});
    });
  }

  function setActive(prefix,ids,val){
    ids.forEach(function(x){
      var b=document.getElementById(prefix+x);
      if(b) b.classList.toggle('on',x===val);
    });
  }

  document.getElementById('vbtn-all').onclick=function(){st.vol='all';setActive('vbtn-',['all','1','2'],'all');render();};
  document.getElementById('vbtn-1').onclick=function(){st.vol=1;setActive('vbtn-',['all','1','2'],'1');render();};
  document.getElementById('vbtn-2').onclick=function(){st.vol=2;setActive('vbtn-',['all','1','2'],'2');render();};

  var catIds=['all','Breakfast','Dinner','Dessert','Snacks','Sauces'];
  var catVals=['all','Breakfast','Dinner','Dessert','Snacks & Sides','Sauces'];
  catIds.forEach(function(id,i){
    var b=document.getElementById('cbtn-'+id);
    if(b) b.onclick=function(){
      st.cat=catVals[i];
      setActive('cbtn-',catIds,id);
      render();
    };
  });

  var timIds=['all','PRE','POST','REC'];
  var timVals=['all','PRE','POST','RECOVERY'];
  timIds.forEach(function(id,i){
    var b=document.getElementById('tbtn-'+id);
    if(b) b.onclick=function(){
      st.timing=timVals[i];
      setActive('tbtn-',timIds,id);
      render();
    };
  });

  document.getElementById('searchInput').oninput=function(){
    st.q=this.value;
    render();
  };

  document.getElementById('logoBtn').onclick=function(){
    st={vol:'all',cat:'all',timing:'all',q:''};
    document.getElementById('searchInput').value='';
    setActive('vbtn-',['all','1','2'],'all');
    setActive('cbtn-',catIds,'all');
    setActive('tbtn-',timIds,'all');
    render();
  };

  function openModal(idx){
    var r=RECIPES[idx];
    document.getElementById('mVol').textContent='VOL. '+r.volume;
    document.getElementById('mCat').textContent=r.category;
    document.getElementById('mTitle').textContent=r.name;
    document.getElementById('mTags').innerHTML=tags(r.timing);
    document.getElementById('mText').textContent=r.text.replace(/\r/g,'').trim();
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow='hidden';
  }

  function closeModal(){
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow='';
  }

  document.getElementById('mClose').onclick=closeModal;
  document.getElementById('overlay').onclick=function(e){if(e.target===this)closeModal();};
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape') closeModal();
    if(e.key==='/' && document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('searchInput').focus();}
  });

  render();
})();
</script>
</body>
</html>
