 / R E C O V E R Y 2 5 M I N S 2 S E R V I N G S\nM F B G\n2 bananas\n3 large medjool dates\nWater or milk (for soaking dates)\n2 tbsp Honey\nPinch of Salt\ngreek yogurt (optional side)\n3. Add date sauce and honey:\nAfter flipping your bananas, add about half\nof your date sauce to the pan, topping\neach banana slice. Drizzle honey on top\nand cook for about 3 minutes until you feel\nlike the sauce has incorporated into your\nbananas.\n4. Plate it:\nAdd your bananas and the remaining sauce\nin the pan to a plate. Optional: sprinkle with\nsalt. Place a spoonful of greek yogurt with\nyour extra date sauce on top.","ingredients":"2 bananas\n3 large medjool dates\nWater or milk (for soaking dates)\n2 tbsp Honey\nPinch of Salt\ngreek yogurt (optional side)","instructions":"1. Soak dates:\nDeseed the dates and soak them in hot\nwater (or milk) for 15 minutes, then mash or\nblend into a caramel-like sauce.\n2. Cook bananas:\nHeat a pan with coconut oil on medium\nheat and add your cut bananas to the pan.\nWhen they have browned (1-2 minutes), flip\nthem.\n3. Add date sauce and honey:\nAfter flipping your bananas, add about half\nof your date sauce to the pan, topping\neach banana slice. Drizzle honey on top\nand cook for about 3 minutes until you feel\nlike the sauce has incorporated into your\nbananas.\n4. Plate it:\nAdd your bananas and the remaining sauce\nin the pan to a plate. Optional: sprinkle with\nsalt. Place a spoonful of greek yogurt with\nyour extra date sauce on top.","notes":""},{"name":"Cheesecake","category":"Dessert","volume":1,"timing":"POST/RECOVERY","text":"CHEESECAKE INSTRUCTIONS\n1. Preheat the oven to 350\u00b0F (175\u00b0C).\n2. Make the crust:\nAdd all crust ingredients to a food processor and blend until well\ncombined. If mixing by hand, combine thoroughly in a bowl (be\nprepared to mix well). Press the dough firmly into a springform\npan. It will be tough, so use some muscle to compact it evenly.\n3. Make the cheesecake filling:\nBlend all cheesecake filling ingredients in a blender until smooth.\nPour the mixture over the crust in the springform pan.\n4. Bake:\nBake for 28-30 minutes, or until set.\n \nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 3 g 7 g 2 0 g 1 9 1 P O S T / R E C O V E R Y 2 H R S 1 2 S E R V I N G S\nM F B G\nTHE CRUST:\n3 cups oat flour\n1/4 cup honey\n3 tablespoons coconut oil\n2 eggs\n1 teaspoon cinnamon\n1/2 teaspoon salt\nTHE CHEESECAKE FILLING:\n2 eggs\n2 cups greek yogurt (non-fat)\n2 cups cottage cheese (2%)\n1/4 cup maple syrup\n1 teaspoon vanilla extract\n1 teaspoon lemon zest (optional, for extra flavor)\nRASPBERRY SAUCE TOPPING (OPTIONAL):\n2 cups frozen raspberries\n2 tablespoons honey\n5. Cool gradually (to prevent cracking):\nTurn off the oven and crack the oven door open. Let the\ncheesecake sit inside for 30 minutes before removing it.\n6. Refrigerate:\nOnce cooled, transfer the cheesecake to the fridge to\nchill completely.\n7. Make the raspberry sauce (optional):\nIn a saucepan over high heat, combine frozen\nraspberries and honey. Cook, stirring, until the mixture\nthickens into a jam-like texture. Let it cool slightly\nbefore topping the cheesecake.","ingredients":"THE CRUST:\n3 cups oat flour\n1/4 cup honey\n3 tablespoons coconut oil\n2 eggs\n1 teaspoon cinnamon\n1/2 teaspoon salt\nTHE CHEESECAKE FILLING:\n2 eggs\n2 cups greek yogurt (non-fat)\n2 cups cottage cheese (2%)\n1/4 cup maple syrup\n1 teaspoon vanilla extract\n1 teaspoon lemon zest (optional, for extra flavor)\nRASPBERRY SAUCE TOPPING (OPTIONAL):\n2 cups frozen raspberries\n2 tablespoons honey","instructions":"1. Preheat the oven to 350\u00b0F (175\u00b0C).\n2. Make the crust:\nAdd all crust ingredients to a food processor and blend until well\ncombined. If mixing by hand, combine thoroughly in a bowl (be\nprepared to mix well). Press the dough firmly into a springform\npan. It will be tough, so use some muscle to compact it evenly.\n3. Make the cheesecake filling:\nBlend all cheesecake filling ingredients in a blender until smooth.\nPour the mixture over the crust in the springform pan.\n4. Bake:\nBake for 28-30 minutes, or until set.\n5. Cool gradually (to prevent cracking):\nTurn off the oven and crack the oven door open. Let the\ncheesecake sit inside for 30 minutes before removing it.\n6. Refrigerate:\nOnce cooled, transfer the cheesecake to the fridge to\nchill completely.\n7. Make the raspberry sauce (optional):\nIn a saucepan over high heat, combine frozen\nraspberries and honey. Cook, stirring, until the mixture\nthickens into a jam-like texture. Let it cool slightly\nbefore topping the cheesecake.","notes":""},{"name":"Cheesecake Cups","category":"Dessert","volume":1,"timing":"POST/RECOVERY","text":"CHEESECAKE CUPS INSTRUCTIONS 1. Make the Base:\nMix all base layer ingredients in a bowl. Shape into small\ncups on a parchment-lined tray. Throw in the freezer to\nharden while you make the filling.\n2. Make the Filling:\nBlend cottage cheese, greek yogurt, vanilla, and maple\nsyrup until smooth. Pour into the cups. Freeze until firm\n(about 20 minutes).\n3. Make the Chocolate Sauce:\nMix cocoa powder, melted coconut oil, and maple syrup\nuntil smooth.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 4 g 4 g 2 3 g 1 8 7 P O S T / R E C O V E R Y 5 0 M I N S 6 S E R V I N G S\nBASE LAYER:\n1 cup oat flour\n2 tbsp honey\n1/2 tsp pure vanilla extract\n1/2 cup greek yogurt (non-fat)\n1 scoop vanilla protein powder (\u22481/3 cup)\nPinch of salt (optional: cinnamon)\nCHEESECAKE FILLING:\n1/2 cup cottage cheese (low-fat or any type)\n1/2 cup greek yogurt (non-fat)\n1/2 tsp vanilla extract\n1 tbsp maple syrup\nCHOCOLATE SAUCE:\n2 tbsp unsweetened cocoa powder\n1 tbsp melted coconut oil\n1 tsp maple syrup\nM F B G\n4. Assemble:\nOnce the cheesecake cups are firm, drizzle with\nchocolate sauce. Return to the freezer to set\n(about 20 mins).\n5. Eat & Store:\nEat and store the rest in the fridge.\nNotes:\nIf the mixture is too dry and won\u2019t come together,\nadd 1 tablespoon of yogurt at a time until it forms\na dough ball.","ingredients":"BASE LAYER:\n1 cup oat flour\n2 tbsp honey\n1/2 tsp pure vanilla extract\n1/2 cup greek yogurt (non-fat)\n1 scoop vanilla protein powder (\u22481/3 cup)\nPinch of salt (optional: cinnamon)\nCHEESECAKE FILLING:\n1/2 cup cottage cheese (low-fat or any type)\n1/2 cup greek yogurt (non-fat)\n1/2 tsp vanilla extract\n1 tbsp maple syrup\nCHOCOLATE SAUCE:\n2 tbsp unsweetened cocoa powder\n1 tbsp melted coconut oil\n1 tsp maple syrup","instructions":"CHEESECAKE CUPS INSTRUCTIONS 1. Make the Base:\nMix all base layer ingredients in a bowl. Shape into small\ncups on a parchment-lined tray. Throw in the freezer to\nharden while you make the filling.\n2. Make the Filling:\nBlend cottage cheese, greek yogurt, vanilla, and maple\nsyrup until smooth. Pour into the cups. Freeze until firm\n(about 20 minutes).\n3. Make the Chocolate Sauce:\nMix cocoa powder, melted coconut oil, and maple syrup\nuntil smooth.\n4. Assemble:\nOnce the cheesecake cups are firm, drizzle with\nchocolate sauce. Return to the freezer to set\n(about 20 mins).\n5. Eat & Store:\nEat and store the rest in the fridge.","notes":"If the mixture is too dry and won\u2019t come together,\nadd 1 tablespoon of yogurt at a time until it forms\na dough ball."},{"name":"Chocolate Chips","category":"Dessert","volume":1,"timing":"PRE","text":"CHOCOLATE CHIPS INSTRUCTIONS\n1. Mix all the ingredients together.\nIt should be a thick texture, if it isn\u2019t,\nadd more cocoa powder and adjust its\nsweetness with the maple syrup.\n2. Freeze for a few hours until solid.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 2 g 1 2 g 5 g 1 2 7 R E C O V E R Y 2 0 M I N S 2 0 S E R V I N G S\nM F B G\n1 cup coconut oil\n2 cups unsweetened cocoa powder\n1/4 cup maple syrup\nPinch of salt\n3. Cut the block of chocolate into\npieces with a sharp knife.\n4. Store in the fridge or freezer\nafter using.","ingredients":"1 cup coconut oil\n2 cups unsweetened cocoa powder\n1/4 cup maple syrup\nPinch of salt","instructions":"1. Mix all the ingredients together.\nIt should be a thick texture, if it isn\u2019t,\nadd more cocoa powder and adjust its\nsweetness with the maple syrup.\n2. Freeze for a few hours until solid.\n3. Cut the block of chocolate into\npieces with a sharp knife.\n4. Store in the fridge or freezer\nafter using.","notes":""},{"name":"Chocolate Coconut Balls","category":"Dessert","volume":1,"timing":"PRE/POST","text":"CHOCOLATE COCONUT BALLS INSTRUCTIONS 3. Form the Balls:\nRoll the chilled mixture into balls and place\non parchment paper. Chill again (15-20\nmins).\n4. Dip the Balls:\nCoat each ball in chocolate sauce.\n5. Finish & Store:\nLet the chocolate set until firm, then enjoy!\nStore leftovers in the fridge to keep them\nfresh.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 7 g 9 g 5 g 1 3 0 P O S T / R E C O V E R Y 3 5 M I N S 1 5 S E R V I N G S\nM F B G\n1 cup greek yogurt\n2.5 scoops vanilla protein powder\n1.5 cups shredded coconut\nOptional: honey (for extra sweetness)\nTHE CHOCOLATE COATING:\n1 cup cocoa powder\n1/2 cup coconut oil (melted)\n1/4 cup maple syrup\n1. Mix the Coconut Ball Base:\nCombine greek yogurt, protein powder,\nshredded coconut, and honey (if using).\nChill in the freezer (just firm enough to\nroll!).\n2. Make the Chocolate Sauce:\nMix cocoa powder, melted coconut oil,\nand maple syrup. Adjust to taste if\nneeded.","ingredients":"1 cup greek yogurt","instructions":"CHOCOLATE COCONUT BALLS INSTRUCTIONS 3. Form the Balls:\nRoll the chilled mixture into balls and place\non parchment paper. Chill again (15-20\nmins).\n4. Dip the Balls:\nCoat each ball in chocolate sauce.\n5. Finish & Store:\nLet the chocolate set until firm, then enjoy!\nStore leftovers in the fridge to keep them\nfresh.\n2.5 scoops vanilla protein powder\n1.5 cups shredded coconut\nOptional: honey (for extra sweetness)\nTHE CHOCOLATE COATING:\n1 cup cocoa powder\n1/2 cup coconut oil (melted)\n1/4 cup maple syrup\n1. Mix the Coconut Ball Base:\nCombine greek yogurt, protein powder,\nshredded coconut, and honey (if using).\nChill in the freezer (just firm enough to\nroll!).\n2. Make the Chocolate Sauce:\nMix cocoa powder, melted coconut oil,\nand maple syrup. Adjust to taste if\nneeded.","notes":""},{"name":"Chocolate-Covered Strawberries","category":"Dessert","volume":1,"timing":"PRE","text":"CHOCOLATE-COVERED STRAWBERRIES INSTRUCTIONS\n1. Wash and dry the strawberries\nthoroughly. Any moisture will prevent the\nchocolate from sticking.\n2. In a bowl, whisk together the melted\ncoconut oil, cocoa powder, and maple\nsyrup until smooth.\n3. Dip each strawberry into the chocolate\nmixture, coating it evenly.\n4. Place the dipped strawberries on a\nparchment-lined tray.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S . 8 g 5 g 2 g 5 9 R E C O V E R Y 1 5 M I N S 2 0 S E R V I N G S\n20 strawberries\nCHOCOLATE SAUCE:\n1/2 cup coconut oil (melted)\n1 cup unsweetened cocoa powder\n2 tbsp maple syrup\nM F B G\n5. Refrigerate or freeze for 2\u20135 minutes\nuntil the chocolate hardens.\nNotes:\nIf the sauce is too thick, add more\ncoconut oil. Also, if you have leftover\nchocolate sauce, you can store it in the\nfreezer. Once frozen, cut it up to make\nhomemade chocolate chips.\nYou can add protein powder to the\nchocolate sauce to increase protein.","ingredients":"20 strawberries\nCHOCOLATE SAUCE:\n1/2 cup coconut oil (melted)\n1 cup unsweetened cocoa powder\n2 tbsp maple syrup","instructions":"1. Wash and dry the strawberries\nthoroughly. Any moisture will prevent the\nchocolate from sticking.\n2. In a bowl, whisk together the melted\ncoconut oil, cocoa powder, and maple\nsyrup until smooth.\n3. Dip each strawberry into the chocolate\nmixture, coating it evenly.\n4. Place the dipped strawberries on a\nparchment-lined tray.\n5. Refrigerate or freeze for 2\u20135 minutes\nuntil the chocolate hardens.","notes":"If the sauce is too thick, add more\ncoconut oil. Also, if you have leftover\nchocolate sauce, you can store it in the\nfreezer. Once frozen, cut it up to make\nhomemade chocolate chips.\nYou can add protein powder to the\nchocolate sauce to increase protein."},{"name":"Date Caramel Apple Cake","category":"Dessert","volume":1,"timing":"PRE/POST","text":"DATE CARAMEL APPLE CAKE INSTRUCTIONS\n1. Preheat the Oven:\nPreheat to 350\u00b0F (175\u00b0C).\n2. Make Date Caramel:\nSoak dates in warm milk (or water) until\nsoft, then mash into a caramel-like\npaste. Add a pinch of salt.\n3. Cook Apples:\nChop apples and cook in a pan on\nmedium-high heat with cinnamon and a\npinch of salt. Add half the caramel and\nmix until coated and tender.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 5 g 2 g 6 6 g 3 1 3 P R E / R E C O V E R Y 1 H R 7 S E R V I N G S\nM F B G\n20 pitted dates\n2 apples\n1 cup milk (or water)\n1 1/2 cups oat flour\n1 tbsp cinnamon\nSalt\nHoney (for topping)\n4. Make Dough:\nCombine oat flour with the remaining\ncaramel sauce to form a dough. Reserve\nsome for the top crust.\n5. Assemble:\nPress most of the dough into a greased\ncake pan, spread the apple mixture on top,\nand crumble the reserved dough over it.\n6. Bake & cool:\nBake at 350\u00b0F (175\u00b0C) for 40 minutes. Let it\ncool and drizzle with honey before serving.","ingredients":"20 pitted dates\n2 apples\n1 cup milk (or water)\n1 1/2 cups oat flour\n1 tbsp cinnamon\nSalt\nHoney (for topping)","instructions":"1. Preheat the Oven:\nPreheat to 350\u00b0F (175\u00b0C).\n2. Make Date Caramel:\nSoak dates in warm milk (or water) until\nsoft, then mash into a caramel-like\npaste. Add a pinch of salt.\n3. Cook Apples:\nChop apples and cook in a pan on\nmedium-high heat with cinnamon and a\npinch of salt. Add half the caramel and\nmix until coated and tender.\n4. Make Dough:\nCombine oat flour with the remaining\ncaramel sauce to form a dough. Reserve\nsome for the top crust.\n5. Assemble:\nPress most of the dough into a greased\ncake pan, spread the apple mixture on top,\nand crumble the reserved dough over it.\n6. Bake & cool:\nBake at 350\u00b0F (175\u00b0C) for 40 minutes. Let it\ncool and drizzle with honey before serving.","notes":""},{"name":"Dippity-Doo-Das","category":"Dessert","volume":1,"timing":"POST","text":"D IPP ITY-DOO-DAS INSTRUCTIONS\n1. Mix greek yogurt, protein powder (or\nhoney), and berries in a bowl.\n2. Form into 6 globs on parchment paper\nand freeze for 30 minutes.\n3. Make Chocolate Sauce:\nMelt coconut oil and mix in cocoa powder\nuntil smooth. Make sure the chocolate is\ncooled before dipping.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 9 g 5 g 7 g 1 5 6 P O S T / R E C O V E R Y 3 5 M I N S 6 S E R V I N G S\nM F B G\n1 cup greek yogurt (low-fat, the\nbrand Fage works well)\n1 scoop vanilla protein powder (or\n2 tbsp honey)\n1.5 cup berries\nCHOCOLATE SAUCE\n1/2 cup coconut oil\n1 cup unsweetened cocoa powder\nOptional: a dash of maple syrup\nfor sweetness\n4. Dip frozen yogurt globs into the chocolate\nsauce. It will harden instantly.\nNotes:\nThey are best to eat right after you dip them.\nIf you have leftover chocolate sauce, freeze it\nand cut it up later for MFBG chocolate\nchips.","ingredients":"1 cup greek yogurt (low-fat, the\nbrand Fage works well)\n1 scoop vanilla protein powder (or\n2 tbsp honey)","instructions":"1. Mix greek yogurt, protein powder (or\nhoney), and berries in a bowl.\n2. Form into 6 globs on parchment paper\nand freeze for 30 minutes.\n3. Make Chocolate Sauce:\nMelt coconut oil and mix in cocoa powder\nuntil smooth. Make sure the chocolate is\ncooled before dipping.\n1.5 cup berries\nCHOCOLATE SAUCE\n1/2 cup coconut oil\n1 cup unsweetened cocoa powder\nOptional: a dash of maple syrup\nfor sweetness\n4. Dip frozen yogurt globs into the chocolate\nsauce. It will harden instantly.","notes":"They are best to eat right after you dip them.\nIf you have leftover chocolate sauce, freeze it\nand cut it up later for  chocolate\nchips."},{"name":"Marshmallows","category":"Dessert","volume":1,"timing":"PRE","text":"MARSHMALLOWS INSTRUCTIONS\n1. Prepare the Gelatin:\nIn a mixing bowl, combine 1/4 cup warm\nwater and 2 tablespoons gelatin. Stir until\ndissolved.\n2. Prepare the Syrup:\nIn a saucepan over medium heat, mix the\nremaining 1/4 cup water, 1/2 cup honey, and a\npinch of salt. Bring to a boil, stirring\ncontinuously, and let it boil for about 5\nminutes.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 g 0 g 7 g 3 0 P R E - W O R K O U T 4 5 M I N S 2 0 S E R V I N G S\nM F B G\n 1/2 cup water, divided\n 2 tbsp grass-fed beef gelatin\n 1/2 cup honey\n 1/2 tsp vanilla extract\n A shake of cinnamon\n A pinch of salt\n3. Combine and Whip:\nCarefully pour the hot syrup into the gelatin\nmixture. Add 1/2 teaspoon vanilla extract and\na shake of cinnamon. Using a mixer, start on\nlow speed to combine, then increase to high\nand whip for approximately 8 minutes, until\nthe mixture forms stiff peaks.\n4. Set the Marshmallows:\nQuickly transfer the fluffy mixture into a\nparchment-lined container, spreading it evenly.\nRefrigerate for about 30 minutes to set.\n5. Cut and Serve:\nOnce set, remove from the container and cut\ninto 20 pieces. Store them in the fridge.","ingredients":"1/2 cup water, divided\n2 tbsp grass-fed beef gelatin\n1/2 cup honey\n1/2 tsp vanilla extract\nA shake of cinnamon\nA pinch of salt","instructions":"1. Prepare the Gelatin:\nIn a mixing bowl, combine 1/4 cup warm\nwater and 2 tablespoons gelatin. Stir until\ndissolved.\n2. Prepare the Syrup:\nIn a saucepan over medium heat, mix the\nremaining 1/4 cup water, 1/2 cup honey, and a\npinch of salt. Bring to a boil, stirring\ncontinuously, and let it boil for about 5\nminutes.\n3. Combine and Whip:\nCarefully pour the hot syrup into the gelatin\nmixture. Add 1/2 teaspoon vanilla extract and\na shake of cinnamon. Using a mixer, start on\nlow speed to combine, then increase to high\nand whip for approximately 8 minutes, until\nthe mixture forms stiff peaks.\n4. Set the Marshmallows:\nQuickly transfer the fluffy mixture into a\nparchment-lined container, spreading it evenly.\nRefrigerate for about 30 minutes to set.\n5. Cut and Serve:\nOnce set, remove from the container and cut\ninto 20 pieces. Store them in the fridge.","notes":""},{"name":"Peppermint Cheesecake","category":"Dessert","volume":1,"timing":"POST/RECOVERY","text":"P R O T E I N F A T C A R B S C A L O R I E S 1 5 g 1 0 g 2 8 g 2 6 4 PEPPERMINT CHEESECAKE INSTRUCTIONS\n1. Preheat the oven to 350\u00b0F (175\u00b0C).\n2. Make the Chocolate Crust:\nIn a bowl, combine oat flour, eggs, melted coconut oil, honey,\ncocoa powder, and a pinch of salt. Mix until well combined,\nthen press firmly into the bottom of a springform pan to form\nthe crust. If the mixture isn\u2019t fully coming together, add water 1\nteaspoon at a time until it combines, or add a touch more\ncoconut oil or honey to help it bind.\n3. Prepare the Cheesecake Filling:\nIn a blender or food processor, blend cottage cheese, greek\nyogurt, eggs, maple syrup, vanilla extract, and peppermint\nextract until smooth and creamy. Start with 1/2 teaspoon\npeppermint extract and adjust to taste if needed. Pour the\nfilling evenly over the crust.\nINGREDIENTS P O S T / R E C O V E R Y 1 H R 3 0 M I N S 1 2 S E R V I N G S\nM F B G\nCHOCOLATE CRUST\n2 cups oat flour\n2 eggs\n3 tbsp coconut oil\n1/4 cup honey\n1/2 cup cocoa powder\nPinch of salt\nCHEESECAKE FILLING\n2 eggs\n2 cups cottage cheese (non-fat or any type)\n2 cups greek yogurt (2% or any type)\n1/4 cup maple syrup\n1/2 teaspoon peppermint extract\n1 tsp pure vanilla extract\nPinch of salt\nCHOCOLATE FROSTING\n1/2 cup coconut cream (from can)\n2 tbsp unsweetened cocoa powder\n2 tbsp maple syrup\nPinch of salt\n4. Bake:\nPlace the cheesecake in the oven and bake for 28-30 minutes,\nuntil the center is mostly set. Crack the oven door open\nslightly and let the cheesecake cool inside for 30 minutes.\n5. Make the chocolate frosting:\nWhile the cheesecake bakes, whisk together coconut cream,\ncocoa powder, maple syrup, and salt until smooth and thick.\nPlace in the fridge to chill and thicken.\n6. Chill:\nRemove from the oven and place the cake in the refrigerator\nto chill for a few hours, or until fully set.","ingredients":"CHOCOLATE CRUST\n2 cups oat flour\n2 eggs\n3 tbsp coconut oil\n1/4 cup honey\n1/2 cup cocoa powder\nPinch of salt\nCHEESECAKE FILLING\n2 eggs\n2 cups cottage cheese (non-fat or any type)\n2 cups greek yogurt (2% or any type)\n1/4 cup maple syrup\n1/2 teaspoon peppermint extract\n1 tsp pure vanilla extract\nPinch of salt\nCHOCOLATE FROSTING\n1/2 cup coconut cream (from can)\n2 tbsp unsweetened cocoa powder\n2 tbsp maple syrup\nPinch of salt","instructions":"1. Preheat the oven to 350\u00b0F (175\u00b0C).\n2. Make the Chocolate Crust:\nIn a bowl, combine oat flour, eggs, melted coconut oil, honey,\ncocoa powder, and a pinch of salt. Mix until well combined,\nthen press firmly into the bottom of a springform pan to form\nthe crust. If the mixture isn\u2019t fully coming together, add water 1\nteaspoon at a time until it combines, or add a touch more\ncoconut oil or honey to help it bind.\n3. Prepare the Cheesecake Filling:\nIn a blender or food processor, blend cottage cheese, greek\nyogurt, eggs, maple syrup, vanilla extract, and peppermint\nextract until smooth and creamy. Start with 1/2 teaspoon\npeppermint extract and adjust to taste if needed. Pour the\nfilling evenly over the crust.\n4. Bake:\nPlace the cheesecake in the oven and bake for 28-30 minutes,\nuntil the center is mostly set. Crack the oven door open\nslightly and let the cheesecake cool inside for 30 minutes.\n5. Make the chocolate frosting:\nWhile the cheesecake bakes, whisk together coconut cream,\ncocoa powder, maple syrup, and salt until smooth and thick.\nPlace in the fridge to chill and thicken.\n6. Chill:\nRemove from the oven and place the cake in the refrigerator\nto chill for a few hours, or until fully set.","notes":""},{"name":"Protein Bars","category":"Dessert","volume":1,"timing":"RECOVERY","text":"PROTEIN BARS INSTRUCTIONS INGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 7 g 1 4 g 1 2 g 1 9 9 R E C O V E R Y 2 0 M I N S 1 5 S E R V I N G S\nM F B G\nBARS\n1 1/2 cups oat flour\n1/2 cup peanut butter\n1 1/2 scoops vanilla protein powder\n1/4 cup melted coconut oil\n2 tbsp honey\nPinch of salt\nTHE CHOCOLATE TOPPING\n1/3 cup coconut oil\n1/2 cup unsweetened cocoa powder\nSprinkle of salt\nHoney (optional, for topping)\n1. Mix:\nOat flour, peanut butter, protein powder, melted\ncoconut oil, and honey. Combine until smooth.\n2. Shape Bars:\nPlace the mixture into a square 9x9 baking dish\nlined with parchment paper. Press down evenly\nto form a dough-like base.\n3. Make Chocolate Topping:\nIn a separate bowl, mix melted coconut oil and\ncocoa powder until smooth. Pour over the\nprotein bar base and spread evenly.\n4. Top, Freeze & Cut:\nDrizzle with honey and sprinkle with a\npinch of salt. Freeze for 15 minutes until\nthe chocolate sets. Then, cut into squares\nand place it back in the freezer (so you\ndon\u2019t have to cut it when it\u2019s fully frozen\nand really hard).\nNotes:\nIf it\u2019s really dry, you can add a little bit of\nwater or more honey to get a better\ntexture. (you can half this with water or\nadd more honey to lower fat content)","ingredients":"PROTEIN BARS INSTRUCTIONS\nBARS\n1 1/2 cups oat flour\n1/2 cup peanut butter\n1 1/2 scoops vanilla protein powder\n1/4 cup melted coconut oil\n2 tbsp honey\nPinch of salt\nTHE CHOCOLATE TOPPING\n1/3 cup coconut oil\n1/2 cup unsweetened cocoa powder\nSprinkle of salt\nHoney (optional, for topping)","instructions":"1. Mix:\nOat flour, peanut butter, protein powder, melted\ncoconut oil, and honey. Combine until smooth.\n2. Shape Bars:\nPlace the mixture into a square 9x9 baking dish\nlined with parchment paper. Press down evenly\nto form a dough-like base.\n3. Make Chocolate Topping:\nIn a separate bowl, mix melted coconut oil and\ncocoa powder until smooth. Pour over the\nprotein bar base and spread evenly.\n4. Top, Freeze & Cut:\nDrizzle with honey and sprinkle with a\npinch of salt. Freeze for 15 minutes until\nthe chocolate sets. Then, cut into squares\nand place it back in the freezer (so you\ndon\u2019t have to cut it when it\u2019s fully frozen\nand really hard).","notes":"If it\u2019s really dry, you can add a little bit of\nwater or more honey to get a better\ntexture. (you can half this with water or\nadd more honey to lower fat content)"},{"name":"Protein Bars No. 2","category":"Dessert","volume":1,"timing":"POST/RECOVERY","text":"PROTEIN BARS NO.2 INSTRUCTIONS INGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 1 g 1 0 g 2 0 g 2 2 5 P O S T / R E C O V E R Y 2 0 M I N S 1 2 S E R V I N G S\nM F B G\nBARS\n 1 1/2 cups oat flour\n 1/2 cup peanut butter\n 2 scoops protein powder\n 3/4 cup greek yogurt (non-fat)\n 1/4 cup + 1 tbsp honey\nCHOCOLATE TOPPING\n 1/4 cup melted coconut oil\n1/2 cup cocoa powder\n2 tbsp maple syrup\nPinch of salt\nADDITIONAL TOPPINGS\nFlaky salt & honey\n1. Mix:\nOat flour, peanut butter, protein powder, greek\nyogurt, honey and salt. Combine until smooth.\n2. Shape Bars:\nPlace the mixture into a square 9x9 baking dish\nlined with parchment paper. Press down evenly to\nform a dough-like base. Keep some extra dough for\ntopping (optional).\n3. Make Chocolate Topping:\nIn a separate bowl, mix melted coconut oil, cocoa\npowder, and maple syrup until smooth. Pour over\nthe protein bar base and spread evenly.\n4. Top, Freeze & Cut:\nDrizzle with honey and sprinkle with a pinch\nof salt. Freeze for 15 minutes until the\nchocolate sets. Then, cut into squares and\nplace it back in the freezer (so you don\u2019t\nhave to cut it when it\u2019s fully frozen and really\nhard).\nNotes:\nYou can customize these based on what\nyour goals are. Cut the calories down and\nlower the fat by removing some of the\npeanut butter adding more greek yogurt,\noats, or honey. Mix and match ingredients to\nget the right texture and flavor.","ingredients":"PROTEIN BARS NO.2 INSTRUCTIONS\nBARS\n1 1/2 cups oat flour\n1/2 cup peanut butter\n2 scoops protein powder\n3/4 cup greek yogurt (non-fat)\n1/4 cup + 1 tbsp honey\nCHOCOLATE TOPPING\n1/4 cup melted coconut oil\n1/2 cup cocoa powder\n2 tbsp maple syrup\nPinch of salt\nADDITIONAL TOPPINGS\nFlaky salt & honey","instructions":"1. Mix:\nOat flour, peanut butter, protein powder, greek\nyogurt, honey and salt. Combine until smooth.\n2. Shape Bars:\nPlace the mixture into a square 9x9 baking dish\nlined with parchment paper. Press down evenly to\nform a dough-like base. Keep some extra dough for\ntopping (optional).\n3. Make Chocolate Topping:\nIn a separate bowl, mix melted coconut oil, cocoa\npowder, and maple syrup until smooth. Pour over\nthe protein bar base and spread evenly.\n4. Top, Freeze & Cut:\nDrizzle with honey and sprinkle with a pinch\nof salt. Freeze for 15 minutes until the\nchocolate sets. Then, cut into squares and\nplace it back in the freezer (so you don\u2019t\nhave to cut it when it\u2019s fully frozen and really\nhard).","notes":"You can customize these based on what\nyour goals are. Cut the calories down and\nlower the fat by removing some of the\npeanut butter adding more greek yogurt,\noats, or honey. Mix and match ingredients to\nget the right texture and flavor."},{"name":"Chocolate Caramel Cookies","category":"Dessert","volume":1,"timing":"PRE/POST","text":"P R O T E I N F A T C A R B S C A L O R I E S 7 g 2 g 1 7 g 1 2 3 CHOCOLATE CARAMEL COOKIES INSTRUCTIONS INGREDIENTS P R E & P O S T 3 0 M I N S 1 5 S E R V I N G S M F B G COOKIE BASE\n1.5 cups oat flour\n2 scoops protein powder (~3/4 cup-chocolate or\nvanilla)\n1/2 cup cocoa powder\n3/4 cup greek yogurt (non-fat)\n3 tbsp maple syrup (add a little more if it\u2019s dry)\nShake of salt\nCARAMEL\n4 Medjool dates\n1 medium banana\n1/4 cup water (or milk)\nCHOCOLATE SAUCE\n2 tbsp cocoa powder\n1 tbsp coconut oil (melted)\n1. Make the Caramel:\nSoak dates and banana in hot water for 15\nminutes, then blend until smooth.\n2. Make the Cookie Base:\nAdd the oat flour, protein powder, cocoa\npowder, greek yogurt, maple syrup, and salt\ninto a food processor until it forms a dough.\n3. Shape the cookies & add caramel:\nRoll dough into balls and press small divots with a tsp in\nthe center. Add a the caramel into each divot.\n4. Top with Chocolate Sauce and chill:\nMix cocoa powder and melted coconut oil. Make sure it\u2019s\ncooled then drizzle over the cookies. \n5. Chill:\nRefrigerate until the chocolate sets (just a few minutes).\nChill longer to allow the caramel to fully set. Store them\nin the fridge to keep firm.","ingredients":"COOKIE BASE\n1.5 cups oat flour\n2 scoops protein powder (~3/4 cup, chocolate or vanilla)\n1/2 cup cocoa powder\n3/4 cup greek yogurt (non-fat)\n3 tbsp maple syrup (add a little more if dry)\nShake of salt\n\nCARAMEL\n4 Medjool dates\n1 medium banana\n1/4 cup water (or milk)\n\nCHOCOLATE SAUCE\n2 tbsp cocoa powder\n1 tbsp coconut oil (melted)","instructions":"1. Make the Caramel: Soak dates and banana in hot water for 15 minutes, then blend until smooth. Set aside.\n2. Make the Cookie Base: Mix oat flour, protein powder, cocoa powder, greek yogurt, maple syrup, and salt until a dough forms.\n3. Shape into 15 cookies and place on a parchment-lined baking sheet.\n4. Press a small indent in each cookie and fill with caramel.\n5. Make the Chocolate Sauce: Mix cocoa powder and melted coconut oil.\n6. Drizzle chocolate sauce over cookies.\n7. Freeze for 30 minutes or refrigerate for 1 hour before serving.","notes":"Store in freezer or fridge."},{"name":"Chocolate Chip Cookies","category":"Dessert","volume":1,"timing":"PRE/POST","text":"CHOCOLATE CHIP COOKIES INSTRUCTIONS\n1. Make the MFBG Chocolate Chips:\nIn a small bowl, mix the melted coconut oil\nwith the unsweetened cocoa powder until\nwell combined.\nPlace the mixture in the freezer until set (30\nmins or less).\n2. Preheat the oven to 350\u00b0F (175\u00b0C).\n3. Make the Cookie Dough:\nIn a bowl, combine protein powder, oat\nflour, almond flour, and salt. Mix well.\nAdd peanut butter, milk, and maple syrup;\nmix until combined.\nFold in the honey.\n \nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 2 g 1 2 g 1 6 g 2 0 8 R E C O V E R Y 3 5 M I N S 1 0 S E R V I N G S\nM F B G\n1 cup vanilla protein powder (\u22483 scoops)\n1 1/4 cup oat flour\n3/4 cup almond flour\n1/4 cup peanut butter\n1/4 cup + 3 tbsp milk (2% or any type)\n1/4 cup maple syrup\n1/4 cup honey\nPinch of Salt\n1/3 cup Chocolate Chips\nMFBG CHOCOLATE CHIPS:\n2 Tbsp coconut oil\n5 Tbsp unsweetened cocoa powder\n4. Prepare the Chocolate Chips:\nOnce the chocolate mixture has hardened in\nthe freezer, remove it and chop it into small\npieces to create your MFBG chocolate\nchips. Add to the mixture immediately.\n5. Combine and Bake:\nFold the MFBG chocolate chips into the\ncookie dough.\nScoop dough into 10 balls and place on a\nlined baking sheet.\nBake for 7 minutes. Do not over-bake \u2014 pull\nthem out while still softened.\nNOTES\nIf the dough feels too dry, add extra milk 1\nteaspoon at a time. Remove cookies from the\noven while they\u2019re soft to keep them from\ndrying out.","ingredients":"1 cup vanilla protein powder (\u22483 scoops)\n1 1/4 cup oat flour\n3/4 cup almond flour\n1/4 cup peanut butter\n1/4 cup + 3 tbsp milk (2% or any type)\n1/4 cup maple syrup\n1/4 cup honey\nPinch of Salt\n1/3 cup Chocolate Chips\nCHOCOLATE CHIPS:\n2 Tbsp coconut oil\n5 Tbsp unsweetened cocoa powder","instructions":"1. Make the  Chocolate Chips:\nIn a small bowl, mix the melted coconut oil\nwith the unsweetened cocoa powder until\nwell combined.\nPlace the mixture in the freezer until set (30\nmins or less).\n2. Preheat the oven to 350\u00b0F (175\u00b0C).\n3. Make the Cookie Dough:\nIn a bowl, combine protein powder, oat\nflour, almond flour, and salt. Mix well.\nAdd peanut butter, milk, and maple syrup;\nmix until combined.\nFold in the honey.\n4. Prepare the Chocolate Chips:\nOnce the chocolate mixture has hardened in\nthe freezer, remove it and chop it into small\npieces to create your  chocolate\nchips. Add to the mixture immediately.\n5. Combine and Bake:\nFold the  chocolate chips into the\ncookie dough.\nScoop dough into 10 balls and place on a\nlined baking sheet.\nBake for 7 minutes. Do not over-bake \u2014 pull\nthem out while still softened.\nNOTES\nIf the dough feels too dry, add extra milk 1\nteaspoon at a time. Remove cookies from the\noven while they\u2019re soft to keep them from\ndrying out.","notes":""},{"name":"Raspberry Cheesecake Brownies","category":"Dessert","volume":1,"timing":"POST/RECOVERY","text":"RASPBERRY CHEESECAKE BROWNIES INSTRUCTIONS INGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 1 g 1 0 g 2 0 g 2 1 4 P O S T / R E C O V E R Y 1 H R 1 5 M I N S 1 2 S E R V I N G S\nM F B G\nBROWNIE LAYER:\n1 1/2 cups baked sweet potato (or a\ncan of pumpkin)\n1 scoop protein powder (vanilla or\nchocolate)\n1/4 cup peanut butter\n1/2 cup cocoa powder\n3/4 cup oat flour\n3/4 cup chocolate chips (MFBG\nchocolate chips pg. 38)\nPinch of salt\nOptional: 2 tbsp maple syrup for more\nsweetness & texture.\nCHEESECAKE LAYER:\n1 egg\n1 cup cottage cheese (low-fat)\n1 cup greek yogurt (non-fat)\n3 tbsp maple syrup\nShake of cinnamon\nRASPBERRY SAUCE:\n2 cups raspberries\n2 tbsp honey\n1. Preheat the oven to 350\u00b0F (176\u00b0C):\nWrap sweet potato in foil and bake until\ncompletely tender (35-40 mins).\n2. Mix Brownie Batter:\nStir all brownie layer ingredients until smooth.\nSpread into a 9\u00d79 baking dish.\n3. Blend Cheesecake Layer:\nBlend all cheesecake ingredients and pour over\nthe brownie batter. Spread evenly.\n4. Bake:\nBake for 20-25 minutes, then cool for an hour\nbefore chilling in the fridge.\n5. Make Raspberry Sauce:\nAdd and mix raspberries and honey in a pan on\nhigh heat until jammy. Let it cool in the fridge.\n6. Assemble:\nPour raspberry sauce over the cooled brownies,\nspread it out, and serve.\nNotes:\nMix the base well\u2014KA chips melt in (due to the\nwarmth of the sweet potato) and keep it moist.\nIf it\u2019s dry, add a bit of maple syrup.","ingredients":"RASPBERRY CHEESECAKE BROWNIES INSTRUCTIONS\nBROWNIE LAYER:\n1 1/2 cups baked sweet potato (or a\ncan of pumpkin)\n1 scoop protein powder (vanilla or\nchocolate)\n1/4 cup peanut butter\n1/2 cup cocoa powder\n3/4 cup oat flour\n3/4 cup chocolate chips (\nchocolate chips pg. 38)\nPinch of salt\nOptional: 2 tbsp maple syrup for more\nsweetness & texture.\nCHEESECAKE LAYER:\n1 egg\n1 cup cottage cheese (low-fat)\n1 cup greek yogurt (non-fat)\n3 tbsp maple syrup\nShake of cinnamon\nRASPBERRY SAUCE:\n2 cups raspberries\n2 tbsp honey","instructions":"1. Preheat the oven to 350\u00b0F (176\u00b0C):\nWrap sweet potato in foil and bake until\ncompletely tender (35-40 mins).\n2. Mix Brownie Batter:\nStir all brownie layer ingredients until smooth.\nSpread into a 9\u00d79 baking dish.\n3. Blend Cheesecake Layer:\nBlend all cheesecake ingredients and pour over\nthe brownie batter. Spread evenly.\n4. Bake:\nBake for 20-25 minutes, then cool for an hour\nbefore chilling in the fridge.\n5. Make Raspberry Sauce:\nAdd and mix raspberries and honey in a pan on\nhigh heat until jammy. Let it cool in the fridge.\n6. Assemble:\nPour raspberry sauce over the cooled brownies,\nspread it out, and serve.","notes":"Mix the base well\u2014KA chips melt in (due to the\nwarmth of the sweet potato) and keep it moist.\nIf it\u2019s dry, add a bit of maple syrup."},{"name":"Chicken Chips","category":"Snacks & Sides","volume":1,"timing":"POST","text":"CHICKEN CHIPS INSTRUCTIONS\n4. Bake for 20 minutes.\n5. Broil for 2-3 minutes until\ncrispy.\nNotes:\nMFBG Chicken Chips pair\nwell with the MFBG 7-\nLayer Dip.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 6 g 1 g . 2 g 3 7 P O S T / R E C O V E R Y 4 5 M I N S 2 0 S E R V I N G S\nM F B G\n1 lb cooked shredded chicken\n2 eggs\n1/4 cup parmesan\n1 tsp paprika\n1 tsp chili powder\n1/2 tsp onion powder\n1/2 tsp garlic powder\n1/2 tsp salt\n1/2 tsp pepper\n1. Preheat oven to 400\u00b0F.\n2. Mix all ingredients together in a bowl.\n3. Shape small portions of the mixture\non a parchment-lined baking sheet and\nflatten. Top each with a little parmesan.","ingredients":"1 lb cooked shredded chicken\n2 eggs\n1/4 cup parmesan\n1 tsp paprika\n1 tsp chili powder\n1/2 tsp onion powder\n1/2 tsp garlic powder\n1/2 tsp salt\n1/2 tsp pepper","instructions":"4. Bake for 20 minutes.\n5. Broil for 2-3 minutes until\ncrispy.","notes":"Chicken Chips pair\nwell with the  7-\nLayer Dip.\n1. Preheat oven to 400\u00b0F.\n2. Mix all ingredients together in a bowl.\n3. Shape small portions of the mixture\non a parchment-lined baking sheet and\nflatten. Top each with a little parmesan."},{"name":"Cottage Cheese Chips","category":"Snacks & Sides","volume":1,"timing":"POST","text":"COTTAGE CHEESE CHIPS INSTRUCTIONS\n1. Preheat the oven to 350\u00b0F\n(175\u00b0C).\n2. Line a baking sheet with\nparchment paper.\n3. Spoon the cottage cheese into\nindividual portions (about 15\nspoonfuls/balls) and place them on\nthe parchment-lined baking sheet.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 2 8 g 5 g 6 g 1 6 0 P O S T / R E C O V E R Y 4 0 M I N S 1 S E R V I N G\n1 cup cottage cheese 2% (Good\nCulture works well)\nSeasonings:\n(paprika, garlic powder, onion\npowder, Everything But The\nBagel, etc.)\nM F B G\n4. Add your desired seasonings on\ntop of each portion of cottage\ncheese.\n5. Bake for 30-35 minutes, keeping\nan eye on them to avoid burning.\n6. Let them cool slightly before\npeeling them off of the parchment\npaper.","ingredients":"1 cup cottage cheese 2% (Good\nCulture works well)\nSeasonings:\n(paprika, garlic powder, onion\npowder, Everything But The\nBagel, etc.)","instructions":"1. Preheat the oven to 350\u00b0F\n(175\u00b0C).\n2. Line a baking sheet with\nparchment paper.\n3. Spoon the cottage cheese into\nindividual portions (about 15\nspoonfuls/balls) and place them on\nthe parchment-lined baking sheet.\n4. Add your desired seasonings on\ntop of each portion of cottage\ncheese.\n5. Bake for 30-35 minutes, keeping\nan eye on them to avoid burning.\n6. Let them cool slightly before\npeeling them off of the parchment\npaper.","notes":""},{"name":"Cucumber Salad","category":"Snacks & Sides","volume":1,"timing":"RECOVERY","text":"CUCUMBER SALAD INSTRUCTIONS\n1. Make the Sauce:\nBlend all sauce ingredients until smooth\nand creamy. Adjust spice as needed. If the\nsauce is too thin, mix in a little more greek\nyogurt after blending or let it rest in the\nfridge to thicken.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 6 g . 3 g 8 g 5 9 P O S T / R E C O V E R Y 1 5 M I N S 4 S E R V I N G S\nM F B G\nCUCUMBER MIXTURE\n2 cucumbers, sliced\n1/2 shallot (topping, optional)\nRed pepper flakes (topping)\nMFBG RED PEPPER SAUCE\n3/4 cup greek yogurt (non-fat)\n1/2 red bell pepper\n1/2 jalape\u00f1o (adjust for spice preference)\n2 cloves garlic\n2 tsp apple cider vinegar\nJuice of 1/2 lime (~1 tsp)\nGenerous amount of paprika\nChili powder, to taste\nSalt, to taste\n2. Assemble the Salad:\nAdd sliced cucumbers to a bowl. Mix in the\nMFBG Spicy Red Pepper Sauce until the\ncucumbers are coated (you\u2019ll have extra\nsauce left, store it in the fridge for later). Top\nwith red pepper flakes and shallots.","ingredients":"CUCUMBER MIXTURE\n2 cucumbers, sliced\n1/2 shallot (topping, optional)\nRed pepper flakes (topping)\nRED PEPPER SAUCE\n3/4 cup greek yogurt (non-fat)\n1/2 red bell pepper\n1/2 jalape\u00f1o (adjust for spice preference)\n2 cloves garlic\n2 tsp apple cider vinegar\nJuice of 1/2 lime (~1 tsp)\nGenerous amount of paprika\nChili powder, to taste\nSalt, to taste","instructions":"1. Make the Sauce:\nBlend all sauce ingredients until smooth\nand creamy. Adjust spice as needed. If the\nsauce is too thin, mix in a little more greek\nyogurt after blending or let it rest in the\nfridge to thicken.\n2. Assemble the Salad:\nAdd sliced cucumbers to a bowl. Mix in the\nSpicy Red Pepper Sauce until the\ncucumbers are coated (you\u2019ll have extra\nsauce left, store it in the fridge for later). Top\nwith red pepper flakes and shallots.","notes":""},{"name":"Edamame Hummus","category":"Snacks & Sides","volume":1,"timing":"RECOVERY","text":"EDAMAME HUMMUS INSTRUCTIONS\n1. Boil edamame until soft and rinse\nchickpeas.\n2. Blend or food process edamame,\nchickpeas, tahini, lemon juice,\ngarlic, cumin, paprika, and salt until\nsmooth\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 8 g 1 1 g 7 g 1 4 3 P O S T / R E C O V E R Y 3 0 M I N S 8 S E R V I N G S\n1 1/2 cups edamame (boiled until soft)\n1 can chickpeas (about 1 1/2 cups\ncooked, drained and rinsed)\n1/3 cup tahini\n1/4 cup lemon juice\n1 tbsp olive oil (add more if desired)\n3 garlic cloves\n1 1/2 tsp cumin\n1 tsp paprika\n3/4 tsp salt\n1/4\u20131 cup cold water (start with 1/4,\nadd more if needed)\nOPTIONAL TOPPINGS\nOlive oil\nPaprika\nSesame seeds\nM F B G\n3. Add cold water gradually for\ndesired consistency.","ingredients":"1 1/2 cups edamame (boiled until soft)\n1 can chickpeas (about 1 1/2 cups cooked, drained and rinsed)\n1/3 cup tahini\n1/4 cup lemon juice\n1 tbsp olive oil (add more if desired)\n3 garlic cloves\n1 1/2 tsp cumin\n1 tsp paprika\n3/4 tsp salt\n1/4\u20131 cup cold water (start with 1/4, add more as needed)","instructions":"1. Boil edamame until soft and rinse chickpeas.\n2. Blend or food process edamame, chickpeas, tahini, lemon juice, garlic, cumin, paprika, and salt until smooth.\n3. Stream in cold water a little at a time until desired consistency.\n4. Taste and adjust seasoning.","notes":""},{"name":"Apple Cider Vinegar Sauce","category":"Sauces","volume":1,"timing":"","text":"APPLE CIDER VINEGAR SAUCE INSTRUCTIONS\n1. Blend all ingredients together until\nsmooth and creamy.\n2. Taste and adjust sweetness with\nhoney or tanginess with lemon and\nvinegar.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 6 g 1 g 1 0 g 7 5 P O S T / R E C O V E R Y 1 5 M I N S 4 S E R V I N G S\n1/2 cup greek yogurt (non-fat)\n1/2 cup cottage cheese (4% or\nany type)\n1 garlic clove\n1 tbsp + 1 tsp honey\n1 tbsp apple cider vinegar\nJuice of 1 lemon\n1/4 tsp paprika\nSalt & pepper, to taste\nM F B G\nNotes:\nThis sauce is perfect for the\nMFBG Apple Cider Vinegar\nSalad and MFBG Flatbread.","ingredients":"1/2 cup greek yogurt (non-fat)\n1/2 cup cottage cheese (4% or\nany type)\n1 garlic clove\n1 tbsp + 1 tsp honey\n1 tbsp apple cider vinegar\nJuice of 1 lemon\n1/4 tsp paprika\nSalt & pepper, to taste\nNotes:\nThis sauce is perfect for the\nApple Cider Vinegar\nSalad and  Flatbread.","instructions":"1. Blend all ingredients together until\nsmooth and creamy.\n2. Taste and adjust sweetness with\nhoney or tanginess with lemon and\nvinegar.","notes":""},{"name":"Blueberry Tzatziki","category":"Sauces","volume":1,"timing":"","text":"INSTRUCTIONS\n1 large cucumber\n1 cup blueberries\n2 cups greek yogurt (nonfat)\n1/2 cup fresh dill\n3 cloves garlic\n1\u20132 tbsp lemon juice\n1/4 tsp salt\nBLUEBERRY TZATZIKI SAUCE\n1. In a blender, combine the\nblueberries, greek yogurt, garlic,\nlemon juice, and salt. Blend until\nsmooth.\n2. Shred the cucumber and chop\nthe dill.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 6 g . 2 g 3 g 4 0 P O S T / R E C O V E R Y 1 5 M I N S 5 S E R V I N G S\nM F B G\n3. Add the shredded cucumber\nand chopped dill to the blended\nmixture. Stir to combine.\n4. Taste and adjust seasoning if\nnecessary.","ingredients":"1 large cucumber\n1 cup blueberries\n2 cups greek yogurt (nonfat)\n1/2 cup fresh dill\n3 cloves garlic\n1\u20132 tbsp lemon juice\n1/4 tsp salt","instructions":"1. In a blender, combine the blueberries, greek yogurt, garlic, lemon juice, and salt. Blend until smooth.\n2. Shred the cucumber and chop the dill.\n3. Add the shredded cucumber and chopped dill to the blended mixture. Stir to combine.\n4. Taste and adjust seasoning if necessary.","notes":""},{"name":"Caesar Salad Dressing","category":"Sauces","volume":1,"timing":"","text":"CAESAR SALAD DRESSING INSTRUCTIONS\n1. In a bowl, whisk together olive\noil, lemon juice, garlic, salt,\npepper, mustard powder, egg\nyolk, apple cider vinegar, and\nparmesan.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 2 g 1 3 g . 7 g 1 2 6 P O S T / R E C O V E R Y 1 0 M I N S 5 S E R V I N G S\n1/4 cup olive oil\n1 egg yolk\nJuice from 1 lemon\n2 garlic cloves, minced\n1/4 tsp mustard powder\n1 tsp apple cider vinegar\n2 tbsp greek yogurt (non-fat)\n3 tbsp parmesan cheese\n1/4 tsp pepper\n1/4 tsp salt\nM F B G\n2. Stir in the greek yogurt. Add more\nGreek yogurt or parmesan if it\u2019s too\ntangy.\n3. Mix well and serve over a MFBG\nSalad.","ingredients":"1/4 cup olive oil\n1 egg yolk\nJuice from 1 lemon\n2 garlic cloves, minced\n1/4 tsp mustard powder\n1 tsp apple cider vinegar\n2 tbsp greek yogurt (non-fat)\n3 tbsp parmesan cheese\n1/4 tsp pepper\n1/4 tsp salt","instructions":"1. In a bowl, whisk together olive\noil, lemon juice, garlic, salt,\npepper, mustard powder, egg\nyolk, apple cider vinegar, and\nparmesan.\n2. Stir in the greek yogurt. Add more\nGreek yogurt or parmesan if it\u2019s too\ntangy.\n3. Mix well and serve over a\nSalad.","notes":""},{"name":"Cilantro Lime Sauce","category":"Sauces","volume":1,"timing":"POST/RECOVERY","text":"CILANTRO LIME SAUCE INSTRUCTIONS\n1. Blend all ingredients together\nuntil smooth and creamy.\n2. Taste and adjust.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 8 g . 3 g 5 g 5 3 P O S T / R E C O V E R Y 1 5 M I N S 6 S E R V I N G S 1 cup greek yogurt (non-fat)\n1 cup cottage cheese (low-fat or\nany type)\nJuice of 2 limes\n1 cup fresh cilantro, uncut (a\ngenerous handful)\n3\u20134 garlic cloves\n1/2 tsp paprika\nSalt and pepper, to taste\nWater or more lime juice (if needed\nto thin the sauce)\nM F B G\nNotes:\nThis sauce is perfect on the \nMFBG Wrap, MFBG Tacos, & \nMFBG Sweet Potato Nachos.","ingredients":"1 cup cottage cheese (low-fat or\nany type)\nJuice of 2 limes\n1 cup fresh cilantro, uncut (a\ngenerous handful)\n3\u20134 garlic cloves\n1/2 tsp paprika\nSalt and pepper, to taste\nWater or more lime juice (if needed\nto thin the sauce)\nNotes:\nThis sauce is perfect on the\nWrap,  Tacos, &\nSweet Potato Nachos.","instructions":"1. Blend all ingredients together\nuntil smooth and creamy.\n2. Taste and adjust.","notes":""},{"name":"Ketchup","category":"Sauces","volume":1,"timing":"","text":"KETCHUP INSTRUCTIONS\n1. Combine all ingredients in a\nsaucepan over medium heat and\nwhisk together. Add more honey\nif you want it sweeter.\n2. Bring to a simmer, then\nreduce heat to low. Let it simmer\nfor 20-30 minutes, stirring\noccasionally.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 g 0 g 1 4 g 6 1 P O S T / R E C O V E R Y 4 0 M I N S 1 0 S E R V I N G S\n1 (28 oz) can of tomato puree\n1/2 cup apple cider vinegar\n1/4 cup honey\n1 tsp garlic powder\n1 tsp onion powder\nSalt and pepper to taste\nM F B G\n3. Let it cool, then blend until\nsmooth.\nNotes:\nThis Ketchup is perfect for the\nMFBG Chicken Nugget recipe.\nAlso, if you don\u2019t use it all you can\nstore it in the fridge for 2-3 weeks.","ingredients":"1 (28 oz) can of tomato puree\n1/2 cup apple cider vinegar\n1/4 cup honey\n1 tsp garlic powder\n1 tsp onion powder\nSalt and pepper to taste","instructions":"1. Combine all ingredients in a\nsaucepan over medium heat and\nwhisk together. Add more honey\nif you want it sweeter.\n2. Bring to a simmer, then\nreduce heat to low. Let it simmer\nfor 20-30 minutes, stirring\noccasionally.\n3. Let it cool, then blend until\nsmooth.","notes":"This Ketchup is perfect for the\nChicken Nugget recipe.\nAlso, if you don\u2019t use it all you can\nstore it in the fridge for 2-3 weeks."},{"name":"Lemon Parmesan Sauce","category":"Sauces","volume":1,"timing":"","text":"LEMON PARMESAN SAUCE INSTRUCTIONS\n1. Blend all ingredients together\nuntil smooth and creamy. If it\u2019s too\nthin, mix in a little more greek\nyogurt after blending.\n2. Taste and adjust.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 1 g 4 g 5 g 9 5 P O S T / R E C O V E R Y 1 5 M I N S 4 S E R V I N G S\n1/2 cup greek yogurt (non-fat)\n1/2 cup cottage cheese (non-fat)\nJuice of 1-2 lemons\n3 garlic cloves, minced\n1/2 cup parmesan cheese\n1/2 tsp thyme\n1/2 tsp paprika\nPinch of salt & pepper\nOptional: 2 tsp honey\nM F B G\nNotes:\nThis sauce is perfect on the\nMFBG Spaghetti Squash\nSalad.","ingredients":"1/2 cup greek yogurt (non-fat)\n1/2 cup cottage cheese (non-fat)\nJuice of 1-2 lemons\n3 garlic cloves, minced\n1/2 cup parmesan cheese\n1/2 tsp thyme\n1/2 tsp paprika\nPinch of salt & pepper\nOptional: 2 tsp honey\nNotes:\nThis sauce is perfect on the\nSpaghetti Squash\nSalad.","instructions":"1. Blend all ingredients together\nuntil smooth and creamy. If it\u2019s too\nthin, mix in a little more greek\nyogurt after blending.\n2. Taste and adjust.","notes":""},{"name":"Peanut Sauce","category":"Sauces","volume":1,"timing":"","text":"INSTRUCTIONS\n2 tbsp peanut butter\n1/2 cup greek yogurt (non-fat)\n2 tsp apple cider vinegar\n1/4 tsp paprika\n1/4 tsp cayenne pepper\n 2 garlic cloves, minced\n2 tbsp soy sauce (no\npreservatives or additives)\n 2 tbsp water \n Salt and pepper, to taste\nPEANUT BUTTER SAUCE INGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 6 g 4 g 3 g 7 5 P O S T / R E C O V E R Y 1 0 M I N S 4 S E R V I N G S\nM F B G\n1. In a bowl, whisk all the ingredients\ntogether until smooth and combined.\nNotes:\nInstead of adding water you can\nadd more soy sauce. Double the\nrecipe for extra sauce. This sauce\nis perfect on MFBG lettuce\nwraps.","ingredients":"2 tbsp peanut butter\n1/2 cup greek yogurt (non-fat)\n2 tsp apple cider vinegar\n1/4 tsp paprika\n1/4 tsp cayenne pepper\n2 garlic cloves, minced\n2 tbsp soy sauce (no\npreservatives or additives)\n2 tbsp water\nSalt and pepper, to taste\nPEANUT BUTTER SAUCE","instructions":"1. In a bowl, whisk all the ingredients\ntogether until smooth and combined.","notes":"Instead of adding water you can\nadd more soy sauce. Double the\nrecipe for extra sauce. This sauce\nis perfect on  lettuce\nwraps."},{"name":"Spicy Red Pepper Sauce","category":"Sauces","volume":1,"timing":"","text":"SPICY RED PEPPER SAUCE INSTRUCTIONS\n1. Blend all ingredients together\nuntil smooth and creamy.\n2. Taste and adjust. If the sauce is\ntoo thin, mix in a little more greek\nyogurt after blending or let it rest\nin the fridge to thicken.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 7 g . 1 g 4 g 4 5 P O S T / R E C O V E R Y 1 5 M I N S 3 S E R V I N G S\n3/4 cup greek yogurt (non-fat)\n1/2 red bell pepper\n1/2 jalape\u00f1o (adjust for spice\npreference)\n2 cloves garlic\n2 tsp apple cider vinegar\nJuice of 1/2 lime (~1 tsp)\n1 tsp paprika\nSalt, to taste\nChili flakes, for topping\nM F B G\nNotes:\nThis sauce is perfect on the\nMFBG Cucumber Salad or \nMFBG Wrap.","ingredients":"3/4 cup greek yogurt (non-fat)\n1/2 red bell pepper\n1/2 jalape\u00f1o (adjust for spice\npreference)\n2 cloves garlic\n2 tsp apple cider vinegar\nJuice of 1/2 lime (~1 tsp)\n1 tsp paprika\nSalt, to taste\nChili flakes, for topping\nNotes:\nThis sauce is perfect on the\nCucumber Salad or\nWrap.","instructions":"1. Blend all ingredients together\nuntil smooth and creamy.\n2. Taste and adjust. If the sauce is\ntoo thin, mix in a little more greek\nyogurt after blending or let it rest\nin the fridge to thicken.","notes":""},{"name":"Blueberry Muffins","category":"Breakfast","volume":2,"timing":"PRE/POST","text":"BLUEBERRY MUFFINS\nINSTRUCTIONS\n1. Preheat oven to 350\u00b0F (175\u00b0C).\n2. In a large bowl, whisk together all dry ingredients\nuntil evenly combined.\n3. In a separate bowl, mash the bananas well.\n4. Whisk in Greek yogurt, eggs, maple syrup, and\napple cider vinegar, vanilla until fully combined.\n5. Mix the wet mixture into the dry ingredients just\nuntil fully combined. Add 1 1/2 cups of blueberries\ndirectly into the batter, saving the remaining 1/2 cup\nfor topping.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 0 g 2 g 2 3 g 1 6 9\n3 0 M I N S 1 2 S E R V I N G S\nWET\n2 ripe bananas, mashed\n1 cup greek yogurt (nonfat or any type)\n2 eggs\n3 tbsp maple syrup\n1 tbsp apple cider vinegar\n1/2 tsp pure vanilla extract\n2 cups blueberries (fresh or frozen)\nDRY\n2 cups oat flour\n2 scoops protein powder (\u22481/2 cup)\n2 tsp baking powder\n1 tsp baking soda\n2 tsp cinnamon\n1 tsp salt\nM F B G\n6. Line a muffin tin with liners and lightly spray with\navocado or olive oil spray. Optional, but it helps\nkeep them from sticking\n7. Scoop batter evenly into 12 cups and top each\nwith a few of the remaining blueberries.\n8. Bake for 12\u201315 minutes, or until tops are golden\nand a toothpick comes out clean.\n9. Cool for 10 minutes before removing \u2014 this helps\nthem firm up and release from the muffin liners.\nP R E & P O S T","ingredients":"WET\n2 ripe bananas, mashed\n1 cup greek yogurt (nonfat or any type)\n2 eggs\n3 tbsp maple syrup\n1 tbsp apple cider vinegar\n1/2 tsp pure vanilla extract\n2 cups blueberries (fresh or frozen)\nDRY\n2 cups oat flour\n2 scoops protein powder (\u22481/2 cup)\n2 tsp baking powder\n1 tsp baking soda\n2 tsp cinnamon\n1 tsp salt","instructions":"1. Preheat oven to 350\u00b0F (175\u00b0C).\n2. In a large bowl, whisk together all dry ingredients\nuntil evenly combined.\n3. In a separate bowl, mash the bananas well.\n4. Whisk in Greek yogurt, eggs, maple syrup, and\napple cider vinegar, vanilla until fully combined.\n5. Mix the wet mixture into the dry ingredients just\nuntil fully combined. Add 1 1/2 cups of blueberries\ndirectly into the batter, saving the remaining 1/2 cup\nfor topping.\n6. Line a muffin tin with liners and lightly spray with\navocado or olive oil spray. Optional, but it helps\nkeep them from sticking\n7. Scoop batter evenly into 12 cups and top each\nwith a few of the remaining blueberries.\n8. Bake for 12\u201315 minutes, or until tops are golden\nand a toothpick comes out clean.\n9. Cool for 10 minutes before removing \u2014 this helps\nthem firm up and release from the muffin liners.","notes":""},{"name":"Breakfast Biscuits","category":"Breakfast","volume":2,"timing":"PRE/POST","text":"BREAKFAST BISCUITS\nINSTRUCTIONS\n1. Preheat oven to 350\u00b0F (175\u00b0C) and line a\nbaking sheet with parchment paper.\n2. In a large bowl, whisk together all wet\ningredients until fully combined.\n3. In a separate bowl, whisk together all dry\ningredients until evenly mixed.\n4. Combine the wet and dry mixtures and stir\nuntil just combined.\n5. Let the dough rest for 15 minutes to allow\nthe oat flour to absorb moisture.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 2 g 7 g 2 4 g 2 3 1\n5 0 M I N S 7 S E R V I N G S\nWET\n5 eggs\n1/2 cup cottage cheese (2%)\n1/4 cup parmesan, shredded (\u224820g)\n1/2 red onion, diced (\u22481 cup)\n1 red pepper, diced (\u22481 cup)\n1 jalape\u00f1o, diced (\u22481/4 cup)\nDRY\n2 cups oat flour\n2 tsp baking powder\nSEASONINGS\n1 tsp smoked paprika\n2 tsp garlic powder\n1/4 tsp cumin\n1/4 tsp oregano\n1/4 tsp thyme\n2 tsp salt\n1 tsp pepper\nM F B G\n6. Scoop the dough with an ice cream scoop into 7\nevenly sized biscuits and place them on the lined\nbaking sheet.\n7. Bake for 12\u201315 minutes, or until the tops are lightly\ngolden and firm to the touch.\n8. Let cool for 5\u201310 minutes before serving.\nNOTES:\nBiscuits can be stored on the counter for 1\u20132 days, in\nthe fridge, or in the freezer. Toast them before\nserving for the best texture and flavor.\nP R E & P O S T","ingredients":"WET\n5 eggs\n1/2 cup cottage cheese (2%)\n1/4 cup parmesan, shredded (\u224820g)\n1/2 red onion, diced (\u22481 cup)\n1 red pepper, diced (\u22481 cup)\n1 jalape\u00f1o, diced (\u22481/4 cup)\nDRY\n2 cups oat flour\n2 tsp baking powder\nSEASONINGS\n1 tsp smoked paprika\n2 tsp garlic powder\n1/4 tsp cumin\n1/4 tsp oregano\n1/4 tsp thyme\n2 tsp salt\n1 tsp pepper","instructions":"1. Preheat oven to 350\u00b0F (175\u00b0C) and line a\nbaking sheet with parchment paper.\n2. In a large bowl, whisk together all wet\ningredients until fully combined.\n3. In a separate bowl, whisk together all dry\ningredients until evenly mixed.\n4. Combine the wet and dry mixtures and stir\nuntil just combined.\n5. Let the dough rest for 15 minutes to allow\nthe oat flour to absorb moisture.\n6. Scoop the dough with an ice cream scoop into 7\nevenly sized biscuits and place them on the lined\nbaking sheet.\n7. Bake for 12\u201315 minutes, or until the tops are lightly\ngolden and firm to the touch.\n8. Let cool for 5\u201310 minutes before serving.\nNOTES:\nBiscuits can be stored on the counter for 1\u20132 days, in\nthe fridge, or in the freezer. Toast them before\nserving for the best texture and flavor.","notes":""},{"name":"Breakfast Sandwiches","category":"Breakfast","volume":2,"timing":"POST","text":"BREAKFAST SANDWICHES\nINSTRUCTIONS\n1. Preheat oven to 350\u00b0F and line a baking sheet with\nparchment paper.\n2. In a large bowl, whisk together all wet ingredients until\nfully combined.\n3. In a separate bowl, whisk together all dry ingredients\nuntil evenly mixed.\n4. Combine the wet and dry mixtures and stir until just\ncombined.\n5. Let the dough rest for 15 minutes to allow the oat flour\nto absorb moisture.\n6. Scoop the dough with an ice cream scoop into 7\nevenly sized biscuits and place them on the lined baking\nsheet.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 2 6 g 1 2 g 2 6 g 3 3 0\n5 5 M I N S 7 S E R V I N G S\nFOR THE BISCUITS\nWET\n5 eggs\n1/4 cup parmesan, shreded(\u224820g)\n1/2 red onion, diced (\u22481 cup)\n1 red pepper, diced (\u22481 cup)\n1 jalape\u00f1o, diced (\u22481/4 cup)\n1/2 cup 2% cottage cheese\nDRY\n2 cups oat flour\n2 tsp baking powder\nSeasonings: 1 tsp smoked paprika, 2 tsp\ngarlic powder, 1/4 tsp cumin, 1/4 tsp\noregano, 1/4 tsp thyme, 2 tsp salt, 1 tsp\npepper\nADD-INS FOR THE SANDWICH\nBreakfast sausage (turkey or any type)\nOptional:\nAvocado\nSpinach\nCheese of choice\nMFBG Ketchup\nM F B G\n7. Bake for 12\u201315 minutes, or until tops are lightly golden and\nfirm to the touch.\n8. Cook the breakfast sausage in a skillet over medium heat\nuntil browned and fully cooked.\n9. Slice biscuits in half, add the cooked sausage, and layer\nwith your choice of toppings \u2014 avocado, spinach, cheese, and\na drizzle of KA Ketchup.\nNOTES:\nBiscuits can be stored on the counter for 1\u20132 days, in the\nfridge, or in the freezer. Toast them before serving for the\nbest texture and flavor.\nP O S T / R E C O V E R Y","ingredients":"FOR THE BISCUITS\nWET\n5 eggs\n1/4 cup parmesan, shreded(\u224820g)\n1/2 red onion, diced (\u22481 cup)\n1 red pepper, diced (\u22481 cup)\n1 jalape\u00f1o, diced (\u22481/4 cup)\n1/2 cup 2% cottage cheese\nDRY\n2 cups oat flour\n2 tsp baking powder\nSeasonings: 1 tsp smoked paprika, 2 tsp\ngarlic powder, 1/4 tsp cumin, 1/4 tsp\noregano, 1/4 tsp thyme, 2 tsp salt, 1 tsp\npepper\nADD-INS FOR THE SANDWICH\nBreakfast sausage (turkey or any type)\nOptional:\nAvocado\nSpinach\nCheese of choice\nKetchup","instructions":"1. Preheat oven to 350\u00b0F and line a baking sheet with\nparchment paper.\n2. In a large bowl, whisk together all wet ingredients until\nfully combined.\n3. In a separate bowl, whisk together all dry ingredients\nuntil evenly mixed.\n4. Combine the wet and dry mixtures and stir until just\ncombined.\n5. Let the dough rest for 15 minutes to allow the oat flour\nto absorb moisture.\n6. Scoop the dough with an ice cream scoop into 7\nevenly sized biscuits and place them on the lined baking\nsheet.\n7. Bake for 12\u201315 minutes, or until tops are lightly golden and\nfirm to the touch.\n8. Cook the breakfast sausage in a skillet over medium heat\nuntil browned and fully cooked.\n9. Slice biscuits in half, add the cooked sausage, and layer\nwith your choice of toppings \u2014 avocado, spinach, cheese, and\na drizzle of KA Ketchup.\nNOTES:\nBiscuits can be stored on the counter for 1\u20132 days, in the\nfridge, or in the freezer. Toast them before serving for the\nbest texture and flavor.","notes":""},{"name":"Low-Fat Granola","category":"Breakfast","volume":2,"timing":"PRE","text":"INSTRUCTIONS\n2 bananas\n3 cups of oats\n3 scoops of vanilla protein powder (\u22481\ncup)\n2 tbsp coconut oil\n2 tbsp of honey\n2 tsp of cinnamon\n1 tsp salt\nLOW-FAT GRANOLA\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S\n7 g 4 g 1 5 g 1 3 1\nP R E / P O S T / R E C O V E R Y 3 0 M I N S 1 5 S E R V I N G S\nM F B G\n1. Preheat oven: Set oven to 350\u00b0F\n(175\u00b0C) and line a baking sheet with\nparchment paper.\n2. Cook the bananas: Slice bananas\nlengthwise. Heat 2 tbsp coconut oil in a\nskillet over medium heat. Place banana\nslices on the hot pan and cook a few\nminutes per side until lightly golden and\nsoftened. Mash into a smooth mixture.\n3. Mix in dry: In a large bowl, combine\noats, cinnamon, salt, and protein powder.\n4. Combine: Pour the warm mashed\nbanana mixture into the dry ingredients\nand mix until evenly coated. Add honey\nand stir until fully combined.\n5. Bake: Spread the mixture on the\nprepared baking sheet. Press it down\nfirmly to form clusters. Bake for 12\u201315\nminutes, watching closely to make sure it\ndoesn\u2019t burn.\n6. Store: Let cool completely, then break\ninto pieces and store in a container.","ingredients":"2 bananas\n3 cups of oats\n3 scoops of vanilla protein powder (\u22481\ncup)\n2 tbsp coconut oil\n2 tbsp of honey\n2 tsp of cinnamon\n1 tsp salt\nLOW-FAT GRANOLA","instructions":"1. Preheat oven: Set oven to 350\u00b0F\n(175\u00b0C) and line a baking sheet with\nparchment paper.\n2. Cook the bananas: Slice bananas\nlengthwise. Heat 2 tbsp coconut oil in a\nskillet over medium heat. Place banana\nslices on the hot pan and cook a few\nminutes per side until lightly golden and\nsoftened. Mash into a smooth mixture.\n3. Mix in dry: In a large bowl, combine\noats, cinnamon, salt, and protein powder.\n4. Combine: Pour the warm mashed\nbanana mixture into the dry ingredients\nand mix until evenly coated. Add honey\nand stir until fully combined.\n5. Bake: Spread the mixture on the\nprepared baking sheet. Press it down\nfirmly to form clusters. Bake for 12\u201315\nminutes, watching closely to make sure it\ndoesn\u2019t burn.\n6. Store: Let cool completely, then break\ninto pieces and store in a container.","notes":""},{"name":"Spanish Omelette","category":"Breakfast","volume":2,"timing":"RECOVERY","text":"SPANISH OMELETTE\nINSTRUCTIONS\n1. Prep vegetables:\nPeel the potatoes and thinly slice them, then slice\nthe onion and mince the garlic.\n2. Cook aromatics:\nHeat olive oil in a 10-12\" round pan; cook onion\nand garlic until translucent.\n3. Cook potatoes:\nAdd the potatoes and season with smoked\npaprika, salt, and pepper. Stir over medium heat\nuntil evenly coated, then reduce the heat, cover,\nand cook until tender.\n4. Cool mixture:\nRemove from pan and let cool.\n5. Whisk eggs:\nWhisk eggs with a pinch of salt and pepper.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 0 g 8 g 9 g 1 5 1\n3 5 M I N S 6 S E R V I N G S\n2 yukon potatoes (\u2248300 g)\n1/2 onion (\u2248 100g)\n2 garlic cloves, minced\n8 eggs\n1/2 tablespoon olive oil\n2 tsp smoked paprika\n1 tsp salt\n1/2 tsp pepper\nOPTIONAL TOPPINGS:\nGreen onion\nMFBG Ketchup\nM F B G\n6. Combine:\nFold in the cooled potato\u2013onion mixture.\n7. Cook omelette:\nAdd the mixture to a lightly oiled nonstick pan. Cook\nuncovered over medium-low heat for 5\u20137 minutes,\ngently loosening the edges with a spatula as it cooks.\nThen cover and cook on low for another 3\u20135 minutes\n8. Flip:\nInvert onto a plate or lid, slide back into the pan.\n9. Finish:\nCover and cook for 3\u20135 minutes more on low until set.\n10. Serve:\nRest for a few minutes before slicing and serving warm.\nOr serve it the traditional way \u2014 chilled. Let it cool,\nthen refrigerate and serve cold. Store leftovers in the\nfridge.\nP O S T / R E C O V E R Y","ingredients":"2 yukon potatoes (\u2248300 g)\n1/2 onion (\u2248 100g)\n2 garlic cloves, minced\n8 eggs\n1/2 tablespoon olive oil\n2 tsp smoked paprika\n1 tsp salt\n1/2 tsp pepper\nOPTIONAL TOPPINGS:\nGreen onion\nKetchup","instructions":"1. Prep vegetables:\nPeel the potatoes and thinly slice them, then slice\nthe onion and mince the garlic.\n2. Cook aromatics:\nHeat olive oil in a 10-12\" round pan; cook onion\nand garlic until translucent.\n3. Cook potatoes:\nAdd the potatoes and season with smoked\npaprika, salt, and pepper. Stir over medium heat\nuntil evenly coated, then reduce the heat, cover,\nand cook until tender.\n4. Cool mixture:\nRemove from pan and let cool.\n5. Whisk eggs:\nWhisk eggs with a pinch of salt and pepper.\n6. Combine:\nFold in the cooled potato\u2013onion mixture.\n7. Cook omelette:\nAdd the mixture to a lightly oiled nonstick pan. Cook\nuncovered over medium-low heat for 5\u20137 minutes,\ngently loosening the edges with a spatula as it cooks.\nThen cover and cook on low for another 3\u20135 minutes\n8. Flip:\nInvert onto a plate or lid, slide back into the pan.\n9. Finish:\nCover and cook for 3\u20135 minutes more on low until set.\n10. Serve:\nRest for a few minutes before slicing and serving warm.\nOr serve it the traditional way \u2014 chilled. Let it cool,\nthen refrigerate and serve cold. Store leftovers in the\nfridge.","notes":""},{"name":"Sweet Potato Quiche","category":"Breakfast","volume":2,"timing":"RECOVERY","text":"SWEET POTATO QUICHE\nINSTRUCTIONS\n1. Preheat oven to 350\u00b0F (175\u00b0C).\n2. Chop & Layer:\nAdd a little olive oil to a pie pan. Slice the\nsweet potato into very thin rounds (you may\nnot use the whole potato). Overlap and stack\nslices to fully cover the pie pan, pressing\nthem up the sides. It will look thick, but\nthey\u2019ll thin out once baked.\n3. Bake the Crust:\nBake 10\u201315 minutes until partially cooked and\nflexible. Readjust slices up the sides if\nneeded. Optional: place another pie pan on\ntop while baking to keep slices in place.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 2 g 8 g 9 g 1 5 4\n5 0 M I N S 6 S E R V I N G S\nTHE CRUST\n1 medium sweet potato (thinly sliced rounds)\nTHE VEGETABLE FILLING\n1 cup onion, diced\n1 cup mushrooms, diced\n1 handful spinach\n1/2 cup cherry tomatoes, sliced\n2 cloves garlic, minced\n1/4 tsp paprika\nPinch of salt and pepper\nTHE EGG MIXTURE\n5 eggs\n3/4 cup cottage cheese (2%)\n1/2 cup parmesan, shredded\nSalt and pepper to taste\nM F B G\n4. Saut\u00e9 onions, garlic, salt, pepper, and paprika in\nolive oil until softened. Add mushrooms and cherry\ntomatoes, cook a few minutes, then stir in spinach\nuntil wilted.\n5. Combine eggs, cottage cheese, parmesan, salt,\nand pepper \u2014 whisk or blend until smooth.\n6. Mix the saut\u00e9ed vegetables into the egg mixture,\nensuring they're evenly combined. Pour the mixture\nover the pre-baked sweet potato crust and gently\nspread so the vegetables are distributed throughout.\n7. Bake for 30 minutes, or until the center is set.\n8. Cool for 10 minutes before slicing and serving.\nP O S T / R E C O V E R Y","ingredients":"THE CRUST\n1 medium sweet potato (thinly sliced rounds)\nTHE VEGETABLE FILLING\n1 cup onion, diced\n1 cup mushrooms, diced\n1 handful spinach\n1/2 cup cherry tomatoes, sliced\n2 cloves garlic, minced\n1/4 tsp paprika\nPinch of salt and pepper\nTHE EGG MIXTURE\n5 eggs\n3/4 cup cottage cheese (2%)\n1/2 cup parmesan, shredded\nSalt and pepper to taste","instructions":"1. Preheat oven to 350\u00b0F (175\u00b0C).\n2. Chop & Layer:\nAdd a little olive oil to a pie pan. Slice the\nsweet potato into very thin rounds (you may\nnot use the whole potato). Overlap and stack\nslices to fully cover the pie pan, pressing\nthem up the sides. It will look thick, but\nthey\u2019ll thin out once baked.\n3. Bake the Crust:\nBake 10\u201315 minutes until partially cooked and\nflexible. Readjust slices up the sides if\nneeded. Optional: place another pie pan on\ntop while baking to keep slices in place.\n4. Saut\u00e9 onions, garlic, salt, pepper, and paprika in\nolive oil until softened. Add mushrooms and cherry\ntomatoes, cook a few minutes, then stir in spinach\nuntil wilted.\n5. Combine eggs, cottage cheese, parmesan, salt,\nand pepper \u2014 whisk or blend until smooth.\n6. Mix the saut\u00e9ed vegetables into the egg mixture,\nensuring they're evenly combined. Pour the mixture\nover the pre-baked sweet potato crust and gently\nspread so the vegetables are distributed throughout.\n7. Bake for 30 minutes, or until the center is set.\n8. Cool for 10 minutes before slicing and serving.","notes":""},{"name":"Chicken Parmesan","category":"Dinner","volume":2,"timing":"POST/RECOVERY","text":"P R O T E I N F A T C A R B S C A L O R I E S 4 1 g 1 6 g 2 7 g 4 2 6\nCHICKEN PARMESAN\nINSTRUCTIONS\n1. Preheat the oven to 400\u00b0F.\n2. Make the tomato sauce:\nBlend tomatoes, garlic cloves, italian seasoning, paprika, onion\npowder salt, and pepper until smooth. Simmer on the stove,\nstirring occasionally, for 15\u201320 minutes until the water has\nevaporated and the sauce thickens. (Or use a clean-ingredient\njar of marinara sauce.)\n3. Make the breadcrumb coating:\nCut a few slices of sourdough and bake at 400\u00b0F for about\n20\u201325 minutes, or until hard and crisp. Once cooled, blend into\nfine crumbs. In a bowl, combine the sourdough breadcrumbs\nwith garlic powder, onion powder, paprika, cayenne pepper,\nsalt, and black pepper.\nINGREDIENTS\nP O S T / R E C O V E R Y 1 H R 1 5 M I N S 4 S E R V I N G S\nTOMATO SAUCE\n5 tomatoes\n2 garlic cloves\n2 tsp italian seasoning\n2 tsp paprika, 1 tsp onion powder, 1/2 tsp salt,\n1/2 tsp pepper\nOptional: 1/4 cup freshly cut basil\n(Or use a clean ingredient jar of marinara sauce if\npreferred)\nBREADCRUMB COATING\n1 cup (\u22483 slices) sourdough\n1\u20132 balls fresh mozzarella (\u22484 oz), sliced\n1 tsp garlic powder\n1 tsp onion powder\n2 tsp paprika\nPinch of cayenne pepper\n1 tsp salt\n1/2 tsp pepper\nEGG MIXTURE\n2 eggs\nCHICKEN\n1 lb chicken breast (2 large) sliced lengthwise\n1/2 tbsp avocado oil spray\nM F B G\n4. Bread the chicken:\nSlice each chicken breast in half lengthwise to make cutlets.\nWhisk the eggs in a separate bowl. Dip each cutlet into the\negg, then into the breadcrumb mixture. Press to coat well.\n5. Bake the chicken:\nPlace breaded chicken cutlets on a wire rack over a baking\nsheet. Spray both sides with avocado oil. Bake 9 minutes, flip,\nbake 6 minutes, then switch to broil for 3 minutes to brown.\n6. Top it off:\nRemove from oven, spoon tomato sauce over each piece, top\nwith mozzarella slices, and broil again for 5 minutes or until the\ncheese is fully melted.\n7. Finish:\nRemove from the oven, let cool for a few minutes, and enjoy.\nOptional: top with fresh basil.","ingredients":"TOMATO SAUCE\n5 tomatoes\n2 garlic cloves\n2 tsp italian seasoning\n2 tsp paprika, 1 tsp onion powder, 1/2 tsp salt,\n1/2 tsp pepper\nOptional: 1/4 cup freshly cut basil\n(Or use a clean ingredient jar of marinara sauce if\npreferred)\nBREADCRUMB COATING\n1 cup (\u22483 slices) sourdough\n1\u20132 balls fresh mozzarella (\u22484 oz), sliced\n1 tsp garlic powder\n1 tsp onion powder\n2 tsp paprika\nPinch of cayenne pepper\n1 tsp salt\n1/2 tsp pepper\nEGG MIXTURE\n2 eggs\nCHICKEN\n1 lb chicken breast (2 large) sliced lengthwise\n1/2 tbsp avocado oil spray","instructions":"1. Preheat the oven to 400\u00b0F.\n2. Make the tomato sauce:\nBlend tomatoes, garlic cloves, italian seasoning, paprika, onion\npowder salt, and pepper until smooth. Simmer on the stove,\nstirring occasionally, for 15\u201320 minutes until the water has\nevaporated and the sauce thickens. (Or use a clean-ingredient\njar of marinara sauce.)\n3. Make the breadcrumb coating:\nCut a few slices of sourdough and bake at 400\u00b0F for about\n20\u201325 minutes, or until hard and crisp. Once cooled, blend into\nfine crumbs. In a bowl, combine the sourdough breadcrumbs\nwith garlic powder, onion powder, paprika, cayenne pepper,\nsalt, and black pepper.\n4. Bread the chicken:\nSlice each chicken breast in half lengthwise to make cutlets.\nWhisk the eggs in a separate bowl. Dip each cutlet into the\negg, then into the breadcrumb mixture. Press to coat well.\n5. Bake the chicken:\nPlace breaded chicken cutlets on a wire rack over a baking\nsheet. Spray both sides with avocado oil. Bake 9 minutes, flip,\nbake 6 minutes, then switch to broil for 3 minutes to brown.\n6. Top it off:\nRemove from oven, spoon tomato sauce over each piece, top\nwith mozzarella slices, and broil again for 5 minutes or until the\ncheese is fully melted.\n7. Finish:\nRemove from the oven, let cool for a few minutes, and enjoy.\nOptional: top with fresh basil.","notes":""},{"name":"Baked Sweet Potato","category":"Dinner","volume":2,"timing":"PRE/POST","text":"BAKED SWEET POTATO\nINSTRUCTIONS\n1. Preheat the oven to 400\u00b0F (200\u00b0C).\n2. Wash and score the sweet potatoes, then\nplace them on a parchment-lined baking sheet.\n3. Bake for 45 minutes or until tender.\n4. While the potatoes bake, make an optional\nMFBG Sauce. The Avocado Sauce or Adobo\nSauce are both great options (you can find\nthem in the sauce section).\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 4 0 g 1 7 g 3 1 g 4 5 4\n1 H R 4 S E R V I N G S\n4 medium sweet potatoes\n1 lb lean ground beef (90%)\n1 small yellow onion, diced\n2 garlic cloves, minced\n1 cup cottage cheese (2%)\n2 tsp olive oil\nOptional:\nMFBG Avocado or Adobo Sauce\nGreen onion, chopped\nParmesan, shredded\nM F B G\n5. Dice the onion and mince the garlic. Heat\na large skillet over medium heat and saut\u00e9\nthe onion and garlic until softened.\n6. Add the ground beef to the skillet and\ncook until browned. Season as desired.\n7. Remove the potatoes from the oven, cut\nlengthwise, and gently open them.\n8. Layer in cottage cheese, ground beef, and\nyour optional toppings such as MFBG\nSauce, green onion, and parmesan.\nP O S T / R E C O V E R Y","ingredients":"4 medium sweet potatoes\n1 lb lean ground beef (90%)\n1 small yellow onion, diced\n2 garlic cloves, minced\n1 cup cottage cheese (2%)\n2 tsp olive oil\nOptional:\nAvocado or Adobo Sauce\nGreen onion, chopped\nParmesan, shredded","instructions":"1. Preheat the oven to 400\u00b0F (200\u00b0C).\n2. Wash and score the sweet potatoes, then\nplace them on a parchment-lined baking sheet.\n3. Bake for 45 minutes or until tender.\n4. While the potatoes bake, make an optional\nSauce. The Avocado Sauce or Adobo\nSauce are both great options (you can find\nthem in the sauce section).\n5. Dice the onion and mince the garlic. Heat\na large skillet over medium heat and saut\u00e9\nthe onion and garlic until softened.\n6. Add the ground beef to the skillet and\ncook until browned. Season as desired.\n7. Remove the potatoes from the oven, cut\nlengthwise, and gently open them.\n8. Layer in cottage cheese, ground beef, and\nyour optional toppings such as\nSauce, green onion, and parmesan.","notes":""},{"name":"Chicken Noodle Soup","category":"Dinner","volume":2,"timing":"RECOVERY","text":"CHICKEN NOODLE SOUP\nINSTRUCTIONS\n1. Prep the \u201cnoodles\u201d: Slice spaghetti squash in\nhalf, scoop out seeds, and place on a baking sheet.\nRoast at 400\u00b0F for 30\u201340 min until tender. Use a\nfork to shred into \u201cspaghetti\u201d strands. Set aside.\n2. Cook and shred:\nSeason chicken breast with salt and pepper. Sear\nin a lightly oiled skillet over medium-high for 3\u20134\nminutes per side then shred and set aside.\n3. Saut\u00e9 veggies: In a large soup pot, heat olive\noil. Add onion, carrots, celery, and garlic. Season\nwith salt & pepper. Cook until onions are\ntranslucent.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 3 8 g 7 g 1 0 g 2 7 5\n5 5 M I N S 4 S E R V I N G S\n1 small spaghetti squash (\u22483 cups)\nshredded\n1 lb shredded chicken breast (\u22483 cups)\n1 small onion, diced\n1 cup carrots, chopped\n1 cup celery, chopped\n3 garlic cloves, minced\n5 cups chicken broth\n1 tbsp olive oil\nSEASONINGS\n1 tsp garlic powder\n1 tsp onion powder\n2 tsp thyme\n1/2 tsp turmeric\n2 bay leaves\n2 tsp salt (adjust to taste)\n2 tsp pepper\nM F B G\n4. Build the broth: Pour in chicken broth. Add\ngarlic powder, onion powder, thyme, turmeric,\nand bay leaves. Bring to a boil, then reduce to a\nsimmer until carrots are tender (10\u201312 min).\n5. Combine everything: Stir in shredded chicken\nand spaghetti squash \u201cnoodles.\u201d Simmer 10\u201315\nmin to let flavors meld.\n6. Taste test: Adjust seasoning if needed.\nRemove bay leaves before serving.\nP O S T / R E C O V E R Y","ingredients":"1 small spaghetti squash (\u22483 cups)\nshredded\n1 lb shredded chicken breast (\u22483 cups)\n1 small onion, diced\n1 cup carrots, chopped\n1 cup celery, chopped\n3 garlic cloves, minced\n5 cups chicken broth\n1 tbsp olive oil\nSEASONINGS\n1 tsp garlic powder\n1 tsp onion powder\n2 tsp thyme\n1/2 tsp turmeric\n2 bay leaves\n2 tsp salt (adjust to taste)\n2 tsp pepper","instructions":"1. Prep the \u201cnoodles\u201d: Slice spaghetti squash in\nhalf, scoop out seeds, and place on a baking sheet.\nRoast at 400\u00b0F for 30\u201340 min until tender. Use a\nfork to shred into \u201cspaghetti\u201d strands. Set aside.\n2. Cook and shred:\nSeason chicken breast with salt and pepper. Sear\nin a lightly oiled skillet over medium-high for 3\u20134\nminutes per side then shred and set aside.\n3. Saut\u00e9 veggies: In a large soup pot, heat olive\noil. Add onion, carrots, celery, and garlic. Season\nwith salt & pepper. Cook until onions are\ntranslucent.\n4. Build the broth: Pour in chicken broth. Add\ngarlic powder, onion powder, thyme, turmeric,\nand bay leaves. Bring to a boil, then reduce to a\nsimmer until carrots are tender (10\u201312 min).\n5. Combine everything: Stir in shredded chicken\nand spaghetti squash \u201cnoodles.\u201d Simmer 10\u201315\nmin to let flavors meld.\n6. Taste test: Adjust seasoning if needed.\nRemove bay leaves before serving.","notes":""},{"name":"Chicken Patties","category":"Dinner","volume":2,"timing":"POST","text":"INSTRUCTIONS\n1 lb ground chicken\n1/2 red onion\n1/2 red bell pepper\n1/2 cup corn\n1/4 cup cilantro\n2 minced garlic cloves\nSEASONINGS\n2 tsp paprika\n1 tsp onion powder\n1/4 tsp ceyenne pepper\n1/2 tsp salt\n1/4 tsp pepper\nCHICKEN PATTYS\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 7 g 8 g 4 g 1 5 2 P O S T / R E C O V E R Y 3 5 M I N S 5 S E R V I N G S\nM F B G\n1. Chop onion, and bell peppers. Dice cilantro\nand garlic.\n2. Combine ground chicken, onion, bell pepper,\ncorn, cilantro garlic and all spices in large bowl.\nMix ingredients until evenly combined.\n3. Form patties into 5 equal sized balls.\nFlatten slightly for even cooking.\n4. On stovetop place a little olive oil in a\nskillet over medium heat. Cook 5\u20136\nminutes per side until golden and cooked\nthrough.","ingredients":"1 lb ground chicken\n1/2 red onion\n1/2 red bell pepper\n1/2 cup corn\n1/4 cup cilantro\n2 minced garlic cloves\n2 tsp paprika\n1 tsp onion powder\n1/4 tsp ceyenne pepper\n1/2 tsp salt\n1/4 tsp pepper\nCHICKEN PATTYS","instructions":"1. Chop onion, and bell peppers. Dice cilantro\nand garlic.\n2. Combine ground chicken, onion, bell pepper,\ncorn, cilantro garlic and all spices in large bowl.\nMix ingredients until evenly combined.\n3. Form patties into 5 equal sized balls.\nFlatten slightly for even cooking.\n4. On stovetop place a little olive oil in a\nsk
