in powder, honey, yogurt, and\nlemon juice until thick + sticky.\n3. Mix in cooked apples.\n4. Transfer to a container, cover, and\nstore in the fridge.\n5. Keep refrigerated and enjoy within\n5 days.","notes":""},{"name":"Apple Crisp","category":"Dessert","volume":2,"timing":"PRE","text":"APPLE CRISP\nINSTRUCTIONS\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 3 g 5 g 2 8 g 1 7 8\n4 0 M I N S 9 S E R V I N G S\nCRISP MIXTURE\n1 3/4 cups old-fashioned oats\n2 tbsp honey\n2 tbsp maple syrup\n1/2 cup walnuts (\u224845g)\n1/2 tsp cinnamon\n1/4 tsp salt\nAPPLE MIXTURE\n3 large apples (Honeycrisp)\n2 tsp honey\n2 tsp maple syrup\n1 tbsp lemon juice\n1 tsp cinnamon\n1/2 tsp vanilla\nOptional: 1 tsp lemon zest\nM F B G\n5. Bake 20\u201325 minutes, until golden.\n6. Remove from oven, let cool completely,\nslice, and enjoy.\nP R E - W O R K O U T\nNOTES:\nIf you want a crispier top, divide the Crisp\nmixture in half and mix 1 teaspoon of melted\ncoconut oil into the top layer.\nFor extra protein, top it with greek yogurt.\n1. Preheat oven to 350\u00b0F.\nIn a food processor, add all the base\ningredients and process until combined.\n2. Press half of the mixture firmly into the\nbottom of a 9\u00d79 baking dish.\n3. Thinly slice the apples \u2014 aim for very thin\nslices so they soften evenly while baking.\n4. In a separate bowl, mix together all the the\napple mixture ingredients. Spread evenly over\nthe base.","ingredients":"INSTRUCTIONS\nCRISP MIXTURE\n1 3/4 cups old-fashioned oats\n2 tbsp honey\n2 tbsp maple syrup\n1/2 cup walnuts (\u224845g)\n1/2 tsp cinnamon\n1/4 tsp salt\nAPPLE MIXTURE\n3 large apples (Honeycrisp)\n2 tsp honey\n2 tsp maple syrup\n1 tbsp lemon juice\n1 tsp cinnamon\n1/2 tsp vanilla\nOptional: 1 tsp lemon zest","instructions":"5. Bake 20\u201325 minutes, until golden.\n6. Remove from oven, let cool completely,\nslice, and enjoy.\nNOTES:\nIf you want a crispier top, divide the Crisp\nmixture in half and mix 1 teaspoon of melted\ncoconut oil into the top layer.\nFor extra protein, top it with greek yogurt.\n1. Preheat oven to 350\u00b0F.\nIn a food processor, add all the base\ningredients and process until combined.\n2. Press half of the mixture firmly into the\nbottom of a 9\u00d79 baking dish.\n3. Thinly slice the apples \u2014 aim for very thin\nslices so they soften evenly while baking.\n4. In a separate bowl, mix together all the the\napple mixture ingredients. Spread evenly over\nthe base.","notes":""},{"name":"Banana Bread","category":"Dessert","volume":2,"timing":"PRE/POST","text":"BANANA BREAD\nINSTRUCTIONS\n1. Preheat oven to 300\u00b0F (175\u00b0C).\n2. In a bowl, mix all dry ingredients.\n3. In a separate bowl, mash the\nbananas until smooth and mix in all the\nother wet ingredients.\n4. Combine wet and dry ingredients -\nmix thoroughly.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 6 g 1 1 g 1 3 g 2 1 0\n1 H R 1 5 M I N S 9 S E R V I N G S\nDRY\n3/4 cup almond flour\n1 cup vanilla protein powder (\u22483 scoops)\n1/2 cup walnuts (\u224850g)\n1 tsp baking powder\n1/2 tsp baking soda\n1 tsp cinnamon\n1/4 tsp salt\nWET\n3 ripe bananas (\u2248300 g)\n2 eggs\n1 cup greek yogurt (nonfat or any type)\n2 tbsp maple syrup\n5. Pour the batter into a greased or\nlined loaf pan\n6. Bake for 1 hour at 300\u00b0F\n7. Remove from the oven, let cool,\nslice and enjoy.\nP O S T / R E C O V E R Y\nM F B G","ingredients":"DRY\n3/4 cup almond flour\n1 cup vanilla protein powder (\u22483 scoops)\n1/2 cup walnuts (\u224850g)\n1 tsp baking powder\n1/2 tsp baking soda\n1 tsp cinnamon\n1/4 tsp salt\nWET\n3 ripe bananas (\u2248300 g)\n2 eggs\n1 cup greek yogurt (nonfat or any type)\n2 tbsp maple syrup","instructions":"1. Preheat oven to 300\u00b0F (175\u00b0C).\n2. In a bowl, mix all dry ingredients.\n3. In a separate bowl, mash the\nbananas until smooth and mix in all the\nother wet ingredients.\n4. Combine wet and dry ingredients -\nmix thoroughly.\n5. Pour the batter into a greased or\nlined loaf pan\n6. Bake for 1 hour at 300\u00b0F\n7. Remove from the oven, let cool,\nslice and enjoy.","notes":""},{"name":"Banana Pudding","category":"Dessert","volume":2,"timing":"PRE","text":"BANANA PUDDING\nINSTRUCTIONS\n1 banana\n1 cup of greek yogurt (nonfat\nor any type)\n1 scoop vanilla protein powder\n2 tbsp chia seeds\nPinch of salt\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S\n2 7 g 5 g 2 0 g 2 4 3\nP O S T - W O R K O U T 5 0 M I N S 2 S E R V I N G S\n1. Blend the banana, Greek yogurt,\nvanilla protein powder, chia seeds,\nand a pinch of salt together in a\nblender until smooth and creamy.\n2. Pour the mixture into a bowl or jar\nand place in the fridge to chill for at\nleast 45 minutes, or overnight, so it\nthickens into a pudding consistency.\n3. Top with sliced banana, oats, or any\nfruit or toppings you like right before\nserving.\nM F B G","ingredients":"1 banana\n1 cup of greek yogurt (nonfat\nor any type)\n1 scoop vanilla protein powder\n2 tbsp chia seeds\nPinch of salt\n2 7 g 5 g 2 0 g 2 4 3","instructions":"1. Blend the banana, Greek yogurt,\nvanilla protein powder, chia seeds,\nand a pinch of salt together in a\nblender until smooth and creamy.\n2. Pour the mixture into a bowl or jar\nand place in the fridge to chill for at\nleast 45 minutes, or overnight, so it\nthickens into a pudding consistency.\n3. Top with sliced banana, oats, or any\nfruit or toppings you like right before\nserving.","notes":""},{"name":"Baked Apples","category":"Dessert","volume":2,"timing":"PRE","text":"P R E - W O R K O U T\nBAKED APPLES\nINSTRUCTIONS\n1. Preheat oven to 375\u00b0F (190\u00b0C).\n2. Slice the apple in half lengthwise. Use a spoon to\nremove the core and some of the center flesh,\ncreating a hollow center.\n3. Sprinkle each apple half with a pinch of salt and\n1/2 tsp of honey drizzled over each.\n4. Place apples cut-side up in a small dish. Set it\ninside a larger pan with about 1/2 inch of water\n(around 1 cup) to steam and soften. Bake for 25\nminutes.\n5. While apples bake, prepare the oat mixture:\ncombine oats, 2 tsp honey, vanilla, cinnamon,\nchopped nuts, and salt until slightly sticky and moist.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 4 g 6 g 4 2 g 2 5 6\n5 0 M I N S 2 S E R V I N G S\nAPPLES\n1 large apple (Honeycrisp)\n1 tsp honey (drizzled over each half before\nbaking)\nPinch of salt\n1/4\u20131/2 cup water (for baking dish)\nOAT MIXTURE\n1/3 cup old-fashioned oats\n2 tsp honey\n1/2 tsp pure vanilla extract\n1/2 tsp cinnamon\n5 walnuts (\u224812g), finely chopped\nPinch of salt\nDATE CARAMEL\n2 dates (\u224825g)\nSmall splash of water or milk to soften and mash)\nPinch of salt\nOPTIONAL TOPPING\nA scoop of greek yogurt (full-fat)\n6. Remove apples from oven, spoon the oat mixture\ninto the hollowed centers, and return to oven. Bake for\nanother 15 minutes, until golden and softened.\n7. While the apples finish baking, make the date\ncaramel: soak dates in hot water or warm milk for a\nfew minutes. Mash with a fork, adding a splash of\nliquid and a pinch of salt, until smooth and caramel\u0002like.\n8. Serve apples warm, topped with the date caramel\nand a scoop of Greek yogurt if desired.\nM F B G","ingredients":"APPLES\n1 large apple (Honeycrisp)\n1 tsp honey (drizzled over each half before\nbaking)\nPinch of salt\n1/4\u20131/2 cup water (for baking dish)\nOAT MIXTURE\n1/3 cup old-fashioned oats\n2 tsp honey\n1/2 tsp pure vanilla extract\n1/2 tsp cinnamon\n5 walnuts (\u224812g), finely chopped\nPinch of salt\nDATE CARAMEL\n2 dates (\u224825g)\nSmall splash of water or milk to soften and mash)\nPinch of salt\nOPTIONAL TOPPING\nA scoop of greek yogurt (full-fat)","instructions":"1. Preheat oven to 375\u00b0F (190\u00b0C).\n2. Slice the apple in half lengthwise. Use a spoon to\nremove the core and some of the center flesh,\ncreating a hollow center.\n3. Sprinkle each apple half with a pinch of salt and\n1/2 tsp of honey drizzled over each.\n4. Place apples cut-side up in a small dish. Set it\ninside a larger pan with about 1/2 inch of water\n(around 1 cup) to steam and soften. Bake for 25\nminutes.\n5. While apples bake, prepare the oat mixture:\ncombine oats, 2 tsp honey, vanilla, cinnamon,\nchopped nuts, and salt until slightly sticky and moist.\n6. Remove apples from oven, spoon the oat mixture\ninto the hollowed centers, and return to oven. Bake for\nanother 15 minutes, until golden and softened.\n7. While the apples finish baking, make the date\ncaramel: soak dates in hot water or warm milk for a\nfew minutes. Mash with a fork, adding a splash of\nliquid and a pinch of salt, until smooth and caramel\u0002like.\n8. Serve apples warm, topped with the date caramel\nand a scoop of Greek yogurt if desired.","notes":""},{"name":"Berry Crisp","category":"Dessert","volume":2,"timing":"PRE","text":"BERRY CRISP\nINSTRUCTIONS\n1. Preheat oven to 350\u00b0F.\n2. In a food processor, add all the base\ningredients and process until combined.\n3. Press half of the mixture firmly into the\nbottom of a 9\u00d79 baking dish.\n4. In a separate bowl, mix together all the\nberry mixture ingredients. Spread evenly\nover the base.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S\n4 g\n5 g 2 7 g 1 8 2\n3 5 M I N S 9 S E R V I N G S\nCRISP MIXTURE\n1 3/4 cups old-fashioned oats\n2 tbsp honey\n2 tbsp maple syrup\n1/2 cup walnuts (\u224845g)\n1/2 tsp cinnamon\n1/4 tsp salt\nBERRY MIXTURE\n4 cups blackberries (or berries of\nchoice)\n2 tsp maple syrup\n2 tsp honey\nOptional: 1 tbsp juice + 1 tsp lemon\nzest\n5. Bake 20\u201325 minutes, until golden.\n6. Remove from oven, let cool completely, slice,\nand enjoy.\nP R E - W O R K O U T\nNOTES:\nIf you want a crispier top, divide the crisp\nmixture in half and mix 1 teaspoon of melted\ncoconut oil into the top layer.\nFor extra protein, top it with Greek yogurt.\nM F B G","ingredients":"4 g\nCRISP MIXTURE\n1 3/4 cups old-fashioned oats\n2 tbsp honey\n2 tbsp maple syrup\n1/2 cup walnuts (\u224845g)\n1/2 tsp cinnamon\n1/4 tsp salt\nBERRY MIXTURE\n4 cups blackberries (or berries of\nchoice)\n2 tsp maple syrup\n2 tsp honey\nOptional: 1 tbsp juice + 1 tsp lemon\nzest","instructions":"1. Preheat oven to 350\u00b0F.\n2. In a food processor, add all the base\ningredients and process until combined.\n3. Press half of the mixture firmly into the\nbottom of a 9\u00d79 baking dish.\n4. In a separate bowl, mix together all the\nberry mixture ingredients. Spread evenly\nover the base.\n5. Bake 20\u201325 minutes, until golden.\n6. Remove from oven, let cool completely, slice,\nand enjoy.\nNOTES:\nIf you want a crispier top, divide the crisp\nmixture in half and mix 1 teaspoon of melted\ncoconut oil into the top layer.\nFor extra protein, top it with Greek yogurt.","notes":""},{"name":"Carrot Cake","category":"Dessert","volume":2,"timing":"POST/RECOVERY","text":"CARROT CAKE\nINSTRUCTIONS\n1. Make the Frosting:\nIn a bowl, mix coconut milk, greek yogurt, chia seeds,\nmaple syrup, cinnamon, and a pinch of salt. Stir well,\ncover, and place in the fridge for at least 30\u201340\nminutes so the chia seeds set. (For thicker frosting,\nmake it an hour+ ahead.)\n2. Preheat the oven to 350\u00b0F (175\u00b0C).\n3. Mix the dry ingredients:\nIn a large bowl, whisk together oat flour, cinnamon,\nwalnuts, baking soda, baking powder, and salt until\nwell combined.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 0 g 1 0 g 2 4 g 2 4 9\nP O S T / R E C O V E R Y 5 5 M I N S 9 S E R V I N G S\nDRY\n1 1/2 cup oat flour\n2 tsp cinnamon\n1/2 cup walnuts (\u224850g)\n1/2 tsp baking soda\n1/4 tsp baking powder\n1/4 tsp salt\nWET\n1 1/2 cup carrots (shredded)\n3 eggs\n1 tsp pure vanilla extract\n1/4 cup honey\n1/2 cup greek yogurt (nonfat)\nFROSTING\n1/2 cup coconut milk (from can)\n1/2 cup greek yogurt (nonfat)\n3 tbsp chia seeds\n1 tbsp maple syrup\n1/2 tsp cinnamon\nPinch of salt\n4. Add wet ingredients:\nStir in shredded carrots, eggs, vanilla, honey, and\ngreek yogurt. Mix until smooth and combined.\n5. Bake:\nPour batter into a greased or parchment-lined\n9x9-inch baking dish. Bake for 12\u201315 minutes until\na toothpick comes out clean.\n6. Cool, frost & store:\nLet the cake cool fully, then spread frosting\nevenly on top. Store in the fridge to keep it set\nand fresh.\nM F B G","ingredients":"DRY\n1 1/2 cup oat flour\n2 tsp cinnamon\n1/2 cup walnuts (\u224850g)\n1/2 tsp baking soda\n1/4 tsp baking powder\n1/4 tsp salt\nWET\n1 1/2 cup carrots (shredded)\n3 eggs\n1 tsp pure vanilla extract\n1/4 cup honey\n1/2 cup greek yogurt (nonfat)\nFROSTING\n1/2 cup coconut milk (from can)\n1/2 cup greek yogurt (nonfat)\n3 tbsp chia seeds\n1 tbsp maple syrup\n1/2 tsp cinnamon\nPinch of salt","instructions":"1. Make the Frosting:\nIn a bowl, mix coconut milk, greek yogurt, chia seeds,\nmaple syrup, cinnamon, and a pinch of salt. Stir well,\ncover, and place in the fridge for at least 30\u201340\nminutes so the chia seeds set. (For thicker frosting,\nmake it an hour+ ahead.)\n2. Preheat the oven to 350\u00b0F (175\u00b0C).\n3. Mix the dry ingredients:\nIn a large bowl, whisk together oat flour, cinnamon,\nwalnuts, baking soda, baking powder, and salt until\nwell combined.\n4. Add wet ingredients:\nStir in shredded carrots, eggs, vanilla, honey, and\ngreek yogurt. Mix until smooth and combined.\n5. Bake:\nPour batter into a greased or parchment-lined\n9x9-inch baking dish. Bake for 12\u201315 minutes until\na toothpick comes out clean.\n6. Cool, frost & store:\nLet the cake cool fully, then spread frosting\nevenly on top. Store in the fridge to keep it set\nand fresh.","notes":""},{"name":"Carrot Cake Cookie Dough","category":"Dessert","volume":2,"timing":"PRE/POST","text":"CARROT CAKE COOKIE DOUGH\nINSTRUCTIONS\n1. Add the oat flour, shredded carrot,\nchickpeas, bananas, vanilla protein\npowder, walnuts, honey, cinnamon,\nvanilla extract, and salt into a food\nprocessor. Blend until everything is\nfully combined and the mixture\nreaches a thick cookie-dough texture.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 4 g 6 g 3 2 g 2 5 0\nP R E & P O S T 2 5 M I N S 6 S E R V I N G S\n1 cup oat flour\n1 cup carrot (shredded)\n1 cup chickpeas\n2 bananas\n2 scoops vanilla protein\npowder (\u22483/4 cup)\n1/4 cup walnuts (\u224825g)\n2 tbsp honey\n2 tsp cinnamon\n1 tsp pure vanilla extract\n1/4 tsp salt\nM F B G\n2. Chill in the fridge for 30 minutes\nto firm up and achieve the best\ntexture before serving. Store any\nleftovers in the fridge.","ingredients":"1 cup oat flour\n1 cup carrot (shredded)\n1 cup chickpeas\n2 bananas\n2 scoops vanilla protein\npowder (\u22483/4 cup)\n1/4 cup walnuts (\u224825g)\n2 tbsp honey\n2 tsp cinnamon\n1 tsp pure vanilla extract\n1/4 tsp salt","instructions":"1. Add the oat flour, shredded carrot,\nchickpeas, bananas, vanilla protein\npowder, walnuts, honey, cinnamon,\nvanilla extract, and salt into a food\nprocessor. Blend until everything is\nfully combined and the mixture\nreaches a thick cookie-dough texture.\n2. Chill in the fridge for 30 minutes\nto firm up and achieve the best\ntexture before serving. Store any\nleftovers in the fridge.","notes":""},{"name":"Carrot Cake Cookies","category":"Dessert","volume":2,"timing":"PRE/POST","text":"CARROT CAKE COOKIES\nINSTRUCTIONS\n1. Preheat the oven to 350\u00b0F (175\u00b0C).\n2. Make the frosting:\nIn a small bowl, mix together greek yogurt, vanilla\nprotein powder, chia seeds, cinnamon, salt, and\nvanilla extract (if using). Place in the fridge while you\nmake the cookies. For a version without protein\npowder, substitute a drizzle of honey for sweetness\n\u2014 just note it will need extra time in the fridge to\nthicken.\n3. Mix the dry ingredients:\nIn a large bowl, whisk together oat flour, cinnamon,\nbaking soda, baking powder, and salt until well\ncombined.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 8 g 6 g 2 4 g 2 4 5\n4 0 M I N S 9 S E R V I N G S\nDRY\n1 1/2 cup oat flour\n2 tsp cinnamon\n1/2 tsp baking soda\n1/4 tsp baking powder\n1/4 tsp salt\nWET\n1 1/2 cup carrots (shredded)\n3 eggs\n1 tsp pure vanilla extract\n1/4 cup honey\n1/2 cup greek yogurt (nonfat)\nFROSTING\n2 cup greek yogurt (nonfat)\n2 scoops vanilla protein powder\n3 tbsp chia seeds\n1/2 tsp cinnamon\nPinch of salt\noptional: 1/2 tsp pure vanilla extract\nTOPPING\n9 walnuts (\u224820g)\nM F B G\n4. Add wet ingredients:\nStir in shredded carrots, eggs, vanilla, honey, and greek\nyogurt. Mix until smooth and combined.\n5. Chill:\nPlace the dough in the fridge for 15\u201320 minutes to firm up.\n6. Bake:\nUse an ice cream scoop or large spoon to portion the dough\ninto 9 even rounds on a parchment-lined baking sheet. Bake\nfor 10\u201312 minutes, or until lightly golden on top \u2014 don\u2019t\noverbake; pull out while still soft.\n7. Cool and finish:\nLet cookies cool completely before frosting. Top each\ncookie with a walnut, then store in the fridge after serving.\nP O S T / R E C O V E R Y","ingredients":"DRY\n1 1/2 cup oat flour\n2 tsp cinnamon\n1/2 tsp baking soda\n1/4 tsp baking powder\n1/4 tsp salt\nWET\n1 1/2 cup carrots (shredded)\n3 eggs\n1 tsp pure vanilla extract\n1/4 cup honey\n1/2 cup greek yogurt (nonfat)\nFROSTING\n2 cup greek yogurt (nonfat)\n2 scoops vanilla protein powder\n3 tbsp chia seeds\n1/2 tsp cinnamon\nPinch of salt\noptional: 1/2 tsp pure vanilla extract\nTOPPING\n9 walnuts (\u224820g)","instructions":"1. Preheat the oven to 350\u00b0F (175\u00b0C).\n2. Make the frosting:\nIn a small bowl, mix together greek yogurt, vanilla\nprotein powder, chia seeds, cinnamon, salt, and\nvanilla extract (if using). Place in the fridge while you\nmake the cookies. For a version without protein\npowder, substitute a drizzle of honey for sweetness\n\u2014 just note it will need extra time in the fridge to\nthicken.\n3. Mix the dry ingredients:\nIn a large bowl, whisk together oat flour, cinnamon,\nbaking soda, baking powder, and salt until well\ncombined.\n4. Add wet ingredients:\nStir in shredded carrots, eggs, vanilla, honey, and greek\nyogurt. Mix until smooth and combined.\n5. Chill:\nPlace the dough in the fridge for 15\u201320 minutes to firm up.\n6. Bake:\nUse an ice cream scoop or large spoon to portion the dough\ninto 9 even rounds on a parchment-lined baking sheet. Bake\nfor 10\u201312 minutes, or until lightly golden on top \u2014 don\u2019t\noverbake; pull out while still soft.\n7. Cool and finish:\nLet cookies cool completely before frosting. Top each\ncookie with a walnut, then store in the fridge after serving.","notes":""},{"name":"Energy Balls","category":"Dessert","volume":2,"timing":"PRE","text":"P R E - W O R K O U T\nENERGY BALLS\nINSTRUCTIONS\n1. Add dates, oats, cacao nibs,\nbanana, cinnamon, and salt to a\nfood processor.\n2. Blend until mixture comes\ntogether into a sticky dough.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 3 g 3 g 2 6 g 1 5 2\n1 5 M I N S 7 S E R V I N G S\n8 dates (\u2248120 g / 1 cup),\npitted\n1 cup old-fashioned oats\n3 tbsp cacao nibs\n1 banana (\u2248100 g)\n1/2 tsp cinnamon\n1/4 tsp salt\n3. Roll into 7 balls with your\nhands.\n4. Chill in fridge 15\u201320 min to\nset (optional).\nM F B G","ingredients":"8 dates (\u2248120 g / 1 cup),\npitted\n1 cup old-fashioned oats\n3 tbsp cacao nibs\n1 banana (\u2248100 g)\n1/2 tsp cinnamon\n1/4 tsp salt","instructions":"1. Add dates, oats, cacao nibs,\nbanana, cinnamon, and salt to a\nfood processor.\n2. Blend until mixture comes\ntogether into a sticky dough.\n3. Roll into 7 balls with your\nhands.\n4. Chill in fridge 15\u201320 min to\nset (optional).","notes":""},{"name":"Matcha Bowl","category":"Dessert","volume":2,"timing":"PRE/POST","text":"INSTRUCTIONS\n1 tbsp matcha\n1 banana \n1 cup greek yogurt (nonfat of any\ntype)\n1 scoop vanilla protein powder\n2 tbsp chia seeds\nPinch of salt\nMATCHA PUDDING\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S\n2 9 g 5 g 2 3 g 2 6 2 5 0 M I N S 2 S E R V I N G S\n1. Blend the matcha, banana, greek yogurt,\nvanilla protein powder, chia seeds, and a\npinch of salt together in a high-powered\nblender until thick, smooth, and fully\ncombined.\n2. Pour the mixture into a bowl or jar and\nplace it in the fridge to chill for at least 45\nminutes, or overnight, so it sets into a\ncreamy pudding consistency.\n3. Top with sliced banana, oats, or any\nfruit or toppings you like right before\nserving for extra texture and flavor.\nP O S T - W O R K O U T\nM F B G","ingredients":"1 tbsp matcha\n1 banana\n1 cup greek yogurt (nonfat of any\ntype)\n1 scoop vanilla protein powder\n2 tbsp chia seeds\nPinch of salt\nMATCHA PUDDING\n2 9 g 5 g 2 3 g 2 6 2 5 0 M I N S 2","instructions":"1. Blend the matcha, banana, greek yogurt,\nvanilla protein powder, chia seeds, and a\npinch of salt together in a high-powered\nblender until thick, smooth, and fully\ncombined.\n2. Pour the mixture into a bowl or jar and\nplace it in the fridge to chill for at least 45\nminutes, or overnight, so it sets into a\ncreamy pudding consistency.\n3. Top with sliced banana, oats, or any\nfruit or toppings you like right before\nserving for extra texture and flavor.","notes":""},{"name":"Pumpkin Bread","category":"Dessert","volume":2,"timing":"PRE/POST","text":"PUMPKIN BREAD\nINSTRUCTIONS\n1. Preheat oven to 300\u00b0F (175\u00b0C).\n2. In a large mixing bowl, whisk together all\nthe dry ingredients.\n3. In a separate bowl add and mix the wet\ningredients.\n4. Pour the wet mixture into the dry\ningredients. Mix until fully combined.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 5 g 7 g 8 g 1 5 8\n1 H R 1 5 M I N S 9 S E R V I N G S\nDRY\n3/4 cup almond flour\n1 cup vanilla protein powder (\u22483\nscoops)\n1 tsp baking powder\n1/2 teaspoon baking soda\n2 tsp cinnamon\n1/4 tsp of salt\nWET\n1 1/2 cups pumpkin puree (1 can)\n2 eggs\n1 cup geek yogurt (5% or any type)\n2 tbsp maple syrup\n1 tsp of pure vanilla extract\n5. Pour the batter into a greased or lined loaf\npan.\n6. Bake for 1 hour\n7. Remove from the oven, let cool completely,\nslice and enjoy.\nP O S T / R E C O V E R Y\nM F B G","ingredients":"DRY\n3/4 cup almond flour\n1 cup vanilla protein powder (\u22483\nscoops)\n1 tsp baking powder\n1/2 teaspoon baking soda\n2 tsp cinnamon\n1/4 tsp of salt\nWET\n1 1/2 cups pumpkin puree (1 can)\n2 eggs\n1 cup geek yogurt (5% or any type)\n2 tbsp maple syrup\n1 tsp of pure vanilla extract","instructions":"1. Preheat oven to 300\u00b0F (175\u00b0C).\n2. In a large mixing bowl, whisk together all\nthe dry ingredients.\n3. In a separate bowl add and mix the wet\ningredients.\n4. Pour the wet mixture into the dry\ningredients. Mix until fully combined.\n5. Pour the batter into a greased or lined loaf\npan.\n6. Bake for 1 hour\n7. Remove from the oven, let cool completely,\nslice and enjoy.","notes":""},{"name":"Pumpkin Cheesecake","category":"Dessert","volume":2,"timing":"POST/RECOVERY","text":"PUMPKIN CHEESECAKE\nINSTRUCTIONS\n1. Preheat the oven to 350\u00b0F (175\u00b0C).\n2. Make the crust:\nAdd all crust ingredients to a food processor and blend\nuntil well combined. (If mixing by hand, stir thoroughly\nand press firmly into a springform pan.) The dough will be\nthick, so use some muscle to pack it evenly. If it\u2019s a bit\ncrumbly, add a little extra coconut oil until it holds\ntogether.\n3. Make the cheesecake filling:\nBlend all filling ingredients until smooth. Pour over the\ncrust in the springform pan.\n4. Bake:\nBake for 28\u201330 minutes, or until set.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 6 g 1 0 g 3 6 g 3 1 1\n4 5 M I N S 1 2 S E R V I N G S\nTHE CRUST\n3 cups oat flour\n1/4 cup honey\n3 tbsp coconut oil\n2 eggs\n1 tsp cinnamon\n1/2 tsp salt\nTHE CHEESECAKE FILLING\n2 eggs\n2 cups greek yogurt (nonfat)\n2 cups cottage cheese (2%)\n1 can (15 oz) unsweetened pumpkin puree\n1/4 cup maple syrup\n2 tsp cinnamon\n1 tsp pure vanilla extract\nPinch of salt\n1/4 tsp nutmeg (optional)\nPUMPKIN FROSTING\n1/2 can coconut cream or coconut milk\n1/2 can pumpkin puree\n2 tbsp maple syrup\n2 tsp cinnamon\nPinch of salt\n5. Cool gradually (to prevent cracking):\nTurn off the oven, crack the door open, and let the\ncheesecake sit inside for 30 minutes before\nremoving.\n6. Refrigerate:\nOnce cooled, move the cheesecake to the fridge\nand chill completely.\n7. Make the pumpkin frosting:\nWhisk together coconut cream, pumpkin puree,\nmaple syrup, cinnamon, and salt until smooth and\nthick. Spread evenly over the chilled cheesecake\nbefore serving.\nP O S T / R E C O V E R Y\nM F B G","ingredients":"THE CRUST\n3 cups oat flour\n1/4 cup honey\n3 tbsp coconut oil\n2 eggs\n1 tsp cinnamon\n1/2 tsp salt\nTHE CHEESECAKE FILLING\n2 eggs\n2 cups greek yogurt (nonfat)\n2 cups cottage cheese (2%)\n1 can (15 oz) unsweetened pumpkin puree\n1/4 cup maple syrup\n2 tsp cinnamon\n1 tsp pure vanilla extract\nPinch of salt\n1/4 tsp nutmeg (optional)\nPUMPKIN FROSTING\n1/2 can coconut cream or coconut milk\n1/2 can pumpkin puree\n2 tbsp maple syrup\n2 tsp cinnamon\nPinch of salt","instructions":"1. Preheat the oven to 350\u00b0F (175\u00b0C).\n2. Make the crust:\nAdd all crust ingredients to a food processor and blend\nuntil well combined. (If mixing by hand, stir thoroughly\nand press firmly into a springform pan.) The dough will be\nthick, so use some muscle to pack it evenly. If it\u2019s a bit\ncrumbly, add a little extra coconut oil until it holds\ntogether.\n3. Make the cheesecake filling:\nBlend all filling ingredients until smooth. Pour over the\ncrust in the springform pan.\n4. Bake:\nBake for 28\u201330 minutes, or until set.\n5. Cool gradually (to prevent cracking):\nTurn off the oven, crack the door open, and let the\ncheesecake sit inside for 30 minutes before\nremoving.\n6. Refrigerate:\nOnce cooled, move the cheesecake to the fridge\nand chill completely.\n7. Make the pumpkin frosting:\nWhisk together coconut cream, pumpkin puree,\nmaple syrup, cinnamon, and salt until smooth and\nthick. Spread evenly over the chilled cheesecake\nbefore serving.","notes":""},{"name":"Pumpkin Cheesecake Cups","category":"Dessert","volume":2,"timing":"POST/RECOVERY","text":"PUMPKIN CHEESECAKE CUPS\nINSTRUCTIONS\n1. Make the Base:\nMix all base layer ingredients in a bowl. Shape into\nsmall cups on a parchment-lined tray. Stick them\nin the freezer to harden while making the filling.\n2. Make the Filling:\nBlend cottage cheese, greek yogurt, pumpkin\npur\u00e9e, vanilla, maple syrup, and cinnamon until\nsmooth. Pour into the cups. Freeze until firm\n(about 20 minutes).\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 4 g 5 g 2 5 g 2 0 9\nP O S T / R E C O V E R Y 5 5 M I N S 6 S E R V I N G S\nBASE LAYER\n1 cup oat flour\n2 tbsp honey\n1/2 tsp pure vanilla extract\n1/2 cup greek yogurt (nonfat)\n1 scoop vanilla protein powder (\u22481/3\ncup)\nPinch of salt\n1/2 tsp cinnamon\nCHEESECAKE FILLING\n1/2 cup cottage cheese (2%)\n1/2 cup greek yogurt (nonfat)\n3/4 cup unsweetened pumpkin pur\u00e9e\n1/2 tsp vanilla extract\n1 tbsp maple syrup\n1/2 tsp cinnamon\nCHOCOLATE SAUCE\n2 tbsp unsweetened cocoa powder\n1 tbsp melted coconut oil\n1 tsp maple syrup\n3. Make the Chocolate Sauce:\nMix cocoa powder, melted coconut oil, and\nmaple syrup until smooth.\n4. Assemble:\nOnce the cheesecake cups are firm, drizzle with\nchocolate sauce. Return to the freezer to set\n(about 20 minutes).\n5. Eat & Store:\nEnjoy immediately and store the rest in the\nfridge.\nM F B G","ingredients":"BASE LAYER\n1 cup oat flour\n2 tbsp honey\n1/2 tsp pure vanilla extract\n1/2 cup greek yogurt (nonfat)\n1 scoop vanilla protein powder (\u22481/3\ncup)\nPinch of salt\n1/2 tsp cinnamon\nCHEESECAKE FILLING\n1/2 cup cottage cheese (2%)\n1/2 cup greek yogurt (nonfat)\n3/4 cup unsweetened pumpkin pur\u00e9e\n1/2 tsp vanilla extract\n1 tbsp maple syrup\n1/2 tsp cinnamon\nCHOCOLATE SAUCE\n2 tbsp unsweetened cocoa powder\n1 tbsp melted coconut oil\n1 tsp maple syrup","instructions":"1. Make the Base:\nMix all base layer ingredients in a bowl. Shape into\nsmall cups on a parchment-lined tray. Stick them\nin the freezer to harden while making the filling.\n2. Make the Filling:\nBlend cottage cheese, greek yogurt, pumpkin\npur\u00e9e, vanilla, maple syrup, and cinnamon until\nsmooth. Pour into the cups. Freeze until firm\n(about 20 minutes).\n3. Make the Chocolate Sauce:\nMix cocoa powder, melted coconut oil, and\nmaple syrup until smooth.\n4. Assemble:\nOnce the cheesecake cups are firm, drizzle with\nchocolate sauce. Return to the freezer to set\n(about 20 minutes).\n5. Eat & Store:\nEnjoy immediately and store the rest in the\nfridge.","notes":""},{"name":"Pumpkin Protein Bars","category":"Dessert","volume":2,"timing":"POST/RECOVERY","text":"INSTRUCTIONS\n1 1/2 cups old-fashioned oats\n4 scoops (\u2248+1 cup) vanilla protein powder\n3/4 cup greek yogurt (nonfat or any type)\n1/2 cup unsweetened pumpkin pur\u00e9e\n1/4 cup peanut butter\n1 tsp cinnamon\n1/4 tsp salt\nCHOCOLATE SAUCE\n1/4 cup unsweetened cocoa powder\n2 tbsp melted coconut oil\nOptional: 1 tsp maple syrup\nPUMPKIN PROTEIN BARS\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S\n1 3 g 7 g 1 0 g 1 5 9\nP O S T - W O R K O U T 5 0 M I N S 1 2 S E R V I N G S\n1. Mix the Base:\nCombine all base ingredients in a bowl\nuntil smooth and fully mixed.\n2. Press into Pan:\nLine a baking dish with parchment paper\nand press the mixture evenly into it. Use\na 9\u00d79 pan for thicker bars or a 9\u00d713 pan\nfor thinner bars.\n3. Make the Chocolate Sauce:\nIn a small bowl, whisk cocoa powder,\ncoconut oil, and maple syrup (if using).\n4. Add the Topping:\nSpread the chocolate sauce over the base,\nthen freeze for 30 minutes to let them\nharden. Cut into bars, eat, and store the rest\nin the freezer for best texture.\nM F B G","ingredients":"1 1/2 cups old-fashioned oats\n4 scoops (\u2248+1 cup) vanilla protein powder\n3/4 cup greek yogurt (nonfat or any type)\n1/2 cup unsweetened pumpkin pur\u00e9e\n1/4 cup peanut butter\n1 tsp cinnamon\n1/4 tsp salt\n1/4 cup unsweetened cocoa powder\n2 tbsp melted coconut oil\nOptional: 1 tsp maple syrup\nPUMPKIN PROTEIN BARS\n1 3 g 7 g 1 0 g 1 5 9","instructions":"1. Mix the Base:\nCombine all base ingredients in a bowl\nuntil smooth and fully mixed.\n2. Press into Pan:\nLine a baking dish with parchment paper\nand press the mixture evenly into it. Use\na 9\u00d79 pan for thicker bars or a 9\u00d713 pan\nfor thinner bars.\n3. Make the Chocolate Sauce:\nIn a small bowl, whisk cocoa powder,\ncoconut oil, and maple syrup (if using).\n4. Add the Topping:\nSpread the chocolate sauce over the base,\nthen freeze for 30 minutes to let them\nharden. Cut into bars, eat, and store the rest\nin the freezer for best texture.","notes":""},{"name":"Pumpkin Pudding","category":"Dessert","volume":2,"timing":"PRE/POST","text":"INSTRUCTIONS\n1/2 cup of unsweetened pumpkin puree\n1 banana\n1 cup of greek yogurt (nonfat or any\ntype)\n1 scoop vanilla protein powder\n2 tbsp chia seeds\nPinch of salt\nPUMPKIN PUDDING\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S\n2 8 g 5 g 2 4 g 2 6 5 P O S T - W O R K O U T 5 0 M I N S 2 S E R V I N G S\n1. Blend the pumpkin pur\u00e9e, banana, greek\nyogurt, vanilla protein powder, chia seeds, and\na pinch of salt in a blender until smooth, thick,\nand fully combined.\n2. Pour the mixture into a bowl or jar and\nplace it in the fridge for at least 45 minutes, or\novernight, to let it chill and thicken into a\npudding consistency.\n3. Top with cinnamon, fruit, or any\ntoppings you like right before serving\nfor extra flavor and texture.\nM F B G","ingredients":"1/2 cup of unsweetened pumpkin puree\n1 banana\n1 cup of greek yogurt (nonfat or any\ntype)\n1 scoop vanilla protein powder\n2 tbsp chia seeds\nPinch of salt\nPUMPKIN PUDDING\n2 8 g 5 g 2 4 g 2 6 5 P O S T -  5 0 M I N S 2","instructions":"1. Blend the pumpkin pur\u00e9e, banana, greek\nyogurt, vanilla protein powder, chia seeds, and\na pinch of salt in a blender until smooth, thick,\nand fully combined.\n2. Pour the mixture into a bowl or jar and\nplace it in the fridge for at least 45 minutes, or\novernight, to let it chill and thicken into a\npudding consistency.\n3. Top with cinnamon, fruit, or any\ntoppings you like right before serving\nfor extra flavor and texture.","notes":""},{"name":"Recovery Balls","category":"Dessert","volume":2,"timing":"POST/RECOVERY","text":"P O S T / R E C O V E R Y\nRECOVERY BALLS\nINSTRUCTIONS\n1. Add oats, protein powder, greek yogurt,\nalmond butter, chia seeds, honey, and salt\nto a food processor.\n2. Blend until fully combined into a thick,\nsticky dough.\n3. Roll mixture into 8 balls.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 2 g 6 g 1 9 g 1 9 2\n1 5 M I N S 8 S E R V I N G S\n2 cups old-fashioned oats\n2 scoops vanilla protein\npowder\n1/2 cup greek yogurt (2% or\nany type)\n2 tbsp almond butter\n3 tbsp chia seeds\n1 1/2 tbsp honey\n1/2 tsp salt\n1 tbsp unsweetened cocoa\npowder (for rolling)\n4. Place cocoa powder in a small bowl\nand roll each ball to coat.\n5. Transfer to a parchment-lined\ncontainer and store in the fridge.\nM F B G","ingredients":"2 cups old-fashioned oats\n2 scoops vanilla protein\npowder\n1/2 cup greek yogurt (2% or\nany type)\n2 tbsp almond butter\n3 tbsp chia seeds\n1 1/2 tbsp honey\n1/2 tsp salt\n1 tbsp unsweetened cocoa\npowder (for rolling)","instructions":"1. Add oats, protein powder, greek yogurt,\nalmond butter, chia seeds, honey, and salt\nto a food processor.\n2. Blend until fully combined into a thick,\nsticky dough.\n3. Roll mixture into 8 balls.\n4. Place cocoa powder in a small bowl\nand roll each ball to coat.\n5. Transfer to a parchment-lined\ncontainer and store in the fridge.","notes":""},{"name":"Strawberry Bowl","category":"Dessert","volume":2,"timing":"PRE/POST","text":"1/2 cup strawberries (optional if\nusing strawberry protein powder)\n1 banana\n1 cup greek yogurt (nonfat or any\ntype)\n1 scoop strawberry or vanilla\nprotein powder\n2 tbsp chia seeds\nPinch of salt\nSTRAWBERRY PUDDING\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S\n2 8 g 5 g 2 3 g 2 5 5 P O S T - W O R K O U T 5 0 M I N S 2 S E R V I N G S\n1. Blend the banana, Greek yogurt,\nchia seeds, protein powder, and pinch\nof salt until smooth. If using vanilla\nprotein powder, add the strawberries\nbefore blending. If using strawberry\nprotein powder, you can skip the fresh\nstrawberries.\n2. Pour into a bowl and chill in the\nfridge for 45 minutes or overnight\nto set.\n3. Top with fresh berries or any\ntoppings of your choice.\nINSTRUCTIONS\nM F B G","ingredients":"1/2 cup strawberries (optional if\nusing strawberry protein powder)\n1 banana\n1 cup greek yogurt (nonfat or any\ntype)\n1 scoop strawberry or vanilla\nprotein powder\n2 tbsp chia seeds\nPinch of salt\nSTRAWBERRY PUDDING\n2 8 g 5 g 2 3 g 2 5 5 P O S T -  5 0 M I N S 2","instructions":"1. Blend the banana, Greek yogurt,\nchia seeds, protein powder, and pinch\nof salt until smooth. If using vanilla\nprotein powder, add the strawberries\nbefore blending. If using strawberry\nprotein powder, you can skip the fresh\nstrawberries.\n2. Pour into a bowl and chill in the\nfridge for 45 minutes or overnight\nto set.\n3. Top with fresh berries or any\ntoppings of your choice.\nINSTRUCTIONS","notes":""},{"name":"Mashed Sweet Potatoes","category":"Snacks & Sides","volume":2,"timing":"PRE/POST","text":"MASHED SWEET POTATOES\nINSTRUCTIONS\n1. Prep the sweet potatoes:\nPeel the potatoes and cut into chunks.\n2. Boil:\nPlace potatoes into a large pot of boiling\nwater. Cook for 15-20 minutes, or until\npotatoes are completely tender (test with\na fork).\n3. Drain:\nRemove potatoes from boiling water and\ndrain well.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 5 g 6 g 2 g 8 0\n3 5 M I N S 5 S E R V I N G S\n2 large sweet potatoes (or any type)\n1/2 cups parmesan cheese, shredded\n1 cup cottage cheese (2% or any type)\n2 garlic cloves, minced\n1/4 tsp salt\n1/4 tsp pepper\n4. Blend:\nAdd the potatoes, parmesan, garlic, salt,\nand pepper into a blender or food\nprocessor. Blend until completely smooth\nand creamy.\n5. Serve:\nTaste and adjust seasoning if needed.\nR E C O V E R Y\nM F B G","ingredients":"2 large sweet potatoes (or any type)\n1/2 cups parmesan cheese, shredded\n1 cup cottage cheese (2% or any type)\n2 garlic cloves, minced\n1/4 tsp salt\n1/4 tsp pepper","instructions":"1. Prep the sweet potatoes:\nPeel the potatoes and cut into chunks.\n2. Boil:\nPlace potatoes into a large pot of boiling\nwater. Cook for 15-20 minutes, or until\npotatoes are completely tender (test with\na fork).\n3. Drain:\nRemove potatoes from boiling water and\ndrain well.\n4. Blend:\nAdd the potatoes, parmesan, garlic, salt,\nand pepper into a blender or food\nprocessor. Blend until completely smooth\nand creamy.\n5. Serve:\nTaste and adjust seasoning if needed.","notes":""},{"name":"Potato Salad","category":"Snacks & Sides","volume":2,"timing":"RECOVERY","text":"POTATO SALAD\nINSTRUCTIONS\n1. Cook Boil the Eggs\nPlace the eggs in a pot, cover with water, and bring to a\nboil. Once boiling, reduce heat and simmer for 10\u201312\nminutes. Transfer eggs to an ice bath to cool completely.\n2. Cook the Potatoes\nCut the red potatoes into bite-sized chunks (slightly\nsmaller than quarters). Add to a large pot of salted\nwater and boil until fork tender, about 10\u201312 minutes.\nDrain and let cool.\n3. Prep the Vegetables\nWhile potatoes and eggs cool, finely dice the red onion,\nand chop the red pepper, celery, dill, and parsley (if\nusing). Set aside.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 1 g 5 g 2 1 g 1 8 7\n5 0 M I N S 6 S E R V I N G S\nPOTATO BASE\n6 medium red potatoes (\u2248700g)\n1 red pepper, diced\n1/2 red onion, finely diced\n2 cups celery (\u22485 stalks), chopped\n2 tbsp fresh dill, chopped\nOptional: 2 tbsp parsley, chopped\nsliced green onion (for topping)\nMFBG POTATO SALAD SAUCE\n1 cup greek yogurt (nonfat or any type)\n4 hard-boiled eggs\n2 1/2 tbsp whole grain mustard\n2 tbsp lemon juice\n2 garlic cloves\n1 tsp paprika\n1 tsp cumin\n2 tsp salt\n1/2 tsp black pepper\n4. Make the Sauce\nPeel the cooled hard-boiled eggs. Add them to a\nblender with the greek yogurt, mustard, lemon\njuice, garlic, paprika, cumin, salt, and pepper.\nBlend until smooth and creamy. If the sauce is too\nthick, add a little bit more lemon juice until you\nreach your desired consistency.\n5. Combine Everything\nIn a large bowl, add the cooled potatoes, chopped\nvegetables, dill, and parsley (if using) . Pour the\nsauce over and toss until evenly coated. Taste\ntest, and adjust with salt if needed.\n6. Finish\nTop with green onion, chill, and store in the fridge.\nP O S T / R E C O V E R Y\nM F B G","ingredients":"POTATO BASE\n6 medium red potatoes (\u2248700g)\n1 red pepper, diced\n1/2 red onion, finely diced\n2 cups celery (\u22485 stalks), chopped\n2 tbsp fresh dill, chopped\nOptional: 2 tbsp parsley, chopped\nsliced green onion (for topping)\nPOTATO SALAD SAUCE\n1 cup greek yogurt (nonfat or any type)\n4 hard-boiled eggs\n2 1/2 tbsp whole grain mustard\n2 tbsp lemon juice\n2 garlic cloves\n1 tsp paprika\n1 tsp cumin\n2 tsp salt\n1/2 tsp black pepper","instructions":"1. Cook Boil the Eggs\nPlace the eggs in a pot, cover with water, and bring to a\nboil. Once boiling, reduce heat and simmer for 10\u201312\nminutes. Transfer eggs to an ice bath to cool completely.\n2. Cook the Potatoes\nCut the red potatoes into bite-sized chunks (slightly\nsmaller than quarters). Add to a large pot of salted\nwater and boil until fork tender, about 10\u201312 minutes.\nDrain and let cool.\n3. Prep the Vegetables\nWhile potatoes and eggs cool, finely dice the red onion,\nand chop the red pepper, celery, dill, and parsley (if\nusing). Set aside.\n4. Make the Sauce\nPeel the cooled hard-boiled eggs. Add them to a\nblender with the greek yogurt, mustard, lemon\njuice, garlic, paprika, cumin, salt, and pepper.\nBlend until smooth and creamy. If the sauce is too\nthick, add a little bit more lemon juice until you\nreach your desired consistency.\n5. Combine Everything\nIn a large bowl, add the cooled potatoes, chopped\nvegetables, dill, and parsley (if using) . Pour the\nsauce over and toss until evenly coated. Taste\ntest, and adjust with salt if needed.\n6. Finish\nTop with green onion, chill, and store in the fridge.","notes":""},{"name":"Quinoa","category":"Snacks & Sides","volume":2,"timing":"PRE/POST","text":"QUINOA\nINSTRUCTIONS\n1. Make the Tomato Blend:\nBlend the roma tomatoes with salt and pepper\nuntil smooth. Set aside.\n2. Saut\u00e9 the Aromatics:\nHeat olive oil in a large skillet over medium heat.\nAdd the diced onion and minced garlic; cook until\ntranslucent.\n3. Toast the Quinoa:\nAdd the dry quinoa to the skillet and cook for 3\u20135\nminutes, stirring often.\n4. Add the Tomato Blend:\nPour in the blended tomato mixture. Stir and\ncook on medium-high for about 3 minutes, until\nthe color deepens to a rich reddish-orange.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 8 g 6 g 3 0 g 2 2 1\n4 0 M I N S 4 S E R V I N G S\nBASE\n1 cup quinoa\n1/2 yellow onion, diced\n3 garlic cloves, minced\n3 tbsp olive oil\nTOMATO BLEND\n4 roma tomatoes\n1 tsp salt\n1/4 tsp black pepper\nTOPPINGS\n1/4 cup fresh cilantro\n1 lime\nOptional: 1 jalape\u00f1o, halved\n5. Simmer:\nAdd 2 cups of warm water. Stir, then place the\nhalved jalape\u00f1o and a few sprigs of cilantro on top.\nReduce heat to low, cover, and simmer for 25\u201330\nminutes, or until all liquid is absorbed.\n6. Finish:\nRemove the lid, fluff with a fork, and season to taste\nwith more salt if needed. Top with lime juice and\nextra chopped cilantro before serving.\nP O S T / R E C O V E R Y\nM F B G","ingredients":"BASE\n1 cup quinoa\n1/2 yellow onion, diced\n3 garlic cloves, minced\n3 tbsp olive oil\nTOMATO BLEND\n4 roma tomatoes\n1 tsp salt\n1/4 tsp black pepper\nTOPPINGS\n1/4 cup fresh cilantro\n1 lime\nOptional: 1 jalape\u00f1o, halved","instructions":"1. Make the Tomato Blend:\nBlend the roma tomatoes with salt and pepper\nuntil smooth. Set aside.\n2. Saut\u00e9 the Aromatics:\nHeat olive oil in a large skillet over medium heat.\nAdd the diced onion and minced garlic; cook until\ntranslucent.\n3. Toast the Quinoa:\nAdd the dry quinoa to the skillet and cook for 3\u20135\nminutes, stirring often.\n4. Add the Tomato Blend:\nPour in the blended tomato mixture. Stir and\ncook on medium-high for about 3 minutes, until\nthe color deepens to a rich reddish-orange.\n5. Simmer:\nAdd 2 cups of warm water. Stir, then place the\nhalved jalape\u00f1o and a few sprigs of cilantro on top.\nReduce heat to low, cover, and simmer for 25\u201330\nminutes, or until all liquid is absorbed.\n6. Finish:\nRemove the lid, fluff with a fork, and season to taste\nwith more salt if needed. Top with lime juice and\nextra chopped cilantro before serving.","notes":""},{"name":"Smashed Potatoes","category":"Snacks & Sides","volume":2,"timing":"PRE/POST","text":"SMASHED POTATOES\nINSTRUCTIONS\n1. Preheat the oven to 400\u00b0F.\n2. Boil the potatoes for about 30 minutes, or until tender.\n3. Drain and let them dry for 5 minutes.\n4. Transfer to a parchment-lined baking sheet and smash flat using a\nfork or the palm of your hand. The thinner they are, the crispier they\u2019ll\nget.\n5. Spray lightly with avocado oil and season with salt and pepper.\n6. Bake for 40\u201345 minutes, until golden and crisp.\nMake the Sauce:\n7. While the potatoes bake, saut\u00e9 the chopped onion and minced garlic\nin 1 tsp olive oil or avocado spray over medium heat until translucent.\n8. Deglaze with 1/4 cup lime juice, scraping up any bits from the pan.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 6 g 7 g 2 8 g 1 9 6\n1 H R 6 S E R V I N G S\nPOTATOES\n2 lb small potatoes (fingerling or petite)\n1 tbsp avocado spray\nSalt and pepper\nSAUCE\n1/2 yellow onion, chopped\n2 garlic cloves, minced\n1/4 cup lime juice\n1 tbsp ginger, shredded\n1 jalape\u00f1o, finely chopped\n3 tbsp tomato paste\n2 tbsp soy sauce (or tamari, no additives)\n1/2 cup coconut milk (from can, no additives)\n1/2 cup greek yogurt (nonfat)\n1 tsp olive oil (or avocado oil)\nOptional toppings:\nGreen onion, chopped\nRed pepper, finely diced\n9. Add the chopped jalape\u00f1o and shredded ginger, and\ncook for 1\u20132 minutes.\n10. Stir in the tomato paste and cook another 1\u20132 minutes.\n11. Cut the heat and stir in the soy sauce.\n12. As the sauce cools slightly, mix the coconut milk and\ngreek yogurt together in a separate bowl, then slowly add\nthat mixture to the pan. Stir until the sauce becomes smooth\nand orange.\n13. Once the potatoes are done, toss them with the sauce\nuntil evenly coated.\n14. Top with chopped green onion and red pepper if\ndesired.\nP O S T / R E C O V E R Y\nM F B G","ingredients":"POTATOES\n2 lb small potatoes (fingerling or petite)\n1 tbsp avocado spray\nSalt and pepper\nSAUCE\n1/2 yellow onion, chopped\n2 garlic cloves, minced\n1/4 cup lime juice\n1 tbsp ginger, shredded\n1 jalape\u00f1o, finely chopped\n3 tbsp tomato paste\n2 tbsp soy sauce (or tamari, no additives)\n1/2 cup coconut milk (from can, no additives)\n1/2 cup greek yogurt (nonfat)\n1 tsp olive oil (or avocado oil)\nOptional toppings:\nGreen onion, chopped\nRed pepper, finely diced","instructions":"1. Preheat the oven to 400\u00b0F.\n2. Boil the potatoes for about 30 minutes, or until tender.\n3. Drain and let them dry for 5 minutes.\n4. Transfer to a parchment-lined baking sheet and smash flat using a\nfork or the palm of your hand. The thinner they are, the crispier they\u2019ll\nget.\n5. Spray lightly with avocado oil and season with salt and pepper.\n6. Bake for 40\u201345 minutes, until golden and crisp.\nMake the Sauce:\n7. While the potatoes bake, saut\u00e9 the chopped onion and minced garlic\nin 1 tsp olive oil or avocado spray over medium heat until translucent.\n8. Deglaze with 1/4 cup lime juice, scraping up any bits from the pan.\n9. Add the chopped jalape\u00f1o and shredded ginger, and\ncook for 1\u20132 minutes.\n10. Stir in the tomato paste and cook another 1\u20132 minutes.\n11. Cut the heat and stir in the soy sauce.\n12. As the sauce cools slightly, mix the coconut milk and\ngreek yogurt together in a separate bowl, then slowly add\nthat mixture to the pan. Stir until the sauce becomes smooth\nand orange.\n13. Once the potatoes are done, toss them with the sauce\nuntil evenly coated.\n14. Top with chopped green onion and red pepper if\ndesired.","notes":""},{"name":"Southwest Chicken Salad","category":"Snacks & Sides","volume":2,"timing":"POST/RECOVERY","text":"SOUTHWEST CHICKEN SALAD\nINSTRUCTIONS\n1. Cook the chicken:\nSeason with the listed seasonings. Sear in a lightly\noiled skillet over medium-high, 3\u20134 minutes per side,\nuntil cooked through. Rest, then dice.\n2. Prep the salad:\nRinse and drain black beans. Dice onion, chop kale,\nhalve tomatoes, dice avocados, and chop cilantro.\nDrain corn if canned.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 2 8 g 1 0 g 1 5 g 2 8 0\n4 0 M I N S 6 S E R V I N G S\nFOR THE CHICKEN:\n1 lb chicken breast\nSeasonings: 1 tsp paprika, 1 tsp garlic powder,\n1/2 tsp salt, & 1/2 tsp black pepper\nFOR THE SALAD\n1/4 red onion, diced\n1 1/2 cups black beans (1 can rinsed and drained)\n2 cups kale, chopped\n1 cup cherry tomatoes, halved\n1/4 cup cilantro, chopped\n2 avocados, diced (250g without skin or core)\n1 1/2 cups corn (1 can)\nFOR THE MFBG ADOBO SAUCE\n1/2 cup greek yogurt (nonfat or any type)\n1/2 cup cottage cheese (2%)\n2 tbsp lime juice\nWater (for consistency)\nSeasonings: 1 garlic clove, 1 tsp smoked paprika,\n1/4 tsp chili powder, pinch cayenne, pinch\ncumin, pinch salt and pepper\n3. Make the MFBG sauce:\nBlend greek yogurt, cottage cheese, garlic, lime\njuice, and spices until smooth; thin with water to\ndesired consistency.\n4. Assemble:\nIn a large bowl, combine chicken, beans, kale,\ntomatoes, avocado, corn, onion, and cilantro. Add\nsauce and toss to coat.\n5. Serve:\nTaste and adjust salt and lime. Garnish with a little\nextra cilantro.\nP O S T / R E C O V E R Y\nM F B G","ingredients":"FOR THE CHICKEN:\n1 lb chicken breast\nSeasonings: 1 tsp paprika, 1 tsp garlic powder,\n1/2 tsp salt, & 1/2 tsp black pepper\nFOR THE SALAD\n1/4 red onion, diced\n1 1/2 cups black beans (1 can rinsed and drained)\n2 cups kale, chopped\n1 cup cherry tomatoes, halved\n1/4 cup cilantro, chopped\n2 avocados, diced (250g without skin or core)\n1 1/2 cups corn (1 can)\nFOR THE  ADOBO SAUCE\n1/2 cup greek yogurt (nonfat or any type)\n1/2 cup cottage cheese (2%)\n2 tbsp lime juice\nWater (for consistency)\nSeasonings: 1 garlic clove, 1 tsp smoked paprika,\n1/4 tsp chili powder, pinch cayenne, pinch\ncumin, pinch salt and pepper","instructions":"1. Cook the chicken:\nSeason with the listed seasonings. Sear in a lightly\noiled skillet over medium-high, 3\u20134 minutes per side,\nuntil cooked through. Rest, then dice.\n2. Prep the salad:\nRinse and drain black beans. Dice onion, chop kale,\nhalve tomatoes, dice avocados, and chop cilantro.\nDrain corn if canned.\n3. Make the  sauce:\nBlend greek yogurt, cottage cheese, garlic, lime\njuice, and spices until smooth; thin with water to\ndesired consistency.\n4. Assemble:\nIn a large bowl, combine chicken, beans, kale,\ntomatoes, avocado, corn, onion, and cilantro. Add\nsauce and toss to coat.\n5. Serve:\nTaste and adjust salt and lime. Garnish with a little\nextra cilantro.","notes":""},{"name":"Adobo Sauce","category":"Sauces","volume":2,"timing":"","text":"ADOBO SAUCE\nINSTRUCTIONS\n1. Add everything into a blender,\nmaking sure the yogurt and cottage\ncheese go in first so it blends easier.\n2. Blend until completely smooth.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 5 g 6 g 2 g 8 0\n1 5 M I N S 4 S E R V I N G S\n1/2 cup greek yogurt (nonfat or any type)\n1/2 cup cottage cheese\n1 garlic clove\n2 tbsp lime juice\n1 tsp smoked paprika\n1/4 tsp chili powder\nShake of cayenne pepper\nShake of cumin\nPinch of salt\nPinch of pepper\nWater (if needed for texture)\nM F B G\n3. Taste and adjust. If the sauce is\ntoo thick, add a small splash of\nwater or more lime juice and\nblend again until it reaches your\npreferred consistency.\nP O S T / R E C O V E R Y","ingredients":"1/2 cup greek yogurt (nonfat or any type)\n1/2 cup cottage cheese\n1 garlic clove\n2 tbsp lime juice\n1 tsp smoked paprika\n1/4 tsp chili powder\nShake of cayenne pepper\nShake of cumin\nPinch of salt\nPinch of pepper\nWater (if needed for texture)","instructions":"1. Add everything into a blender,\nmaking sure the yogurt and cottage\ncheese go in first so it blends easier.\n2. Blend until completely smooth.\n3. Taste and adjust. If the sauce is\ntoo thick, add a small splash of\nwater or more lime juice and\nblend again until it reaches your\npreferred consistency.","notes":""},{"name":"Avocado Sauce","category":"Sauces","volume":2,"timing":"","text":"AVOCADO SAUCE\nINSTRUCTIONS\n1. Char the jalape\u00f1o:\nUse tongs to hold it over an open\nflame, turning every 20\u201330 seconds\nuntil blackened.\nCover in a bowl for 5\u201310 minutes to\nsteam.\nPeel (optional), then slice, remove\nseeds, and add to the blender.\n2. Add the jalape\u00f1o and all other\ningredients into a blender.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 5 g 7 g 2 g 9 3\n2 0 M I N S 6 S E R V I N G S\n2 avocados (250g without skin or core)\n2 tbsp lime juice\n2 tbsp apple cider vinegar\n1 jalape\u00f1o (charred)\n1/2 cup of cottage cheese\n1/4 cup cilantro\n1/4 tsp salt\nWater (if needed for texture)\n3. Blend until creamy and fully\ncombined.\n4. Add water a little at a time until\nyou reach your desired consistency.\n5. Serve & Store : Use sauce\nimmediately or store in air-tight\ncontainer in fridge. To prevent from\nbrowning, press plastic wrap directly\nonto surface of wrap.\nP O S T / R E C O V E R Y\nM F B G","ingredients":"2 avocados (250g without skin or core)\n2 tbsp lime juice\n2 tbsp apple cider vinegar\n1 jalape\u00f1o (charred)\n1/2 cup of cottage cheese\n1/4 cup cilantro\n1/4 tsp salt\nWater (if needed for texture)","instructions":"1. Char the jalape\u00f1o:\nUse tongs to hold it over an open\nflame, turning every 20\u201330 seconds\nuntil blackened.\nCover in a bowl for 5\u201310 minutes to\nsteam.\nPeel (optional), then slice, remove\nseeds, and add to the blender.\n2. Add the jalape\u00f1o and all other\ningredients into a blender.\n3. Blend until creamy and fully\ncombined.\n4. Add water a little at a time until\nyou reach your desired consistency.\n5. Serve & Store : Use sauce\nimmediately or store in air-tight\ncontainer in fridge. To prevent from\nbrowning, press plastic wrap directly\nonto surface of wrap.","notes":""},{"name":"Beet Sauce","category":"Sauces","volume":2,"timing":"","text":"BEET SAUCE\nINSTRUCTIONS\n1. Boil or roast beets until tender,\nthen let cool slightly.\n2. Add all ingredients to a blender\nand blend until completely smooth.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 6 g 4 g 3 g 6 5\n3 0 M I N S 6 S E R V I N G S\n1\u20132 beets (\u2248150g), boiled or roasted\n2 tbsp tahini\n3/4 cup cottage cheese (2%)\n1 tbsp apple cider vinegar\n1 garlic clove\n1/4 tsp salt\nA few cracks of black pepper\nWater (if needed for texture)\nM F B G\n3. If the mixture is too thick, slowly\nadd a splash of water while blending\nuntil your desired consistency is\nreached.\n4. Taste and adjust salt or vinegar\nas needed.\nP O S T / R E C O V E R Y","ingredients":"1\u20132 beets (\u2248150g), boiled or roasted\n2 tbsp tahini\n3/4 cup cottage cheese (2%)\n1 tbsp apple cider vinegar\n1 garlic clove\n1/4 tsp salt\nA few cracks of black pepper\nWater (if needed for texture)","instructions":"1. Boil or roast beets until tender,\nthen let cool slightly.\n2. Add all ingredients to a blender\nand blend until completely smooth.\n3. If the mixture is too thick, slowly\nadd a splash of water while blending\nuntil your desired consistency is\nreached.\n4. Taste and adjust salt or vinegar\nas needed.","notes":""},{"name":"Ranch","category":"Sauces","volume":2,"timing":"","text":"RANCH\nINSTRUCTIONS\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 5 g 2 g 2 g 4 9\n1 5 M I N S 4 S E R V I N G S\n1/2 cup cottage cheese (4%\nor any type)\n1/2 cup greek yogurt (5% or\nany type)\n1 garlic clove\n2 tbsp fresh dill\n1 tbsp green onion\n1 tbsp lemon juice\n1/4 salt\n1/4 tsp pepper\nWater (if needed for texture)\nM F B G\nP O S T / R E C O V E R Y\n1. Add everything into a blender,\nmaking sure the yogurt and cottage\ncheese go in first so it blends\neasier.\n2. Blend until completely smooth.\n3. Taste and adjust. If the sauce\nis too thick, add a small splash of\nwater or more lemon juice juice\nand blend again until it reaches\nyour preferred consistency.","ingredients":"INSTRUCTIONS\n1/2 cup cottage cheese (4%\nor any type)\n1/2 cup greek yogurt (5% or\nany type)\n1 garlic clove\n2 tbsp fresh dill\n1 tbsp green onion\n1 tbsp lemon juice\n1/4 salt\n1/4 tsp pepper\nWater (if needed for texture)","instructions":"1. Add everything into a blender,\nmaking sure the yogurt and cottage\ncheese go in first so it blends\neasier.\n2. Blend until completely smooth.\n3. Taste and adjust. If the sauce\nis too thick, add a small splash of\nwater or more lemon juice juice\nand blend again until it reaches\nyour preferred consistency.","notes":""},{"name":"Tahini Sauce","category":"Sauces","volume":2,"timing":"","text":"TAHINI SAUCE\nINSTRUCTIONS\n1. Mince the garlic and add all\ningredients to a bowl.\n2. Mix until smooth and creamy.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 3 g 6 g 6 g 9 0\n1 5 M I N S 6 S E R V I N G S\n1/4 cup tahini\n1/4 cup apple cider vinegar\n1 1/2 tbsp honey\n1/4 cup greek yogurt (nonfat)\n2 garlic cloves, minced\n1/4 tsp salt\nA few cracks of black pepper\nWater (if needed for texture)\nM F B G\n3. Thin with water, a little at\na time, until you reach your\ndesired consistency.\nP O S T / R E C O V E R Y","ingredients":"1/4 cup tahini\n1/4 cup apple cider vinegar\n1 1/2 tbsp honey\n1/4 cup greek yogurt (nonfat)\n2 garlic cloves, minced\n1/4 tsp salt\nA few cracks of black pepper\nWater (if needed for texture)","instructions":"1. Mince the garlic and add all\ningredients to a bowl.\n2. Mix until smooth and creamy.\n3. Thin with water, a little at\na time, until you reach your\ndesired consistency.","notes":""},{"name":"Mustard Parmesan Sauce","category":"Sauces","volume":2,"timing":"","text":"MUSTARD PARMESAN SAUCE\nINSTRUCTIONS\n1. In a bowl, combine lemon\njuice, minced garlic, egg yolk,\nParmesan, Greek yogurt, whole\u0002grain mustard, salt, and pepper.\n2. Mix well until smooth and\nfully combined.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 6 g 5 g 3 g 8 5\nP O S T / R E C O V E R Y 1 5 M I N S 3 S E R V I N G S\n1 tbsp + 1 tsp whole grain mustard\n2 tbsp lemon juice\n1 egg yolk\n2 garlic cloves, minced\n1/4 cup freshly grated Parmesan\n1/4 cup greek yogurt (nonfat,\nplus more for thickness if\nneeded)\nSalt & pepper to taste\n3. If the sauce is too thin, add a little\nextra Greek yogurt to thicken.\n4. For best flavor and texture,\nrefrigerate for 20\u201330 minutes before\nserving to let it thicken and meld.\nM F B G","ingredients":"1 tbsp + 1 tsp whole grain mustard\n2 tbsp lemon juice\n1 egg yolk\n2 garlic cloves, minced\n1/4 cup freshly grated Parmesan\n1/4 cup greek yogurt (nonfat,\nplus more for thickness if\nneeded)\nSalt & pepper to taste","instructions":"1. In a bowl, combine lemon\njuice, minced garlic, egg yolk,\nParmesan, Greek yogurt, whole\u0002grain mustard, salt, and pepper.\n2. Mix well until smooth and\nfully combined.\n3. If the sauce is too thin, add a little\nextra Greek yogurt to thicken.\n4. For best flavor and texture,\nrefrigerate for 20\u201330 minutes before\nserving to let it thicken and meld.","notes":""}]
</script>
<script>
(function(){
  var RECIPES = JSON.parse(document.getElementById('recipe-data').textContent);
  var CATS = ['Breakfast','Dinner','Dessert','Snacks & Sides','Sauces'];
  var st = {vol:'all', cat:'all', timing:'all', q:''};

  function tags(t){
    if(!t) return '';
    var m={PRE:'pre',POST:'post',RECOVERY:'rec'};
    var l={PRE:'Pre-Workout',POST:'Post-Workout',RECOVERY:'Recovery'};
    return t.split('/').map(function(x){return '<span class="tag '+(m[x]||'')+'">'+(l[x]||x)+'</span>';}).join('');
  }

  function hasTiming(r,t){
    if(t==='all') return true;
    return r.timing && r.timing.indexOf(t)!==-1;
  }

  function getFiltered(){
    var q=st.q.toLowerCase();
    return RECIPES.filter(function(r){
      if(st.vol!=='all' && r.volume!==st.vol) return false;
      if(st.cat!=='all' && r.category!==st.cat) return false;
      if(!hasTiming(r,st.timing)) return false;
      if(q && r.name.toLowerCase().indexOf(q)===-1
           && r.ingredients.toLowerCase().indexOf(q)===-1
           && r.instructions.toLowerCase().indexOf(q)===-1) return false;
      return true;
    });
  }

  function render(){
    var f=getFiltered();
    document.getElementById('countBadge').textContent=f.length+' recipe'+(f.length!==1?'s':'');
    var el=document.getElementById('content');
    if(!f.length){
      el.innerHTML='<div class="nores"><div class="nores-t">NO RECIPES FOUND</div><p>Adjust your filters or search</p></div>';
      return;
    }
    var cats=st.cat==='all'?CATS:[st.cat];
    var html='';
    cats.forEach(function(cat){
      var list=f.filter(function(r){return r.category===cat;});
      if(!list.length) return;
      html+='<div class="sec"><div class="cat-hdr"><div class="cat-title">'+cat.toUpperCase()+'</div><div class="cat-line"></div><div class="cat-ct">'+list.length+'</div></div><div class="grid">';
      list.forEach(function(r){
        var idx=RECIPES.indexOf(r);
        html+='<div class="card" data-idx="'+idx+'"><div class="c-vol">VOL. '+r.volume+'</div><div class="c-name">'+r.name+'</div><div class="c-tags">'+tags(r.timing)+'</div></div>';
      });
      html+='</div></div>';
    });
    el.innerHTML=html;
    el.querySelectorAll('.card').forEach(function(c){
      c.addEventListener('click',function(){openModal(parseInt(c.dataset.idx));});
    });
  }

  function setActive(prefix,ids,val){
    ids.forEach(function(x){
      var b=document.getElementById(prefix+x);
      if(b) b.classList.toggle('on',x===val);
    });
  }

  function renderIngredients(text){
    // Build ingredient list HTML — detect section headers (all-caps short lines)
    var html='';
    var lines=text.split('\n');
    for(var i=0;i<lines.length;i++){
      var ln=lines[i].trim();
      if(!ln) continue;
      // Section header: all uppercase, no digits at start, short
      if(/^[A-Z][A-Z\s&\/\-]+$/.test(ln) && ln.length < 35){
        html+='<li class="ing-section-hdr">'+ln+'</li>';
      } else {
        html+='<li>'+ln+'</li>';
      }
    }
    return html;
  }

  function openModal(idx){
    var r=RECIPES[idx];
    document.getElementById('mVol').textContent='VOL. '+r.volume;
    document.getElementById('mCat').textContent=r.category;
    document.getElementById('mTitle').textContent=r.name;
    document.getElementById('mTags').innerHTML=tags(r.timing);
    document.getElementById('mIngredients').innerHTML=renderIngredients(r.ingredients||'');
    document.getElementById('mInstructions').textContent=(r.instructions||'').trim();
    var nw=document.getElementById('mNotesWrap');
    if(r.notes && r.notes.trim()){
      document.getElementById('mNotes').textContent=r.notes.trim();
      nw.style.display='block';
    } else {
      nw.style.display='none';
    }
    document.getElementById('overlay').classList.add('open');
    document.getElementById('overlay').scrollTop=0;
    document.querySelector('.modal').scrollTop=0;
    document.body.style.overflow='hidden';
  }

  function closeModal(){
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow='';
  }

  var catIds=['all','Breakfast','Dinner','Dessert','Snacks','Sauces'];
  var catVals=['all','Breakfast','Dinner','Dessert','Snacks & Sides','Sauces'];
  var timIds=['all','PRE','POST','REC'];
  var timVals=['all','PRE','POST','RECOVERY'];

  document.getElementById('vbtn-all').onclick=function(){st.vol='all';setActive('vbtn-',['all','1','2'],'all');render();};
  document.getElementById('vbtn-1').onclick=function(){st.vol=1;setActive('vbtn-',['all','1','2'],'1');render();};
  document.getElementById('vbtn-2').onclick=function(){st.vol=2;setActive('vbtn-',['all','1','2'],'2');render();};
  catIds.forEach(function(id,i){
    var b=document.getElementById('cbtn-'+id);
    if(b) b.onclick=function(){st.cat=catVals[i];setActive('cbtn-',catIds,id);render();};
  });
  timIds.forEach(function(id,i){
    var b=document.getElementById('tbtn-'+id);
    if(b) b.onclick=function(){st.timing=timVals[i];setActive('tbtn-',timIds,id);render();};
  });
  document.getElementById('searchInput').oninput=function(){st.q=this.value;render();};
  document.getElementById('logoBtn').onclick=function(){
    st={vol:'all',cat:'all',timing:'all',q:''};
    document.getElementById('searchInput').value='';
    setActive('vbtn-',['all','1','2'],'all');
    setActive('cbtn-',catIds,'all');
    setActive('tbtn-',timIds,'all');
    render();
  };
  document.getElementById('mClose').onclick=closeModal;
  document.getElementById('overlay').onclick=function(e){if(e.target===this)closeModal();};
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape') closeModal();
    if(e.key==='/' && document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('searchInput').focus();}
  });

  render();
})();
</script>
</body>
</html>
