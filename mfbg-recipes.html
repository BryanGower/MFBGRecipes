<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFBG RECIPES</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Han+Sans&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f0e8;--red:#d42b2b;--orange:#e85d04;--yellow:#f9a825;--card:#111;--border:#252525;--muted:#555}
body{background:var(--black);color:var(--white);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:#2a2a2a}
.header{position:sticky;top:0;z-index:100;background:var(--black);border-bottom:1px solid var(--border);padding:0 24px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:20px;height:60px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--red);flex-shrink:0;cursor:pointer;user-select:none}
.logo span{color:var(--white)}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;background:#161616;border:1px solid var(--border);color:var(--white);font-family:'DM Mono',monospace;font-size:13px;padding:9px 16px 9px 36px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--red)}
.search-wrap input::placeholder{color:var(--muted)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.count-badge{font-size:11px;color:var(--muted);flex-shrink:0;white-space:nowrap}
.layout{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 60px)}
.sidebar{border-right:1px solid var(--border);padding:20px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}
.s-section{margin-bottom:22px}
.s-label{font-size:9px;letter-spacing:3px;color:var(--muted);padding:0 18px;margin-bottom:6px;text-transform:uppercase;display:block}
.f-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 18px;background:none;border:none;color:rgba(245,240,232,0.5);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;text-align:left;transition:all .15s}
.f-btn:hover{color:var(--white);background:#161616}
.f-btn.on{color:var(--red);background:#1a0000}
.f-btn .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;margin-right:7px;opacity:0}
.f-btn.on .dot{opacity:1}
.fl{display:flex;align-items:center}
.fc{font-size:10px;color:var(--muted)}
.vol-row{display:flex;gap:4px;padding:0 18px;margin-bottom:4px}
.v-btn{flex:1;padding:6px 4px;background:#161616;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;text-align:center}
.v-btn:hover{color:var(--white)}
.v-btn.on{background:var(--red);border-color:var(--red);color:var(--white)}
.main{padding:24px}
.hero{background:linear-gradient(135deg,#1a0000 0%,#0a0a0a 55%,#001500 100%);border:1px solid var(--border);padding:36px 40px;margin-bottom:28px;position:relative;overflow:hidden}
.hero::after{content:'MFBG';position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:130px;color:rgba(212,43,43,0.05);line-height:1;pointer-events:none;letter-spacing:4px}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;line-height:1;margin-bottom:6px}
.hero h1 em{color:var(--red);font-style:normal}
.hero p{font-size:11px;color:var(--muted);letter-spacing:1px}
.stats{display:flex;gap:28px;margin-top:20px}
.sn{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--red);line-height:1}
.sl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.sec{margin-bottom:36px}
.cat-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.cat-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px}
.cat-line{flex:1;height:1px;background:var(--border)}
.cat-ct{font-size:10px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);padding:18px;cursor:pointer;transition:all .15s;position:relative}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .15s}
.card:hover{border-color:#333;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.card:hover::before{background:var(--red)}
.c-vol{font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:5px}
.c-name{font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:0.5px;line-height:1.25;margin-bottom:10px;color:var(--white)}
.c-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:9px;letter-spacing:1px;padding:2px 6px;border:1px solid;text-transform:uppercase}
.tag.pre{border-color:var(--yellow);color:var(--yellow)}
.tag.post{border-color:var(--orange);color:var(--orange)}
.tag.rec{border-color:#52b788;color:#52b788}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px)}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#111;border:1px solid #2a2a2a;max-width:700px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s}
.overlay.open .modal{transform:translateY(0)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:#2a2a2a}
.m-hdr{padding:26px 30px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#111;z-index:1}
.m-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.m-vol{font-size:9px;letter-spacing:2px;padding:2px 8px;background:var(--red);color:white}
.m-cat{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.m-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;line-height:1;color:var(--white);margin-bottom:10px}
.m-tags{display:flex;gap:5px;flex-wrap:wrap}
.m-close{position:absolute;top:18px;right:18px;background:none;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.m-close:hover{border-color:var(--red);color:var(--red)}
.m-body{padding:0 30px 30px}
.m-section{margin-top:22px}
.m-section-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--red);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ing-list{list-style:none;font-size:12px;line-height:1.9;color:#ccc}
.ing-list li{padding:2px 0;border-bottom:1px solid #1a1a1a}
.ing-list li:last-child{border-bottom:none}
.ing-section-hdr{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--orange);margin-top:10px;margin-bottom:4px}
.inst-text{font-size:12px;line-height:1.85;color:#bbb;white-space:pre-wrap;font-family:'DM Mono',monospace}
.notes-box{background:#0d0d0d;border-left:2px solid var(--yellow);padding:10px 14px;margin-top:12px;font-size:11px;color:#999;line-height:1.7}
.nores{text-align:center;padding:80px 20px;color:var(--muted)}
.nores-t{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;margin-bottom:8px;color:#222}
@media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border)}.hero{padding:24px}.hero h1{font-size:34px}.hero::after{font-size:70px}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo" id="logoBtn">MFBG<span> RECIPES</span></div>
    <div class="search-wrap">

      <button class="f-btn" id="cbtn-Sauces"><span class="fl"><span class="dot"></span>Sauces</span><span class="fc">14</span></button>

        <div><div class="sn">5</div><div class="sl">Categories</div></div>

    <div id="content"></div>

</div>
<div class="overlay" id="overlay">
  <div class="modal">

        <div class="notes-box" id="mNotes"></div>
      </div>
    </div>
  </div>
</div>
<script type="application/json" id="recipe-data">
[{"name":"Egg Hashbrown Skillet","category":"Breakfast","volume":1,"timing":"POST/RECOVERY","text":"EGG HASH BROWN SKILLET INSTRUCTIONS\n1. Preheat the oven to 400\u00b0F. Place the oil in\na cast iron skillet and heat it in the oven until\nhot.\n2. Peel and shred the potatoes, then squeeze\nout excess moisture using a cheesecloth or\ntowel.\n3. Mix the shredded potatoes with paprika,\ngarlic powder, black pepper, and salt.\n4. Carefully remove the skillet from the oven.\nSpread the potatoes evenly in the skillet,\npressing them down slightly. Top with sliced\nonions.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 2 2 g 1 6 g 4 1 g 4 1 0 P O S T / R E C O V E R Y 4 5 M I N S 3 S E R V I N G S\n2 large potatoes (about 2 1/2 cups\nshredded)\n6 eggs\n1 yellow onion\n1/2 cup parmesan cheese\n1 tsp paprika\n1 tsp garlic powder\n1/2 tsp black pepper\n1/4 tsp salt\nM F B G\n5. Bake for 25 minutes until golden and crispy.\n6. Crack the eggs on top of the hashbrowns\nand sprinkle with parmesan cheese.\n7. Bake for another 7\u201310 minutes until the\neggs are cooked to your liking.\n8. Sprinkle with extra salt if needed.","ingredients":"2 large potatoes (about 2 1/2 cups\nshredded)\n6 eggs\n1 yellow onion\n1/2 cup parmesan cheese\n1 tsp paprika\n1 tsp garlic powder\n1/2 tsp black pepper\n1/4 tsp salt","instructions":"1. Preheat the oven to 400\u00b0F. Place the oil in\na cast iron skillet and heat it in the oven until\nhot.\n2. Peel and shred the potatoes, then squeeze\nout excess moisture using a cheesecloth or\ntowel.\n3. Mix the shredded potatoes with paprika,\ngarlic powder, black pepper, and salt.\n4. Carefully remove the skillet from the oven.\nSpread the potatoes evenly in the skillet,\npressing them down slightly. Top with sliced\nonions.\n5. Bake for 25 minutes until golden and crispy.\n6. Crack the eggs on top of the hashbrowns\nand sprinkle with parmesan cheese.\n7. Bake for another 7\u201310 minutes until the\neggs are cooked to your liking.\n8. Sprinkle with extra salt if needed.","notes":""},{"name":"Granola","category":"Breakfast","volume":1,"timing":"PRE","text":"GRANOLA INSTRUCTIONS\n1. Mix Dry:\nCombine oats, nuts/seeds, cinnamon, and\nsalt. (Optional: Add protein powder.)\n2. Melt & Mix:\nMelt honey and coconut oil in a pan over\nheat, then mix into the dry ingredients.\n3. Bake:\nSpread the mixture on a parchment-lined\nbaking sheet. Smash mixture down on the\nsheet to get granola clusters. Bake at 350\u00b0F\n(175\u00b0C) for 15 minutes.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 6 g 8 g 1 6 g 1 6 1 P R E / P O S T / R E C O V E R Y 3 5 M I N S 2 0 S E R V I N G S\n3 cups oats\n1 cup nuts/seeds\n2 tsp cinnamon\n1/4 tsp salt\n1/2 cup honey\n1/4 cup coconut oil\n1/2-3/4 cup vanilla protein powder\n(about 2-3 scoops)\nM F B G\n4. Store:\nLet it cool and harden completely. Break into\npieces and store in a container on the counter.\nNotes:\nMake sure to watch it so it doesn\u2019t over-bake.\nYou can make the recipe without the protein\npower.","ingredients":"3 cups oats\n1 cup nuts/seeds\n2 tsp cinnamon\n1/4 tsp salt\n1/2 cup honey\n1/4 cup coconut oil\n1/2-3/4 cup vanilla protein powder\n(about 2-3 scoops)","instructions":"1. Mix Dry:\nCombine oats, nuts/seeds, cinnamon, and\nsalt. (Optional: Add protein powder.)\n2. Melt & Mix:\nMelt honey and coconut oil in a pan over\nheat, then mix into the dry ingredients.\n3. Bake:\nSpread the mixture on a parchment-lined\nbaking sheet. Smash mixture down on the\nsheet to get granola clusters. Bake at 350\u00b0F\n(175\u00b0C) for 15 minutes.\n4. Store:\nLet it cool and harden completely. Break into\npieces and store in a container on the counter.","notes":"Make sure to watch it so it doesn\u2019t over-bake.\nYou can make the recipe without the protein\npower."},{"name":"Pancakes","category":"Breakfast","volume":1,"timing":"PRE","text":"INSTRUCTIONS\n1. Mash and whisk all the ingredients\ntogether (or blend until everything is\nsmooth and combined).\n2. Pour the batter into a greased pan\nwith coconut oil on high heat, then\nlower to medium once the batter is\nin. Flip after a few minutes.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 3 6 g 2 g 4 3 g 3 2 0 PROTEIN PANCAKES P O S T - W O R K O U T 1 5 M I N S 1 S E R V I N G\n1 banana\n3 egg whites (\u2248 1/3 cup)\n1 scoop vanilla protein powder\n1/2 tbsp honey\nDash of cinnamon\nPinch of salt\nOPTIONAL TOPPINGS\nGreek yogurt\nFruit\nM F B G\n3. Top your pancakes with fruit\nGreek yogurt, or whatever you\nlike.","ingredients":"1 banana\n3 egg whites (\u2248 1/3 cup)\n1 scoop vanilla protein powder\n1/2 tbsp honey\nDash of cinnamon\nPinch of salt\nOPTIONAL TOPPINGS\nGreek yogurt\nFruit","instructions":"1. Mash and whisk all the ingredients\ntogether (or blend until everything is\nsmooth and combined).\n2. Pour the batter into a greased pan\nwith coconut oil on high heat, then\nlower to medium once the batter is\nin. Flip after a few minutes.\n3. Top your pancakes with fruit\nGreek yogurt, or whatever you\nlike.","notes":""},{"name":"Quiche","category":"Breakfast","volume":1,"timing":"RECOVERY","text":"INSTRUCTIONS QU ICHE R E C O V E R Y 4 5 M I N S 8 S E R V I N G S\n1. Preheat the oven to 350\u00b0F (175\u00b0C).\n2. In a food processor, combine the crust ingredients:\nalmond flour, egg, coconut oil, thyme, paprika, garlic\npowder, salt, and pepper. Press the mixture into a pie pan\nand bake for 5 minutes to set.\n3. In a pan, saut\u00e9 the onions, mushrooms, spinach, garlic,\nsalt, and pepper until softened.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 9 g 2 4 g 4 g 3 0 4 THE CRUST\n 2 cups almond flour\n 1 egg\n 1 tbsp coconut oil\n 1 tbsp fresh thyme\n 1 tsp paprika\n 1/4 tsp salt\n1/4 tsp pepper\nTHE VEGETABLE FILLING\n 1 cup onion, diced\n 1 cup mushrooms, diced\n 1 handful spinach\n 2 cloves garlic, minced\nPinch of salt and pepper\nTHE EGG MIXTURE\n6 eggs\n 1 cup cottage cheese (low-fat)\n 3/4 cup freshly grated parmesan \n Salt & pepper, to taste\nM F B G\n4. In a bowl, whisk together the egg filling\ningredients: eggs, cottage cheese, parmesan,\nminced garlic, salt and pepper.\n5. Spread the saut\u00e9ed vegetables evenly over\nthe crust, then pour the egg mixture on top.\n6. Bake for 30 minutes or until the center is set.\n7. Let it cool for 10 minutes before serving.","ingredients":"2 cups almond flour\n1 egg\n1 tbsp coconut oil\n1 tbsp fresh thyme\n1 tsp paprika\n1/4 tsp salt\n1/4 tsp pepper\nTHE VEGETABLE FILLING\n1 cup onion, diced\n1 cup mushrooms, diced\n1 handful spinach\n2 cloves garlic, minced\nPinch of salt and pepper\nTHE EGG MIXTURE\n6 eggs\n1 cup cottage cheese (low-fat)\n3/4 cup freshly grated parmesan\nSalt & pepper, to taste","instructions":"INSTRUCTIONS QU ICH 4 5 M I N S 8\n1. Preheat the oven to 350\u00b0F (175\u00b0C).\n2. In a food processor, combine the crust ingredients:\nalmond flour, egg, coconut oil, thyme, paprika, garlic\npowder, salt, and pepper. Press the mixture into a pie pan\nand bake for 5 minutes to set.\n3. In a pan, saut\u00e9 the onions, mushrooms, spinach, garlic,\nsalt, and pepper until softened.\n4. In a bowl, whisk together the egg filling\ningredients: eggs, cottage cheese, parmesan,\nminced garlic, salt and pepper.\n5. Spread the saut\u00e9ed vegetables evenly over\nthe crust, then pour the egg mixture on top.\n6. Bake for 30 minutes or until the center is set.\n7. Let it cool for 10 minutes before serving.","notes":""},{"name":"Waffles","category":"Breakfast","volume":1,"timing":"PRE/POST","text":"INSTRUCTIONS\n1. In a bowl (or blender) add and\nmix all the ingredients.\n2. Grease the waffle iron with\ncoconut oil.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 5 3 g 1 2 g 3 7 g 4 7 5 PROTEIN WAFFLES P O S T / R E C O V E R Y 1 5 M I N S 1 - 2 S E R V I N G S\n1 scoop vanilla protein powder\n2 eggs\n1/4 cup oat flour\n1/2 cup greek yogurt (low-fat)\n1 tbsp honey\nCinnamon\nPinch of salt\nOptional: 1/4 tsp baking powder\n(for rise)\nNotes:\nThe batter will be liquidy; that\u2019s how it\u2019s\nsupposed to look. Trust the process.\nM F B G\n3. Pour the batter into the waffle iron\nand cook (3-5mins).\n4. Top the waffles with your desired\ntoppings.","ingredients":"1 scoop vanilla protein powder\n2 eggs\n1/4 cup oat flour\n1/2 cup greek yogurt (low-fat)\n1 tbsp honey\nCinnamon\nPinch of salt\nOptional: 1/4 tsp baking powder\n(for rise)\nNotes:\nThe batter will be liquidy; that\u2019s how it\u2019s\nsupposed to look. Trust the process.","instructions":"1. In a bowl (or blender) add and\nmix all the ingredients.\n2. Grease the waffle iron with\ncoconut oil.\n3. Pour the batter into the waffle iron\nand cook (3-5mins).\n4. Top the waffles with your desired\ntoppings.","notes":""},{"name":"7-Layer Dip","category":"Dinner","volume":1,"timing":"RECOVERY","text":"LAYER 1 \u2013 BEANS\n3 cups black beans\n(2 cans, drained, rinsed, and\nblended until smooth)\nLAYER 2 \u2013 SHREDDED\nCHICKEN\n3 cups (1 lb) shredded\nchicken (cooked and\nseasoned as desired)\nLAYER 3 \u2013 PARMESAN\n1 1/2 cups shredded\nParmesan cheese\nLAYER 4 \u2013 GUACAMOLE\n3 avocados (mashed)\nJuice of 2 limes\nChopped cilantro\n1 diced tomato\n1/2 red onion, diced\nSalt, pepper, and garlic\n(to taste)\n7-LAYER DIP P R O T E I N F A T C A R B S C A L O R I E S 2 7 g 1 4 g 2 2 g 3 2 0 P O S T / R E C O V E R Y 1 H R 9 S E R V I N G S INGREDIENTS M F B G\nLayer 1 \u2013 Beans\nSpread blended black beans evenly in the bottom of a\n7\u00d711-inch baking dish.\nLayer 2 \u2013 Shredded Chicken\nCook and season chicken as desired, then layer it over\nthe beans.\nLayer 3 \u2013 Parmesan\nSprinkle Parmesan evenly over the chicken.\nBake at 350\u00b0F for 15 minutes until warm and slightly\nmelted.\nINSTRUCTIONS\nLAYER 5 \u2013 PICO DE GALLO\n3 tomatoes, diced\n1 red onion, finely chopped\nJuice of 1 lime\nChopped cilantro (to taste)\nSalt (to taste)\nLAYER 6 \u2013 MFBG SAUCE\nBlend together:\n1/2 cup Greek yogurt\n1/2 cup cottage cheese\nJuice of 1 lime\nGenerous handful of fresh\ncilantro\n1/2 tsp paprika\n2 garlic cloves\nSalt and pepper (to taste)\nLAYER 7 \u2013 LETTUCE\nA layer of finely cut fresh\nlettuce\nOptional: Make my MFBG\nChicken Chips recipe for\ndipping into your 7-layer dip.\nLayer 4 \u2013 Guacamole\nSpread guacamole evenly over the Parmesan layer.\nLayer 5 \u2013 Pico de Gallo\nEvenly distribute pico de gallo over the guacamole.\nLayer 6 \u2013 MFBG Sauce\nPour and spread the sauce over the pico layer.\nLayer 7 \u2013 Lettuce\nTop with fresh lettuce.","ingredients":"LAYER 1 \u2013 BEANS\n3 cups black beans\n(2 cans, drained, rinsed, and\nblended until smooth)\nLAYER 2 \u2013 SHREDDED\n3 cups (1 lb) shredded\nchicken (cooked and\nseasoned as desired)\nLAYER 3 \u2013 PARMESAN\n1 1/2 cups shredded\nParmesan cheese\nLAYER 4 \u2013 GUACAMOLE\n3 avocados (mashed)\nJuice of 2 limes\nChopped cilantro\n1 diced tomato\n1/2 red onion, diced\nSalt, pepper, and garlic\n(to taste)\n7-LAYER DI 2 7 g 1 4 g 2 2 g 3 2 0 P O S T /  1 H R 9\nLayer 1 \u2013 Beans\nSpread blended black beans evenly in the bottom of a\n7\u00d711-inch baking dish.\nLayer 2 \u2013 Shredded Chicken\nCook and season chicken as desired, then layer it over\nthe beans.\nLayer 3 \u2013 Parmesan\nSprinkle Parmesan evenly over the chicken.\nBake at 350\u00b0F for 15 minutes until warm and slightly\nmelted.\nINSTRUCTIONS\nLAYER 5 \u2013 PICO DE GALLO\n3 tomatoes, diced\n1 red onion, finely chopped\nJuice of 1 lime\nChopped cilantro (to taste)\nSalt (to taste)\nLAYER 6 \u2013  SAUCE\nBlend together:\n1/2 cup Greek yogurt\n1/2 cup cottage cheese\nJuice of 1 lime\nGenerous handful of fresh\ncilantro\n1/2 tsp paprika\n2 garlic cloves\nSalt and pepper (to taste)\nLAYER 7 \u2013 LETTUCE\nA layer of finely cut fresh\nlettuce\nOptional: Make my\nChicken Chips recipe for\ndipping into your 7-layer dip.\nLayer 4 \u2013 Guacamole\nSpread guacamole evenly over the Parmesan layer.\nLayer 5 \u2013 Pico de Gallo\nEvenly distribute pico de gallo over the guacamole.\nLayer 6 \u2013  Sauce\nPour and spread the sauce over the pico layer.\nLayer 7 \u2013 Lettuce\nTop with fresh lettuce.","instructions":"","notes":""},{"name":"Braised Beef","category":"Dinner","volume":1,"timing":"RECOVERY","text":"INSTRUCTIONS BRAISED BEEF 1. Preheat Oven: Set your oven to 375\u00b0F (190\u00b0C).\n2. Prepare the Vegetables: Chop the onions, carrots, and\ngarlic.\n3. Trim and Season the Beef:\nIf the beef chuck is very fatty, trim off excess fat, but leave\nsome for flavor.\nPat the beef dry with paper towels.\nGenerously season it on all sides with salt and pepper.\n4. Sear the Beef:\nHeat 1 tbsp of olive oil or avocado oil in an oven-safe pan\n(Dutch oven is ideal) over high heat.\nSear the beef for 3\u20134 minutes per side until deeply\nbrowned.\nOnce seared, remove the beef and set it aside.\n5. Saut\u00e9 the Aromatics:\nLower the heat to medium.\nAdd the garlic, onion, and carrots to the pan and cook until\nsoft and fragrant.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 4 9 g 2 9 g 3 g 4 8 5\n48 oz (3lbs) beef chuck\n3 cloves garlic (minced)\n1 cup mushrooms\n2 large carrots (chopped)\n1 onion (diced)\n4 cups beef stock or bone broth (plus extra as needed)\n2 tbsp olive oil or avocado oil\nOptional:\nPotatoes\nSEASONINGS\n1 tbsp fresh rosemary\n2 tbsp italian seasoning\n2 tsp paprika\nSalt & pepper (to taste, plus more as needed)\nM F B G\n6. Deglaze the Pan:\nPour in beef stock or bone broth.\nUse a wooden spoon to scrape up the browned bits from\nthe pan (this is where the flavor is).\n7. Assemble & Braise:\nTurn off the heat and place the seared beef back in the\npan.\nAdd mushrooms, rosemary, Italian seasoning, paprika, extra\nsalt and pepper\u2014plus more carrots or other veggies if\nyou\u2019d like.\nThe broth should come just below the top of the beef, with\nthe meat slightly peeking above the liquid.\n8. Cook in the Oven:\nCover the pan with a lid and place it in the oven.\nBraise for 3\u20134 hours, checking every 45 minutes.\nIf the liquid level gets low, add more broth.\nTaste and adjust seasonings as needed throughout the\ncooking process.\nThe beef is ready when it\u2019s fork-tender and easily pulls\napart.\nR E C O V E R Y 4 H R S 8 S E R V I N G S","ingredients":"48 oz (3lbs) beef chuck\n3 cloves garlic (minced)\n1 cup mushrooms\n2 large carrots (chopped)\n1 onion (diced)\n4 cups beef stock or bone broth (plus extra as needed)\n2 tbsp olive oil or avocado oil\nOptional:\nPotatoes\nSEASONINGS\n1 tbsp fresh rosemary\n2 tbsp italian seasoning\n2 tsp paprika\nSalt & pepper (to taste, plus more as needed)","instructions":"INSTRUCTIONS BRAISED BEEF 1. Preheat Oven: Set your oven to 375\u00b0F (190\u00b0C).\n2. Prepare the Vegetables: Chop the onions, carrots, and\ngarlic.\n3. Trim and Season the Beef:\nIf the beef chuck is very fatty, trim off excess fat, but leave\nsome for flavor.\nPat the beef dry with paper towels.\nGenerously season it on all sides with salt and pepper.\n4. Sear the Beef:\nHeat 1 tbsp of olive oil or avocado oil in an oven-safe pan\n(Dutch oven is ideal) over high heat.\nSear the beef for 3\u20134 minutes per side until deeply\nbrowned.\nOnce seared, remove the beef and set it aside.\n5. Saut\u00e9 the Aromatics:\nLower the heat to medium.\nAdd the garlic, onion, and carrots to the pan and cook until\nsoft and fragrant.\n6. Deglaze the Pan:\nPour in beef stock or bone broth.\nUse a wooden spoon to scrape up the browned bits from\nthe pan (this is where the flavor is).\n7. Assemble & Braise:\nTurn off the heat and place the seared beef back in the\npan.\nAdd mushrooms, rosemary, Italian seasoning, paprika, extra\nsalt and pepper\u2014plus more carrots or other veggies if\nyou\u2019d like.\nThe broth should come just below the top of the beef, with\nthe meat slightly peeking above the liquid.\n8. Cook in the Oven:\nCover the pan with a lid and place it in the oven.\nBraise for 3\u20134 hours, checking every 45 minutes.\nIf the liquid level gets low, add more broth.\nTaste and adjust seasonings as needed throughout the\ncooking process.\nThe beef is ready when it\u2019s fork-tender and easily pulls\napart.","notes":""},{"name":"Burgers","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"BURGERS INSTRUCTIONS INGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 3 1 g 2 0 g 3 g 3 2 0 P O S T / R E C O V E R Y 3 0 M I N S 5 S E R V I N G S\nBURGERS\n2 large red onions\n1 lb (16 oz) lean ground beef\nWhite cheddar cheese\nSalt & pepper\nMFBG KETCHUP\n1 (28 oz) can tomato puree\n1/2 cup apple cider vinegar\n1/4 cup honey\n1 tsp garlic powder\n1 tsp onion powder\nSalt & pepper to taste\nM F B G\n1. Make the MFBG Ketchup:\nCombine all ketchup ingredients in a saucepan\nover medium heat and whisk together. Bring to a\nsimmer, then reduce heat to low and let it simmer\nfor 20\u201330 minutes, stirring occasionally. Let it cool,\nthen blend until smooth. Store any extra in the\nfridge \u2014 it\u2019ll last 2\u20133 weeks.\n2. Slice the red onions into large, half-inch circles.\nKeep the rings intact to use as the \u201cbuns\u201d.\n3. Form the ground beef into burger patties and\nseason with salt, pepper, or your preferred\nseasonings.\n4. Cook the patties on high heat. Add white\ncheddar cheese on top and let it melt. Remove\nfrom the pan.\n5. Add the onion slices in the same pan you\ncooked the meat in, mixing them in the leftover\nburger flavors. Flip and cook for about 5 minutes\nper side.\n6. Assemble the MFBG Burgers.","ingredients":"BURGERS INSTRUCTIONS\nBURGERS\n2 large red onions\n1 lb (16 oz) lean ground beef\nWhite cheddar cheese\nSalt & pepper\nKETCHUP\n1 (28 oz) can tomato puree\n1/2 cup apple cider vinegar\n1/4 cup honey\n1 tsp garlic powder\n1 tsp onion powder\nSalt & pepper to taste","instructions":"1. Make the  Ketchup:\nCombine all ketchup ingredients in a saucepan\nover medium heat and whisk together. Bring to a\nsimmer, then reduce heat to low and let it simmer\nfor 20\u201330 minutes, stirring occasionally. Let it cool,\nthen blend until smooth. Store any extra in the\nfridge \u2014 it\u2019ll last 2\u20133 weeks.\n2. Slice the red onions into large, half-inch circles.\nKeep the rings intact to use as the \u201cbuns\u201d.\n3. Form the ground beef into burger patties and\nseason with salt, pepper, or your preferred\nseasonings.\n4. Cook the patties on high heat. Add white\ncheddar cheese on top and let it melt. Remove\nfrom the pan.\n5. Add the onion slices in the same pan you\ncooked the meat in, mixing them in the leftover\nburger flavors. Flip and cook for about 5 minutes\nper side.\n6. Assemble the  Burgers.","notes":""},{"name":"Caesar Salad Pizza","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"CAESAR SALAD PIZZA INSTRUCTIONS\n1. Preheat the oven to 450\u00b0F (232\u00b0C).\n2. Make the Caesar dressing:\nWhisk or blend all the dressing ingredients together.\nPlace in fridge to thicken.\n3. Make the crust:\nMix the chicken, parmesan, eggs, salt, pepper, garlic\npowder, and paprika together. Press the mixture\ninto 4 flat circles on a parchment-lined baking sheet.\nBake for 15-20 minutes or until golden and firm.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 4 9 g 1 3 g 1 g 3 5 4\nCRUST\n4.5 (1.5 lbs) cups shredded chicken breast (about\n3 breasts)\n1/2 cup grated parmesan\n3 eggs\n1/2 tsp salt\n1/2 tsp black pepper\n1 tsp garlic powder\n1 tsp paprika\nCAESAR SALAD DRESSING\n2 tsp olive oil\n1 tbsp lemon juice\n1/2 tsp apple cider vinegar\n1 egg yolk\n1 minced garlic clove\n2 tbsp grated parmesan\n1/3 cup Greek yogurt (low-fat)\nPinch of salt and pepper\nTOPPINGS\n1/2-1 head Romaine Lettuce\nParmesan\nRadicchio (optional)\nCrutons (optional)\nM F B G\n4. Assemble the pizza:\nLet the crust cool slightly. Cut your lettuce, add\nCaesar dressing, and toss to coat. Pile the salad on\ntop of the crust and finish with desired toppings.\nP O S T / R E C O V E R Y 5 0 M I N S 5 S E R V I N G S","ingredients":"CRUST","instructions":"1. Preheat the oven to 450\u00b0F (232\u00b0C).\n2. Make the Caesar dressing:\nWhisk or blend all the dressing ingredients together.\nPlace in fridge to thicken.\n3. Make the crust:\nMix the chicken, parmesan, eggs, salt, pepper, garlic\npowder, and paprika together. Press the mixture\ninto 4 flat circles on a parchment-lined baking sheet.\nBake for 15-20 minutes or until golden and firm.\n4.5 (1.5 lbs) cups shredded chicken breast (about\n3 breasts)\n1/2 cup grated parmesan\n3 eggs\n1/2 tsp salt\n1/2 tsp black pepper\n1 tsp garlic powder\n1 tsp paprika\nCAESAR SALAD DRESSING\n2 tsp olive oil\n1 tbsp lemon juice\n1/2 tsp apple cider vinegar\n1 egg yolk\n1 minced garlic clove\n2 tbsp grated parmesan\n1/3 cup Greek yogurt (low-fat)\nPinch of salt and pepper\nTOPPINGS\n1/2-1 head Romaine Lettuce\nParmesan\nRadicchio (optional)\nCrutons (optional)\n4. Assemble the pizza:\nLet the crust cool slightly. Cut your lettuce, add\nCaesar dressing, and toss to coat. Pile the salad on\ntop of the crust and finish with desired toppings.","notes":""},{"name":"Chicken Nuggets","category":"Dinner","volume":1,"timing":"POST","text":"CHICKEN NUGGETS INSTRUCTIONS\n1. Preheat the oven to 425\u00b0F (220\u00b0C).\nLine a baking sheet with parchment paper.\n2. Prepare the meat mixture:\nIn a bowl, combine the ground chicken (or turkey)\nwith 1/4 cup of grated parmesan, paprika, salt,\npepper, garlic powder, and onion powder. Mix\nthoroughly and set aside.\n3. Set up the dipping bowls:\nIn one bowl, crack 2 eggs and whisk until fully\ncombined. In another bowl, mix 1/2 cup almond\nflour, 1/2 cup of oat flour, the remaining 1/4 cup of\nparmesan, and the same seasonings (paprika, salt,\npepper, garlic powder, and onion powder).\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 5 1 g 2 2 g 1 8 g 4 6 0 \1 lb (16 oz) ground chicken or lean ground turkey\n1/2 cup grated parmesan\n1/2 cup almond flour\n1/2 cup oat flour\n2 eggs\nSEASONINGS\n1 tsp paprika\n1 tsp garlic powder\n1 tsp onion powder\n1 tsp salt\n1/2 tsp black pepper\nM F B G\nR E C O V E R Y 4 5 M I N S 3 - 4 S E R V I N G S\n4. Form the nuggets:\nShape small portions of the ground meat\ninto 15-16 balls. Dip them into the egg\nmixture, then coat them in the \nflour/parmesan mixture. Pat them down\ninto a nugget shape.\n5. Bake, flip, & broil:\nPlace the nuggets on the prepared baking\nsheet, (use a wire rack if you have one),\nand bake for 10 minutes. Flip the nuggets\nand bake for another 4 minutes to crisp the\nbottoms. Broil for 2-3 minutes to get the\ntops crispy.\nNote:\nThey will get even more crispy with a spray\nof avocado oil before baking.","ingredients":"turkey\n1/2 cup grated parmesan\n1/2 cup almond flour\n1/2 cup oat flour\n2 eggs\nSEASONINGS\n1 tsp paprika\n1 tsp garlic powder\n1 tsp onion powder\n1 tsp salt\n1/2 tsp black pepper","instructions":"1. Preheat the oven to 425\u00b0F (220\u00b0C).\nLine a baking sheet with parchment paper.\n2. Prepare the meat mixture:\nIn a bowl, combine the ground chicken (or turkey)\nwith 1/4 cup of grated parmesan, paprika, salt,\npepper, garlic powder, and onion powder. Mix\nthoroughly and set aside.\n3. Set up the dipping bowls:\nIn one bowl, crack 2 eggs and whisk until fully\ncombined. In another bowl, mix 1/2 cup almond\nflour, 1/2 cup of oat flour, the remaining 1/4 cup of\nparmesan, and the same seasonings (paprika, salt,\npepper, garlic powder, and onion powder).\n4. Form the nuggets:\nShape small portions of the ground meat\ninto 15-16 balls. Dip them into the egg\nmixture, then coat them in the\nflour/parmesan mixture. Pat them down\ninto a nugget shape.\n5. Bake, flip, & broil:\nPlace the nuggets on the prepared baking\nsheet, (use a wire rack if you have one),\nand bake for 10 minutes. Flip the nuggets\nand bake for another 4 minutes to crisp the\nbottoms. Broil for 2-3 minutes to get the\ntops crispy.","notes":"They will get even more crispy with a spray\nof avocado oil before baking."},{"name":"Cilantro Lime Salad","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"CILANTRO LIME SALAD INSTRUCTIONS\n1. Roast Sweet Potatoes:\nPreheat oven to 400\u00b0F (200\u00b0C). Toss diced\nsweet potatoes with avocado oil, paprika, salt,\nand pepper. Roast for 25-30 minutes, flipping\nhalfway through.\n2. Make Sauce:\nBlend sauce ingredients together. Add water if\ntoo thick.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 4 0 g 1 3 g 4 1 g 4 2 0\n1 lb chicken breast\n1-2 tomatoes\n1 sweet potato\n1/2 red onion\n1 cup corn\n1 cup black beans\n4 cups kale\n1 avocado\nSWEET POTATOES\nPaprika, Salt and pepper & Avocado oil\nCHICKEN\nChili powder, Paprika, Garlic powder,\nItalian seasoning, & Salt and pepper\nMFBG CILANTRO LIME SAUCE\n1 cup Greek yogurt\n1 cup cottage cheese\nJuice of 2 limes\nA generous handful of fresh cilantro\n3\u20134 garlic cloves\n1/2 tsp paprika\nSalt and pepper to taste\nWater (if needed to thin sauce)\nM F B G\n3. Cook Chicken:\nSeason chicken with chili powder, paprika, garlic\npowder, Italian seasoning, salt, and pepper. Cook in\navocado oil over medium-high heat for 5\u20137 minutes per\nside. Let rest, then cut into cubes.\n4. Assemble Salad:\nCombine kale, chicken, roasted sweet potatoes,\ntomatoes, red onion, corn, black beans, and sauce in a\nlarge bowl. Toss well.\nP O S T / R E C O V E R Y 4 5 M I N S 4 S E R V I N G S","ingredients":"1 lb chicken breast\n1-2 tomatoes\n1 sweet potato\n1/2 red onion\n1 cup corn\n1 cup black beans\n4 cups kale\n1 avocado\nSWEET POTATOES\nPaprika, Salt and pepper & Avocado oil\nCHICKEN\nChili powder, Paprika, Garlic powder,\nItalian seasoning, & Salt and pepper\nCILANTRO LIME SAUCE\n1 cup Greek yogurt\n1 cup cottage cheese\nJuice of 2 limes\nA generous handful of fresh cilantro\n3\u20134 garlic cloves\n1/2 tsp paprika\nSalt and pepper to taste\nWater (if needed to thin sauce)","instructions":"1. Roast Sweet Potatoes:\nPreheat oven to 400\u00b0F (200\u00b0C). Toss diced\nsweet potatoes with avocado oil, paprika, salt,\nand pepper. Roast for 25-30 minutes, flipping\nhalfway through.\n2. Make Sauce:\nBlend sauce ingredients together. Add water if\ntoo thick.\n3. Cook Chicken:\nSeason chicken with chili powder, paprika, garlic\npowder, Italian seasoning, salt, and pepper. Cook in\navocado oil over medium-high heat for 5\u20137 minutes per\nside. Let rest, then cut into cubes.\n4. Assemble Salad:\nCombine kale, chicken, roasted sweet potatoes,\ntomatoes, red onion, corn, black beans, and sauce in a\nlarge bowl. Toss well.","notes":""},{"name":"Curry Stir Fry","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"CURRY STIR FRY INSTRUCTIONS\n1. Heat a large pan with coconut oil or olive oil.\n2. Add diced chicken breast seasoned with salt and\nblack pepper into the pan. Cook ad stir for about 5\nminutes (it won\u2019t be fully cooked yet). Dispose of any\nwater left in the pan. Remove the chicken and set\naside.\n3. Toss in the sliced onions, bell peppers, broccoli,\nminced garlic, and minced ginger. Add a bit more\ncoconut oil. \n4. Stir everything together, then add the curry\npowder, paprika, cumin, turmeric, black pepper,\ncayenne, and salt.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 2 8 g 2 0 g 1 4 g 3 4 0\n1 lb chicken breast, diced\n1 yellow onion, sliced\n1 red bell pepper, sliced\n1 orange bell pepper, sliced\n1 head of broccoli, chopped\n2\u20133 garlic cloves, minced\n1 tbsp minced ginger\n1 can (1 \u00bd cups) unsweetened coconut milk\nJuice of 1 lime (for topping)\nSEASONINGS\n1 tbsp curry powder, 2 tsp paprika, 1/2 tsp\ncumin, 1/2 tsp turmeric, 1/2 tsp cayenne\npepper, 1/2 tsp black pepper, salt to taste\nM F B G\nR E C O V E R Y 3 5 M I N S 4 S E R V I N G S 5. Cook for about 10 minutes, stirring occasionally,\nuntil the veggies are tender. Cover the pan, if needed,\nto speed up the cooking process.\n6. Add and mix the partially cooked chicken back to\nthe pan. Then, add in the coconut milk. Stir well and\nlet everything cook for another 5\u201310 minutes until the\nchicken is fully cooked. Taste and adjust salt.\n7. Top it with fresh lime juice.","ingredients":"1 lb chicken breast, diced\n1 yellow onion, sliced\n1 red bell pepper, sliced\n1 orange bell pepper, sliced\n1 head of broccoli, chopped\n2\u20133 garlic cloves, minced\n1 tbsp minced ginger\n1 can (1 \u00bd cups) unsweetened coconut milk\nJuice of 1 lime (for topping)\nSEASONINGS\n1 tbsp curry powder, 2 tsp paprika, 1/2 tsp\ncumin, 1/2 tsp turmeric, 1/2 tsp cayenne\npepper, 1/2 tsp black pepper, salt to taste\nuntil the veggies are tender. Cover the pan, if needed,\nto speed up the cooking process.","instructions":"1. Heat a large pan with coconut oil or olive oil.\n2. Add diced chicken breast seasoned with salt and\nblack pepper into the pan. Cook ad stir for about 5\nminutes (it won\u2019t be fully cooked yet). Dispose of any\nwater left in the pan. Remove the chicken and set\naside.\n3. Toss in the sliced onions, bell peppers, broccoli,\nminced garlic, and minced ginger. Add a bit more\ncoconut oil.\n4. Stir everything together, then add the curry\npowder, paprika, cumin, turmeric, black pepper,\ncayenne, and salt.\n6. Add and mix the partially cooked chicken back to\nthe pan. Then, add in the coconut milk. Stir well and\nlet everything cook for another 5\u201310 minutes until the\nchicken is fully cooked. Taste and adjust salt.\n7. Top it with fresh lime juice.","notes":""},{"name":"Flatbread","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"P O S T / R E C O V E R Y 3 0 M I N S 1 S E R V I N G FLATBREAD INSTRUCTIONS\n1. Preheat your oven to 350\u00b0F\n(175\u00b0C).\n2. Blend all ingredients until smooth.\n3. Line a baking sheet with\nparchment paper and pour the batter,\nspreading evenly.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 3 7 g 2 0 g 1 1 g 3 7 5\n1 cup cottage cheese (any type)\n2 eggs\n1 tsp paprika\n1/2 tsp salt\n1 tsp Italian seasoning\n1/2 tsp garlic powder\nM F B G\n4. Bake for 15-20 minutes, or until\nfirm and slightly golden.\n5. Let it cool slightly before using.\n6. Fill the inside with whatever you\nwant, my MFBG Spicy Pepper\nSauce takes it to the next level.","ingredients":"1 cup cottage cheese (any type)\n2 eggs\n1 tsp paprika\n1/2 tsp salt\n1 tsp Italian seasoning\n1/2 tsp garlic powder","instructions":"1. Preheat your oven to 350\u00b0F\n(175\u00b0C).\n2. Blend all ingredients until smooth.\n3. Line a baking sheet with\nparchment paper and pour the batter,\nspreading evenly.\n4. Bake for 15-20 minutes, or until\nfirm and slightly golden.\n5. Let it cool slightly before using.\n6. Fill the inside with whatever you\nwant, my MFBG Spicy Pepper\nSauce takes it to the next level.","notes":""},{"name":"Lasagna","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"LASAGNA P R O T E I N F A T C A R B S C A L O R I E S 2 9 g 1 3 g 1 8 g 3 1 7 INSTRUCTIONS\n1. Preheat the oven to 425\u00b0F (218\u00b0C).\n2. Slice sweet potatoes into thin circles (1/4inch).\nThinner slices bake faster.\n3. Make the cheese sauce:\nMix or blend 2 eggs, 2 cups cottage cheese, 3/4 cup\nparmesan, paprika, salt, pepper, garlic powder, and onion\npowder. Set aside.\n4. Saut\u00e9 the vegetables and cook the meat:\nHeat a pan over medium heat. Add onions, minced\ngarlic, paprika, chili powder, salt, pepper, oregano, basil,\nthyme, and rosemary. Once softened, add diced\ntomatoes and mushrooms. Mash the tomatoes slightly to\ncreate a sauce-like texture. Add ground turkey and cook\nuntil no longer raw. Drain some of the liquid if necessary.\nINGREDIENTS P O S T / R E C O V E R Y 1 H R 1 5 M I N S 8 S E R V I N G S\n2 large sweet potatoes\nCHEESE SAUCE\n2 eggs\n2 cups cottage cheese (2% of any type)\n1 cup grated parmesan (save 1/4 for topping)\nSeasonings: 1/4 tsp paprika, 1/4 tsp garlic powder, 1/4\ntsp onion powder, pinch of salt & pepper\nMEAT MIXTURE\n32 oz (2 lb) lean ground turkey (ground beef or\nchicken work too)\n1 yellow onion, chopped\n4 tomatoes, chopped (or 6oz can of tomato paste)\n3 garlic cloves (minced)\n2 cups mushrooms, sliced\nSeasonings: 1-2 tsp paprika, 1/4 chili powder, 1 tbsp\nItalian seasoning, 1 tsp salt, & 1/2 tsp black pepper\nM F B G\n5. Assemble:\nGrease a 9\u00d713\u201d glass pan with avocado oil.\nLayer as follows: sweet potato slices, cheese sauce,\nmeat mixture. Repeat layers, finishing with cheese\nsauce, meat, and 1/4 cup of parmesan for topping.\n6. Bake:\nCover with foil and bake for 40-45 minutes.\n7. Broil:\nRemove the foil and broil for a few minutes to crisp the\ntop.\nNotes:\nIf you want a smaller serving cut the recipe in half and\nuse a 9x9 pan.","ingredients":"2 large sweet potatoes\nCHEESE SAUCE\n2 eggs\n2 cups cottage cheese (2% of any type)\n1 cup grated parmesan (save 1/4 for topping)\nSeasonings: 1/4 tsp paprika, 1/4 tsp garlic powder, 1/4\ntsp onion powder, pinch of salt & pepper\nMEAT MIXTURE\n32 oz (2 lb) lean ground turkey (ground beef or\nchicken work too)\n1 yellow onion, chopped\n4 tomatoes, chopped (or 6oz can of tomato paste)\n3 garlic cloves (minced)\n2 cups mushrooms, sliced\nSeasonings: 1-2 tsp paprika, 1/4 chili powder, 1 tbsp\nItalian seasoning, 1 tsp salt, & 1/2 tsp black pepper","instructions":"LASAGN 2 9 g 1 3 g 1 8 g 3 1 7 INSTRUCTIONS\n1. Preheat the oven to 425\u00b0F (218\u00b0C).\n2. Slice sweet potatoes into thin circles (1/4inch).\nThinner slices bake faster.\n3. Make the cheese sauce:\nMix or blend 2 eggs, 2 cups cottage cheese, 3/4 cup\nparmesan, paprika, salt, pepper, garlic powder, and onion\npowder. Set aside.\n4. Saut\u00e9 the vegetables and cook the meat:\nHeat a pan over medium heat. Add onions, minced\ngarlic, paprika, chili powder, salt, pepper, oregano, basil,\nthyme, and rosemary. Once softened, add diced\ntomatoes and mushrooms. Mash the tomatoes slightly to\ncreate a sauce-like texture. Add ground turkey and cook\nuntil no longer raw. Drain some of the liquid if necessary.\n5. Assemble:\nGrease a 9\u00d713\u201d glass pan with avocado oil.\nLayer as follows: sweet potato slices, cheese sauce,\nmeat mixture. Repeat layers, finishing with cheese\nsauce, meat, and 1/4 cup of parmesan for topping.\n6. Bake:\nCover with foil and bake for 40-45 minutes.\n7. Broil:\nRemove the foil and broil for a few minutes to crisp the\ntop.","notes":"If you want a smaller serving cut the recipe in half and\nuse a 9x9 pan."},{"name":"Lettuce Wraps","category":"Dinner","volume":1,"timing":"POST","text":"INSTRUCTIONS\nFILLING\n 1 lb chicken breast\n1\u20132 cups edamame (deshelled)\n2 cups purple cabbage, shredded\n1 small red onion, thinly sliced\nGreen onion, chopped (for topping)\nSalt, pepper, and any seasonings you like\nMFBG PB SAUCE\n2 tbsp peanut butter\n1/2 cup greek yogurt (non-fat or any type)\n2 tsp apple cider vinegar\n1/4 tsp paprika\n 1/4 tsp cayenne pepper\n 2 garlic cloves, minced\n2 tbsp soy sauce (no preservatives or additives)\n 2 tbsp water (for texture)\n Salt and pepper, to taste\nWRAPS\n Iceberg lettuce\nLETTUCE WRAPS INGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 4 0 g 8 g 1 5 g 2 9 1 P O S T / R E C O V E R Y 3 5 M I N S 4 S E R V I N G S\nM F B G\n3. Prep the Veggies:\nSlice your purple cabbage, red onion, and green\nonion. Add the cabbage, red onion, edamame,\nand cooked chicken to the bowl.\n4. Mix it All Together:\nPour the sauce over the chicken and veggie\nmixture. Toss until everything is evenly coated.\n5. Assemble the Wraps:\nSpoon the mixture into your iceberg lettuce\nleaves. Top with chopped green onion.\n1. Make the MFBG PB Sauce:\nIn a bowl, combine the peanut butter, non-fat\nGreek yogurt, apple cider vinegar, paprika,\ncayenne pepper, minced garlic, soy sauce,\nwater, salt, and pepper. Mix until smooth and\ncreamy. Set aside.\n2. Cook the Chicken:\nDice the chicken breasts really small. Season\nwith salt, pepper, and any other spices you like.\nCook until done, then transfer to a large bowl.","ingredients":"1 lb chicken breast\n1\u20132 cups edamame (deshelled)\n2 cups purple cabbage, shredded\n1 small red onion, thinly sliced\nGreen onion, chopped (for topping)\nSalt, pepper, and any seasonings you like\n2 tbsp peanut butter\n1/2 cup greek yogurt (non-fat or any type)\n2 tsp apple cider vinegar\n1/4 tsp paprika\n1/4 tsp cayenne pepper\n2 garlic cloves, minced\n2 tbsp soy sauce (no preservatives or additives)\n2 tbsp water (for texture)\nSalt and pepper, to taste\nIceberg lettuce\nLETTUCE WRAPS","instructions":"3. Prep the Veggies:\nSlice your purple cabbage, red onion, and green\nonion. Add the cabbage, red onion, edamame,\nand cooked chicken to the bowl.\n4. Mix it All Together:\nPour the sauce over the chicken and veggie\nmixture. Toss until everything is evenly coated.\n5. Assemble the Wraps:\nSpoon the mixture into your iceberg lettuce\nleaves. Top with chopped green onion.\n1. Make the  PB Sauce:\nIn a bowl, combine the peanut butter, non-fat\nGreek yogurt, apple cider vinegar, paprika,\ncayenne pepper, minced garlic, soy sauce,\nwater, salt, and pepper. Mix until smooth and\ncreamy. Set aside.\n2. Cook the Chicken:\nDice the chicken breasts really small. Season\nwith salt, pepper, and any other spices you like.\nCook until done, then transfer to a large bowl.","notes":""},{"name":"Pizza Crust","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"PIZZA CRUST INSTRUCTIONS INGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 6 3 g 1 1 g 3 g 3 7 3 P O S T / R E C O V E R Y 5 0 M I N S 2 S E R V I N G S\nCRUST\n1 lb cups shredded chicken\n1/4 cup grated parmesan\n2 eggs\n1/2 tsp salt\n1/2 tsp black pepper\n1 tsp garlic powder\n1 tsp paprika\nOPTIONAL TOPPINGS\nRed sauce\nParmesan\nMozzarella\nMushrooms\nRed onion\nCottage cheese\nM F B G\n1. Preheat oven to 450\u00b0F (232\u00b0C).\n2. Make the crust:\nIn a bowl, mix together the crust ingredients. \n3. Form the crust shape:\nPress the mixture onto a parchment-lined\nbaking sheet, shaping it into a flat circle.\n4. Bake:\nPlace the chicken crust in the oven for about\n15-20 minutes, or until the crust is golden\nbrown and firm. Keep an eye on it.\n5. Add toppings and Bake:\nSpread sauce over the crust, sprinkle cheese,\nand add your toppings. Put it back in the oven\nfor 10-15 minutes, or until the cheese is melted\nand the toppings are cooked.\n6. Let it cool:\nLet the pizza cool slightly and then slice it.","ingredients":"PIZZA CRUST INSTRUCTIONS\nCRUST\n1 lb cups shredded chicken\n1/4 cup grated parmesan\n2 eggs\n1/2 tsp salt\n1/2 tsp black pepper\n1 tsp garlic powder\n1 tsp paprika\nOPTIONAL TOPPINGS\nRed sauce\nParmesan\nMozzarella\nMushrooms\nRed onion\nCottage cheese","instructions":"1. Preheat oven to 450\u00b0F (232\u00b0C).\n2. Make the crust:\nIn a bowl, mix together the crust ingredients.\n3. Form the crust shape:\nPress the mixture onto a parchment-lined\nbaking sheet, shaping it into a flat circle.\n4. Bake:\nPlace the chicken crust in the oven for about\n15-20 minutes, or until the crust is golden\nbrown and firm. Keep an eye on it.\n5. Add toppings and Bake:\nSpread sauce over the crust, sprinkle cheese,\nand add your toppings. Put it back in the oven\nfor 10-15 minutes, or until the cheese is melted\nand the toppings are cooked.\n6. Let it cool:\nLet the pizza cool slightly and then slice it.","notes":""},{"name":"Roasted Veggie & Beef Soup","category":"Dinner","volume":1,"timing":"RECOVERY","text":"ROASTED VEGGIE & BEEF SOUP INSTRUCTIONS 1. Preheat the oven to 375\u00b0F (190\u00b0C). Toss the\nsquash, tomatoes, carrots, broccoli, garlic, and\nonion with avocado oil and seasonings, then\nspread on a baking sheet. Roast for 35\u201340\nminutes, until soft.\n2. While the veggies roast, heat avocado oil in a\nlarge pot over medium heat. Add onion and red\nbell pepper with the spices, cook until softened,\nthen stir in the ground beef. Once browned, mix\nin the cannellini beans.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 2 4 g 1 8 g 3 9 g 3 8 3 P O S T / R E C O V E R Y 1 H R 1 5 M I N S 6 S E R V I N G S OVEN ROASTED VEGGIES\n1 butternut squash, peeled and cubed (\u2248 4 cups)\n 3 tomatoes\n 2 cups carrots, chopped\n 1 head broccoli, chopped\n 1 whole head garlic, halved\n 1/2 onion\n 2 tbsp avocado oil\nSeasonings: 1 tbsp paprika, 2 tsp onion powder, 1 tsp cayenne\npepper, 1 tsp salt, & 1 tsp black pepper \nSAUT\u00c9ED VEGETABLES & GROUND BEEF\n1/2 onion, chopped\n 1 red bell pepper, chopped\n 1 can cannellini beans, drained and rinsed\n 1 lb lean ground beef\n 1 tbsp avocado oil\nSeasonings: 2 tsp paprika, 1 tsp oregano\n 1 tsp thyme, 1/4 tsp cayenne pepper, 1/2 tsp salt, &\n1/2 tsp black pepper\nSOUP BASE\n4-6 cups broth (beef, chicken, or veggie \u2014 add more if needed)\n 3 cups kale, chopped\nOPTIONAL TOPPING\nGrated parmesan\nM F B G\n3. Blend the roasted vegetables until smooth,\nadding a splash of broth if needed. Stir the\nblended mixture into the pot with the beef,\nthen add the broth and bring to a gentle\nsimmer.\n4. Stir in the chopped kale and cook just until\nwilted. Adjust broth for desired consistency,\nthen serve hot with grated parmesan if you\u2019d\nlike.","ingredients":"1 butternut squash, peeled and cubed (\u2248 4 cups)\n3 tomatoes\n2 cups carrots, chopped\n1 head broccoli, chopped\n1 whole head garlic, halved\n1/2 onion\n2 tbsp avocado oil\nSeasonings: 1 tbsp paprika, 2 tsp onion powder, 1 tsp cayenne\npepper, 1 tsp salt, & 1 tsp black pepper\nSAUT\u00c9ED VEGETABLES & GROUND BEEF\n1/2 onion, chopped\n1 red bell pepper, chopped\n1 can cannellini beans, drained and rinsed\n1 lb lean ground beef\n1 tbsp avocado oil\nSeasonings: 2 tsp paprika, 1 tsp oregano\n1 tsp thyme, 1/4 tsp cayenne pepper, 1/2 tsp salt, &\n1/2 tsp black pepper\nSOUP BASE\n4-6 cups broth (beef, chicken, or veggie \u2014 add more if needed)\n3 cups kale, chopped\nOPTIONAL TOPPING\nGrated parmesan","instructions":"ROASTED VEGGIE & BEEF SOUP INSTRUCTIONS 1. Preheat the oven to 375\u00b0F (190\u00b0C). Toss the\nsquash, tomatoes, carrots, broccoli, garlic, and\nonion with avocado oil and seasonings, then\nspread on a baking sheet. Roast for 35\u201340\nminutes, until soft.\n2. While the veggies roast, heat avocado oil in a\nlarge pot over medium heat. Add onion and red\nbell pepper with the spices, cook until softened,\nthen stir in the ground beef. Once browned, mix\nin the cannellini beans.\n3. Blend the roasted vegetables until smooth,\nadding a splash of broth if needed. Stir the\nblended mixture into the pot with the beef,\nthen add the broth and bring to a gentle\nsimmer.\n4. Stir in the chopped kale and cook just until\nwilted. Adjust broth for desired consistency,\nthen serve hot with grated parmesan if you\u2019d\nlike.","notes":""},{"name":"Shepherd's Pie","category":"Dinner","volume":1,"timing":"RECOVERY","text":"SHEPHERD\u2019S PIE INSTRUCTIONS\n1. Preheat the oven to 400\u00b0F (200\u00b0C). \n2. Prepare the potatoes:\nPeel and chop the Japanese sweet potatoes, then boil for\n20 minutes until fork-tender.\n3. Cook the meat layer:\nHeat a cast-iron skillet with olive oil. Saut\u00e9 onion and\ngarlic until fragrant. Add ground beef, season, and cook\nuntil browned. Stir in bone broth, tomato paste, peas, and\ncarrots. Remove from heat and set aside.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 4 0 g 1 5 g 2 7 g 4 1 5 P O S T / R E C O V E R Y 1 H R 5 S E R V I N G S\nPOTATO LAYER\n2 large white sweet potatoes (or any type)\n1 cup low-fat cottage cheese\n3/4 cup grated parmesan (save 1/4 cup extra for topping)\n1 teaspoon garlic powder\nSalt to taste\nMEAT LAYER\n1 lb lean ground beef\n1 yellow onion, diced\n4 garlic cloves, minced\n1 cup green peas\n1 cup diced carrots\n1/4 cup tomato paste\n1/4 to 1/2 cup bone broth\n2 tbsp Italian seasoning\n1 tsp paprika\nSalt & pepper to taste\nM F B G\n4. Mash the potatoes:\nDrain potatoes and blend with cottage cheese, garlic\npowder, salt, and 1/2 cup parmesan until smooth.\n5. Assemble the pie:\nSpread the mashed potatoes over the meat layer. \nTop with 1/4 cup parmesan.\n6. Bake:\nBake for 20-30 minutes until golden.\n7. Cool:\nLet it cool before serving.","ingredients":"POTATO LAYER\n2 large white sweet potatoes (or any type)\n1 cup low-fat cottage cheese\n3/4 cup grated parmesan (save 1/4 cup extra for topping)\n1 teaspoon garlic powder\nSalt to taste\nMEAT LAYER\n1 lb lean ground beef\n1 yellow onion, diced\n4 garlic cloves, minced\n1 cup green peas\n1 cup diced carrots\n1/4 cup tomato paste\n1/4 to 1/2 cup bone broth\n2 tbsp Italian seasoning\n1 tsp paprika\nSalt & pepper to taste","instructions":"SHEPHERD\u2019S PIE INSTRUCTIONS\n1. Preheat the oven to 400\u00b0F (200\u00b0C).\n2. Prepare the potatoes:\nPeel and chop the Japanese sweet potatoes, then boil for\n20 minutes until fork-tender.\n3. Cook the meat layer:\nHeat a cast-iron skillet with olive oil. Saut\u00e9 onion and\ngarlic until fragrant. Add ground beef, season, and cook\nuntil browned. Stir in bone broth, tomato paste, peas, and\ncarrots. Remove from heat and set aside.\n4. Mash the potatoes:\nDrain potatoes and blend with cottage cheese, garlic\npowder, salt, and 1/2 cup parmesan until smooth.\n5. Assemble the pie:\nSpread the mashed potatoes over the meat layer.\nTop with 1/4 cup parmesan.\n6. Bake:\nBake for 20-30 minutes until golden.\n7. Cool:\nLet it cool before serving.","notes":""},{"name":"Spaghetti Squash Pasta","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"SPAGHETTI SQUASH PASTA INSTRUCTIONS\n1. Roast the Spaghetti Squash:\nPreheat the oven to 445\u00b0F. Cut the spaghetti\nsquash in half and stab it with a fork. Drizzle\nwith olive oil and season lightly with salt and\npepper. Roast for 35-40 minutes, until tender.\n2. Make the Sauce:\nBlend cottage cheese, coconut milk, garlic, salt\nand pepper until smooth and creamy.\n \nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 3 g 1 0 g 2 4 g 2 4 1 P O S T / R E C O V E R Y 1 H R 3 S E R V I N G S SPAGHETTI SQUASH & VEGGIES\n1 large spaghetti squash\n1 yellow onion, diced\n1 cup cherry or grape tomatoes, halved\n2 cups mushrooms, sliced\n3 garlic cloves, minced\n2 cups spinach\n1 tbsp Italian seasoning\n2 tsp paprika\n1/4 tsp pepper\nPinch of salt\n1 tbsp olive oil (or avocado/coconut oil)\nTHE CREAMY SAUCE\n1 cup cottage cheese (4% or any type)\n3/4 cup unsweetened coconut milk\n2 garlic cloves\nSalt and pepper to taste\nM F B G\n3. Saut\u00e9 the Veggies:\nHeat olive oil in a large pan over medium heat.\nAdd onion, garlic, Italian seasoning, paprika,\nsalt, and pepper, and saut\u00e9 until fragrant. Stir\nin mushrooms and tomatoes and cook until\nsoftened. Add spinach and stir until wilted.\n4. Combine Everything:\nAdd the roasted spaghetti squash into the pan\nwith the veggies. Pour the creamy sauce over\nthe top and mix everything well.","ingredients":"1 large spaghetti squash\n1 yellow onion, diced\n1 cup cherry or grape tomatoes, halved\n2 cups mushrooms, sliced\n3 garlic cloves, minced\n2 cups spinach\n1 tbsp Italian seasoning\n2 tsp paprika\n1/4 tsp pepper\nPinch of salt\n1 tbsp olive oil (or avocado/coconut oil)\nTHE CREAMY SAUCE\n1 cup cottage cheese (4% or any type)\n3/4 cup unsweetened coconut milk\n2 garlic cloves\nSalt and pepper to taste","instructions":"1. Roast the Spaghetti Squash:\nPreheat the oven to 445\u00b0F. Cut the spaghetti\nsquash in half and stab it with a fork. Drizzle\nwith olive oil and season lightly with salt and\npepper. Roast for 35-40 minutes, until tender.\n2. Make the Sauce:\nBlend cottage cheese, coconut milk, garlic, salt\nand pepper until smooth and creamy.\n3. Saut\u00e9 the Veggies:\nHeat olive oil in a large pan over medium heat.\nAdd onion, garlic, Italian seasoning, paprika,\nsalt, and pepper, and saut\u00e9 until fragrant. Stir\nin mushrooms and tomatoes and cook until\nsoftened. Add spinach and stir until wilted.\n4. Combine Everything:\nAdd the roasted spaghetti squash into the pan\nwith the veggies. Pour the creamy sauce over\nthe top and mix everything well.","notes":""},{"name":"Spaghetti Squash Salad","category":"Dinner","volume":1,"timing":"POST","text":"SPAGHETTI SQUASH SALAD INSTRUCTIONS\n1. Preheat the oven to 400\u00b0F (204\u00b0C).\n2. Roast Veggies:\nHalve squash, remove seeds, drizzle with olive\noil, season, and roast until tender (30\u201340\nminutes). Shred the squash with a fork. Cube\nthe sweet potatoes, season, and roast for 25-30\nminutes. Roast the asparagus for 10-20\nminutes.\n3. Toast Pine Nuts:\nToast the pine nuts in a pan over medium heat\nuntil light brown.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 3 0 g 1 2 g 2 4 g 3 2 4 P O S T / R E C O V E R Y 1 H R 4 S E R V I N G S\n1 lb chicken thighs\n1-2 spaghetti squash\n1 large sweet potato, cubed\n1 bunch asparagus\n1/4 cup pine nuts\nMFBG LEMON PARM SAUCE\n1/4 cup greek yogurt (non-fat)\n1/4 cup cottage cheese (non-fat)\nJuice of 1 lemon\n2 garlic cloves, minced\n1/4 cup parmesan cheese\n1/4 tsp thyme\n1/4 tsp paprika\nPinch of salt\nPinch of pepper\nOptional: 2 tsp honey\nM F B G\n4. Cook Chicken:\nMarinate the thighs and sear in them in a skillet\nuntil crispy and cooked through.\n5. Make Sauce (double it if you want extra sauce):\nBlend the Greek yogurt, cottage cheese, lemon\njuice, garlic, parmesan, salt, and pepper until\nsmooth.\n6. Assemble:\nToss the spaghetti squash, roasted veggies,\nchicken, and pine nuts with the sauce.","ingredients":"1 lb chicken thighs\n1-2 spaghetti squash\n1 large sweet potato, cubed\n1 bunch asparagus\n1/4 cup pine nuts\nLEMON PARM SAUCE\n1/4 cup greek yogurt (non-fat)\n1/4 cup cottage cheese (non-fat)\nJuice of 1 lemon\n2 garlic cloves, minced\n1/4 cup parmesan cheese\n1/4 tsp thyme\n1/4 tsp paprika\nPinch of salt\nPinch of pepper\nOptional: 2 tsp honey","instructions":"1. Preheat the oven to 400\u00b0F (204\u00b0C).\n2. Roast Veggies:\nHalve squash, remove seeds, drizzle with olive\noil, season, and roast until tender (30\u201340\nminutes). Shred the squash with a fork. Cube\nthe sweet potatoes, season, and roast for 25-30\nminutes. Roast the asparagus for 10-20\nminutes.\n3. Toast Pine Nuts:\nToast the pine nuts in a pan over medium heat\nuntil light brown.\n4. Cook Chicken:\nMarinate the thighs and sear in them in a skillet\nuntil crispy and cooked through.\n5. Make Sauce (double it if you want extra sauce):\nBlend the Greek yogurt, cottage cheese, lemon\njuice, garlic, parmesan, salt, and pepper until\nsmooth.\n6. Assemble:\nToss the spaghetti squash, roasted veggies,\nchicken, and pine nuts with the sauce.","notes":""},{"name":"Steak & Sweet Potato Bowl","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"INSTRUCTIONS 1. Prep Work:\nPreheat the oven to 400\u00b0F (200\u00b0C) for the sweet\npotatoes.\nCut the veggies for the salad (bell peppers, onion, and\ncarrot).\n2. Make the MFBG Sauce:\nBlend together all the sauce ingredients until smooth\nand well combined.\n3. Roast the Sweet Potatoes:\nToss diced sweet potatoes with salt, pepper, paprika,\nItalian seasoning, and avocado oil.\nSpread evenly on a baking sheet and bake for 20-30\nminutes, flipping halfway through.\nINGREDIENTS SPICY CHICKEN SALAD\nWITH APPLE CIDER VINEGAR SAUCE\nP R O T E I N F A T C A R B S C A L O R I E S 3 4 g 6 g 1 8 g 2 8 4 P O S T / R E C O V E R Y 4 0 M I N S 4 S E R V I N G S\nMFBG APPLE CIDER VINEGAR SAUCE\n1/2 cup greek yogurt (non-fat)\n1/2 cup cottage cheese (4% Good Culture)\n1 garlic clove, minced\n1 tbsp + 1 tsp honey\n1 tbsp apple cider vinegar\nJuice of 1 lemon\nPaprika (generous shake)\nPinch of Salt and pepper\nTHE CHICKEN\n1 lb chicken breast\nAvocado or coconut oil (for cooking)\nSeasonings: 2-3 tsp paprika, 1/2 tsp cayenne pepper,\n1/2 tsp chili seasoning, 1/2 tsp cumin, 1 tsp garlic\npowder, 1/2 tsp onion powder, & a generous amount of\nsalt and pepper\nROASTED SWEET POTATOES\n1 large sweet potato, diced\nSeasonings: 1/2 tsp salt, 1/2 tsp pepper, 1/2 tsp\npaprika, 1/2 tsp Italian seasoning, & 1 tbsp avocado oil\nSALAD BASE\n4 cups kale\n1/2 red bell pepper\n1/2 yellow bell pepper\n1/2 red onion\n1 carrot\nM F B G\n4. Cook the Chicken (my way):\nCut the chicken breasts in half lengthwise.\nCoat the chicken with the seasoning blend (paprika, cayenne,\nchili, cumin, garlic powder, onion powder, salt, and pepper).\nHeat a cast-iron skillet over high heat with avocado or coconut\noil.\nOnce hot, add the chicken and sear for about 3-5 minutes per\nside.\nReduce heat, cover the skillet, and let it sit for 5 minutes to lock in\nmoisture.\n5. Assemble the Salad:\nToss the chopped kale, bell peppers, red onion, and carrot with\nthe MFBG sauce.\nAdd the roasted sweet potatoes and top with sliced chicken.","ingredients":"WITH APPLE CIDER VINEGAR SAUCE\nAPPLE CIDER VINEGAR SAUCE\n1/2 cup greek yogurt (non-fat)\n1/2 cup cottage cheese (4% Good Culture)\n1 garlic clove, minced\n1 tbsp + 1 tsp honey\n1 tbsp apple cider vinegar\nJuice of 1 lemon\nPaprika (generous shake)\nPinch of Salt and pepper\nTHE CHICKEN\n1 lb chicken breast\nAvocado or coconut oil (for cooking)\nSeasonings: 2-3 tsp paprika, 1/2 tsp cayenne pepper,\n1/2 tsp chili seasoning, 1/2 tsp cumin, 1 tsp garlic\npowder, 1/2 tsp onion powder, & a generous amount of\nsalt and pepper\nROASTED SWEET POTATOES\n1 large sweet potato, diced\nSeasonings: 1/2 tsp salt, 1/2 tsp pepper, 1/2 tsp\npaprika, 1/2 tsp Italian seasoning, & 1 tbsp avocado oil\nSALAD BASE\n4 cups kale\n1/2 red bell pepper\n1/2 yellow bell pepper\n1/2 red onion\n1 carrot","instructions":"INSTRUCTIONS 1. Prep Work:\nPreheat the oven to 400\u00b0F (200\u00b0C) for the sweet\npotatoes.\nCut the veggies for the salad (bell peppers, onion, and\ncarrot).\n2. Make the  Sauce:\nBlend together all the sauce ingredients until smooth\nand well combined.\n3. Roast the Sweet Potatoes:\nToss diced sweet potatoes with salt, pepper, paprika,\nItalian seasoning, and avocado oil.\nSpread evenly on a baking sheet and bake for 20-30\nminutes, flipping halfway through.\n4. Cook the Chicken (my way):\nCut the chicken breasts in half lengthwise.\nCoat the chicken with the seasoning blend (paprika, cayenne,\nchili, cumin, garlic powder, onion powder, salt, and pepper).\nHeat a cast-iron skillet over high heat with avocado or coconut\noil.\nOnce hot, add the chicken and sear for about 3-5 minutes per\nside.\nReduce heat, cover the skillet, and let it sit for 5 minutes to lock in\nmoisture.\n5. Assemble the Salad:\nToss the chopped kale, bell peppers, red onion, and carrot with\nthe MFBG sauce.\nAdd the roasted sweet potatoes and top with sliced chicken.","notes":""},{"name":"Steak Lettuce Wraps","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"STEAK LETTUCE WRAPS INSTRUCTIONS\n1. Preheat oven to 400\u00b0F (204\u00b0C).\n2. Roast Veggies:\nCut sweet potato into cubes and drizzle lightly\nwith olive oil. Season with salt, pepper, and\npaprika. Bake for 25\u201330 minutes, tossing\nhalfway through for even roasting.\nOptional \u2013 roasted corn:\nAdd corn to a parchment-lined baking sheet,\nseason with chili powder, salt, and pepper, and\nroast for 15 minutes until lightly browned.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 4 4 g 1 2 g 1 7 g 3 5 7 P O S T / R E C O V E R Y 3 0 M I N S 4 S E R V I N G S\n1 lb steak (sirloin)\n1 head iceberg lettuce\n1 medium sweet potato\n1/2 cup corn\n1/4 cup red onion\n1 avocado\nMFBG CILANTRO LIME SAUCE\n1/2 cup greek yogurt (nonfat)\n1/2 cup cottage cheese (2%)\nJuice of 1 lime\nA generous handful of fresh cilantro\n1 garlic clove\n1/2 tsp paprika\nSalt and pepper to taste\nM F B G\n3. Cook Steak:\nSeason steak with salt, pepper, and your go-to\nspices. Heat olive oil in a hot skillet and cook the\nsteak to your liking. Let it rest for a few minutes\nbefore slicing or cubing.\n4. Make Sauce:\nBlend all sauce ingredients. Add water or more\nlime juice for desired consistency.\n5. Build the wraps:\nLay down two or more iceberg leaves per wrap,\nadd steak, veggies, and sauce, then wrap it up\n\u2014 fold the sides in first, then roll it tightly from\nfront to back.","ingredients":"1 lb steak (sirloin)\n1 head iceberg lettuce\n1 medium sweet potato\n1/2 cup corn\n1/4 cup red onion\n1 avocado\nCILANTRO LIME SAUCE\n1/2 cup greek yogurt (nonfat)\n1/2 cup cottage cheese (2%)\nJuice of 1 lime\nA generous handful of fresh cilantro\n1 garlic clove\n1/2 tsp paprika\nSalt and pepper to taste","instructions":"1. Preheat oven to 400\u00b0F (204\u00b0C).\n2. Roast Veggies:\nCut sweet potato into cubes and drizzle lightly\nwith olive oil. Season with salt, pepper, and\npaprika. Bake for 25\u201330 minutes, tossing\nhalfway through for even roasting.\nOptional \u2013 roasted corn:\nAdd corn to a parchment-lined baking sheet,\nseason with chili powder, salt, and pepper, and\nroast for 15 minutes until lightly browned.\n3. Cook Steak:\nSeason steak with salt, pepper, and your go-to\nspices. Heat olive oil in a hot skillet and cook the\nsteak to your liking. Let it rest for a few minutes\nbefore slicing or cubing.\n4. Make Sauce:\nBlend all sauce ingredients. Add water or more\nlime juice for desired consistency.\n5. Build the wraps:\nLay down two or more iceberg leaves per wrap,\nadd steak, veggies, and sauce, then wrap it up\n\u2014 fold the sides in first, then roll it tightly from\nfront to back.","notes":""},{"name":"Sweet Potato Nachos","category":"Dinner","volume":1,"timing":"POST","text":"SWEET POTATO NACHOS INSTRUCTIONS\n1. Preheat the oven to 425\u00b0F (220\u00b0C).\n2. Cut and soak sweet potatoes:\nTake the skin off of the sweet potatoes with a\npeeler, slice them into thin circles, and soak them in\nice water for 20 minutes. Remove them from the\nwater and dry them really well. Toss with olive oil,\nsalt, and pepper.\n3. Bake sweet potatoes:\nPlace the sweet potatoes on a baking sheet lined\nwith parchment paper and bake for 15 minutes, flip,\nbake another 15 minutes, and then broil for 2\nminutes.\n \nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 3 2 g 1 4 g 1 4 g 3 2 3 P O S T / R E C O V E R Y 4 5 M I N S 4 S E R V I N G S\nPOTATO BASE\n2-3 sweet potatoes\n1 lb lean ground beef\nMeat seasonings (garlic powder, onion powder,\npaprika, chili powder, salt, pepper)\nGrated parmesan (for topping)\nOPTIONAL TOPPINGS\nBlack beans\nGuacamole\nPico ge gallo\nLettuce\nMFBG CILANTRO LIME SAUCE\n1/2 cup greek yogurt (nonfat)\n1/2 cup cottage cheese (2%)\nJuice of 1-2 limes\nA generous handful of fresh cilantro\n2 garlic cloves\n1/2 tsp paprika\nSalt and pepper to taste\nM F B G\n4. Make Kate\u2019s MFBG Sauce:\nBlend together the greek yogurt, cottage cheese, lime\njuice, cilantro, paprika, salt, pepper, and garlic. Double the\nrecipe if you like a LOT of sauce and if it\u2019s too thick, add a\nlittle water or more lime juice.\n5. Cook ground beef:\nMix your seasonings into the ground beef and cook it in a\npan with olive oil (or avocado oil) on medium to high heat.\nOnce it\u2019s completely cooked to your liking, remove it from\nthe stove.\n6. Assemble:\nTop your crispy sweet potatoes with grated parmesan,\nground beef, MFBG sauce, and garnish with cilantro and\nlime.","ingredients":"POTATO BASE\n2-3 sweet potatoes\n1 lb lean ground beef\nMeat seasonings (garlic powder, onion powder,\npaprika, chili powder, salt, pepper)\nGrated parmesan (for topping)\nOPTIONAL TOPPINGS\nBlack beans\nGuacamole\nPico ge gallo\nLettuce\nCILANTRO LIME SAUCE\n1/2 cup greek yogurt (nonfat)\n1/2 cup cottage cheese (2%)\nJuice of 1-2 limes\nA generous handful of fresh cilantro\n2 garlic cloves\n1/2 tsp paprika\nSalt and pepper to taste","instructions":"1. Preheat the oven to 425\u00b0F (220\u00b0C).\n2. Cut and soak sweet potatoes:\nTake the skin off of the sweet potatoes with a\npeeler, slice them into thin circles, and soak them in\nice water for 20 minutes. Remove them from the\nwater and dry them really well. Toss with olive oil,\nsalt, and pepper.\n3. Bake sweet potatoes:\nPlace the sweet potatoes on a baking sheet lined\nwith parchment paper and bake for 15 minutes, flip,\nbake another 15 minutes, and then broil for 2\nminutes.\n4. Make Kate\u2019s  Sauce:\nBlend together the greek yogurt, cottage cheese, lime\njuice, cilantro, paprika, salt, pepper, and garlic. Double the\nrecipe if you like a LOT of sauce and if it\u2019s too thick, add a\nlittle water or more lime juice.\n5. Cook ground beef:\nMix your seasonings into the ground beef and cook it in a\npan with olive oil (or avocado oil) on medium to high heat.\nOnce it\u2019s completely cooked to your liking, remove it from\nthe stove.\n6. Assemble:\nTop your crispy sweet potatoes with grated parmesan,\nground beef,  sauce, and garnish with cilantro and\nlime.","notes":""},{"name":"Tacos","category":"Dinner","volume":1,"timing":"POST/RECOVERY","text":"TACOS INSTRUCTIONS\n1. Preheat oven to 350\u00b0F (177\u00b0C).\n2. Blend cottage cheese, eggs, paprika,\ngarlic powder, salt, and pepper.\n3. Pour mixture into 5-6 small taco\u0002shaped circles on a parchment-lined\nbaking sheet.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 3 2 g 1 7 g 4 g 2 9 5 P O S T / R E C O V E R Y 3 0 M I N S 1 S E R V I N G\n1 cup cottage cheese (4% fat)\n2 eggs\n1/2 tsp paprika\n1/2 tsp garlic powder\nPinch of salt and pepper\nM F B G\n4. Bake for 15\u201320 minutes. Watch so\nthey don\u2019t burn.\n5. Cool for a few minutes before adding\ntoppings.","ingredients":"1 cup cottage cheese (4% fat)\n2 eggs\n1/2 tsp paprika\n1/2 tsp garlic powder\nPinch of salt and pepper","instructions":"1. Preheat oven to 350\u00b0F (177\u00b0C).\n2. Blend cottage cheese, eggs, paprika,\ngarlic powder, salt, and pepper.\n3. Pour mixture into 5-6 small taco\u0002shaped circles on a parchment-lined\nbaking sheet.\n4. Bake for 15\u201320 minutes. Watch so\nthey don\u2019t burn.\n5. Cool for a few minutes before adding\ntoppings.","notes":""},{"name":"Apple Pie Cookies","category":"Dessert","volume":1,"timing":"PRE/POST","text":"APPLE PIE COOKIES INSTRUCTIONS\n1. Preheat oven to 350\u00b0F and line a baking\nsheet with parchment paper.\n2. Cook apples:\nHeat and mix diced apples with maple syrup,\ncinnamon, lemon juice, lemon zest (if desired)\nand salt for 6\u20138 min until soft.\n3. Make dough:\nMix protein powder, honey, oat flour, oats,\nand greek yogurt. It\u2019ll be thick and wet.\n \nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 1 g 2 g 2 9 g 1 9 6 P R E & P O S T 2 5 M I N S 1 0 S E R V I N G S\n3 large Honeycrisp apples (about 6 cups, diced)\n3 tbsp maple syrup\n1 tsp cinnamon\nPinch of salt\n3 scoops vanilla protein powder (1 cup)\n1 cup old-fashioned oats\n1 cup oat flour\n1/2 cup greek yogurt\n2 tbsp honey\n Juice of 1/2 lemon (2 Tbsp \u2014 add zest if you\nwant extra flavor)\nOptional (for texture):\n1/4 cup milk (any kind \u2014 add only if the mixture\nis too dry)\nM F B G\n4. Combine:\nFold in the apples. Scoop into 10 balls and place\non the baking sheet.\n5. Bake for 12 minutes.\nNotes:\nDon\u2019t over-bake.\nPull them out while still soft-ish! Store in a\ncontainer on the counter (they\u2019ll get moist after\na day) or freeze and microwave for 10\u201315\nseconds.\nIf overly dry \u2014 add a splash of milk.\nIf overly wet \u2014 add a bit more oat flour.","ingredients":"3 large Honeycrisp apples (about 6 cups, diced)\n3 tbsp maple syrup\n1 tsp cinnamon\nPinch of salt\n3 scoops vanilla protein powder (1 cup)\n1 cup old-fashioned oats\n1 cup oat flour\n1/2 cup greek yogurt\n2 tbsp honey\nJuice of 1/2 lemon (2 Tbsp \u2014 add zest if you\nwant extra flavor)\nOptional (for texture):\n1/4 cup milk (any kind \u2014 add only if the mixture\nis too dry)","instructions":"1. Preheat oven to 350\u00b0F and line a baking\nsheet with parchment paper.\n2. Cook apples:\nHeat and mix diced apples with maple syrup,\ncinnamon, lemon juice, lemon zest (if desired)\nand salt for 6\u20138 min until soft.\n3. Make dough:\nMix protein powder, honey, oat flour, oats,\nand greek yogurt. It\u2019ll be thick and wet.\n4. Combine:\nFold in the apples. Scoop into 10 balls and place\non the baking sheet.\n5. Bake for 12 minutes.","notes":"Don\u2019t over-bake.\nPull them out while still soft-ish! Store in a\ncontainer on the counter (they\u2019ll get moist after\na day) or freeze and microwave for 10\u201315\nseconds.\nIf overly dry \u2014 add a splash of milk.\nIf overly wet \u2014 add a bit more oat flour."},{"name":"Banana Bars","category":"Dessert","volume":1,"timing":"PRE/POST","text":"BANANA BARS INSTRUCTIONS\n1. Prepare the Base:\nMix oatmeal, mashed bananas, protein powder,\ncinnamon, and salt until well combined. Press this\nmixture firmly into an 8x8 or 9x9-inch square pan.\n2. Add the Chocolate Layer:\nCombine melted coconut oil, cocoa powder, and\nmaple syrup until smooth. Pour over the base layer\nand spread evenly.\n3. Set the Chocolate:\nRefrigerate the pan for about 5 minutes, or until the\nchocolate layer hardens.\n4. Prepare the Top Layer:\nMix and mash peanut butter, banana, and maple\nsyrup until smooth. It might seem dry initially, but\nkeep mixing\u2014it will become creamy.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 5 g 5 g 1 1 g 1 0 6 P R E & P O S T 5 0 M I N S 1 5 S E R V I N G S\nM F B G\nBASE LAYER\n3/4 cup oatmeal\n2 ripe bananas, mashed\n2 scoops protein powder (1/2 cup)\nDash of cinnamon\nPinch of salt\nCHOCOLATE LAYER\n2 tbsp coconut oil, melted\n1/4 cup cocoa powder\n1 tbsp maple syrup\nTOP LAYER\n1/4 cup peanut butter\n1 ripe banana, mashed\n1 tbsp maple syrup\n5. Add the Top Layer:\nSpread the peanut butter mixture over the\nhardened chocolate layer evenly.\n6. Final Chill:\nPlace the pan in the refrigerator or freezer\nfor 30-45 minutes, until everything is firm.\n7. Serve:\nCut into 15 bars. Store them in the\nrefrigerator for a softer texture or in the\nfreezer for a firmer bite.","ingredients":"BASE LAYER\n3/4 cup oatmeal\n2 ripe bananas, mashed\n2 scoops protein powder (1/2 cup)\nDash of cinnamon\nPinch of salt\nCHOCOLATE LAYER\n2 tbsp coconut oil, melted\n1/4 cup cocoa powder\n1 tbsp maple syrup\nTOP LAYER\n1/4 cup peanut butter\n1 ripe banana, mashed\n1 tbsp maple syrup","instructions":"1. Prepare the Base:\nMix oatmeal, mashed bananas, protein powder,\ncinnamon, and salt until well combined. Press this\nmixture firmly into an 8x8 or 9x9-inch square pan.\n2. Add the Chocolate Layer:\nCombine melted coconut oil, cocoa powder, and\nmaple syrup until smooth. Pour over the base layer\nand spread evenly.\n3. Set the Chocolate:\nRefrigerate the pan for about 5 minutes, or until the\nchocolate layer hardens.\n4. Prepare the Top Layer:\nMix and mash peanut butter, banana, and maple\nsyrup until smooth. It might seem dry initially, but\nkeep mixing\u2014it will become creamy.\n5. Add the Top Layer:\nSpread the peanut butter mixture over the\nhardened chocolate layer evenly.\n6. Final Chill:\nPlace the pan in the refrigerator or freezer\nfor 30-45 minutes, until everything is firm.\n7. Serve:\nCut into 15 bars. Store them in the\nrefrigerator for a softer texture or in the\nfreezer for a firmer bite.","notes":""},{"name":"Blackberry Apple Pie Cookies","category":"Dessert","volume":1,"timing":"PRE/POST","text":"BLACKBERRY APPLE PIE COOKIES INSTRUCTIONS 1. Preheat oven to 350\u00b0F and line a\nbaking sheet with parchment paper.\n2. Cook apples:\nHeat and mix diced apples with maple\nsyrup, cinnamon, and salt for 6\u20138 min\nuntil soft.\n3. Make dough:\nMix protein powder, oat flour, oats,\ngreek yogurt, honey, and blackberries\nin a bowl.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 1 2 g 2 g 2 9 g 2 0 3 P R E & P O S T 2 5 M I N S 1 0 S E R V I N G S\n2 large Honeycrisp apples (about 4 cups,\ndiced)\n3 tbsp maple syrup\n1 tsp Cinnamon\n3 scoops vanilla protein powder (1 cup)\n1 cup old-fashioned oats\n1 cup oat flour\n1/2 cup greek yogurt\n2 tbsp honey\n2 cups blackberries (fresh or frozen)\nPinch of salt\nOptional (for texture):\n1/4 cup milk (any kind \u2014 add only if the\nmixture is too dry)\nM F B G\n4. Combine:\nFold in the apples. Scoop into 10 balls and\nplace on the baking sheet.\n5. Bake for 12 minutes.\nNotes:\nDon\u2019t over-bake.\nPull them out while still soft-ish! Store in a\ncontainer on the counter (they\u2019ll get moist\nafter a day) or freeze and microwave for 10\u2013\n15 seconds.\nIf overly dry \u2014 add a splash of milk.\nIf overly wet \u2014 add a bit more oat flour.","ingredients":"2 large Honeycrisp apples (about 4 cups,\ndiced)\n3 tbsp maple syrup\n1 tsp Cinnamon\n3 scoops vanilla protein powder (1 cup)\n1 cup old-fashioned oats\n1 cup oat flour\n1/2 cup greek yogurt\n2 tbsp honey\n2 cups blackberries (fresh or frozen)\nPinch of salt\nOptional (for texture):\n1/4 cup milk (any kind \u2014 add only if the\nmixture is too dry)","instructions":"BLACKBERRY APPLE PIE COOKIES INSTRUCTIONS 1. Preheat oven to 350\u00b0F and line a\nbaking sheet with parchment paper.\n2. Cook apples:\nHeat and mix diced apples with maple\nsyrup, cinnamon, and salt for 6\u20138 min\nuntil soft.\n3. Make dough:\nMix protein powder, oat flour, oats,\ngreek yogurt, honey, and blackberries\nin a bowl.\n4. Combine:\nFold in the apples. Scoop into 10 balls and\nplace on the baking sheet.\n5. Bake for 12 minutes.","notes":"Don\u2019t over-bake.\nPull them out while still soft-ish! Store in a\ncontainer on the counter (they\u2019ll get moist\nafter a day) or freeze and microwave for 10\u2013\n15 seconds.\nIf overly dry \u2014 add a splash of milk.\nIf overly wet \u2014 add a bit more oat flour."},{"name":"Bananas Foster","category":"Dessert","volume":1,"timing":"PRE","text":"BANANAS FOSTER INSTRUCTIONS\n1. Soak dates:\nDeseed the dates and soak them in hot\nwater (or milk) for 15 minutes, then mash or\nblend into a caramel-like sauce.\n2. Cook bananas:\nHeat a pan with coconut oil on medium\nheat and add your cut bananas to the pan.\nWhen they have browned (1-2 minutes), flip\nthem.\nINGREDIENTS P R O T E I N F A T C A R B S C A L O R I E S 2 g . 4 g 7 0 g 2 8 4 P R E
