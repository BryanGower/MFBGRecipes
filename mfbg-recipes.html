illet over medium heat. Cook 5\u20136\nminutes per side until golden and cooked\nthrough.","notes":""},{"name":"Chicken Tenders","category":"Dinner","volume":2,"timing":"POST","text":"P R O T E I N F A T C A R B S C A L O R I E S\n3 7 g 1 0 g 1 8 g 3 2 2\nINSTRUCTIONS\n1. Preheat oven to 400\u00b0F (204\u00b0C).\n2. Make breadcrumbs:\nBake 2-3 slices of sourdough until crisp, then\nblend into fine crumbs.\n3. Set up two bowls:\nBowl 1: Beat 2 eggs with a fork.\nBowl 2: Mix breadcrumbs, parmesan, garlic\npowder, paprika, salt, and pepper.\n4. Bread the tenders:\nDip each chicken tender in egg, then coat in\nbreadcrumb mix.\nINGREDIENTS\nP O S T / R E C O V E R Y 5 0 M I N S 5 S E R V I N G S\nCHICKEN:\n1 1/2 lbs chicken tenderloins (about 12\ntenders)\nBREADING:\n1 cup (\u22483 slices) sourdough\n2 tbsp parmesan, shredded\n1 tsp garlic powder\n1 1/2 tsp paprika\nSalt & pepper to taste\nOTHER:\n2 eggs\n1 tbsp avocado oil spray\nM F B G\n5. Bake the tenders:\nAfter breading, spray both sides of each\nchicken tender with avocado oil spray. Place on\na wire rack over a baking sheet. Bake for 5\nminutes, flip, and bake another 5 minutes.\n6. Finish:\nSwitch oven to broil for ~3 minutes until golden\nand crispy.\nCHICKEN TENDERS","ingredients":"CHICKEN:\n1 1/2 lbs chicken tenderloins (about 12\ntenders)\nBREADING:\n1 cup (\u22483 slices) sourdough\n2 tbsp parmesan, shredded\n1 tsp garlic powder\n1 1/2 tsp paprika\nSalt & pepper to taste\nOTHER:\n2 eggs\n1 tbsp avocado oil spray","instructions":"3 7 g 1 0 g 1 8 g 3 2 2\n1. Preheat oven to 400\u00b0F (204\u00b0C).\n2. Make breadcrumbs:\nBake 2-3 slices of sourdough until crisp, then\nblend into fine crumbs.\n3. Set up two bowls:\nBowl 1: Beat 2 eggs with a fork.\nBowl 2: Mix breadcrumbs, parmesan, garlic\npowder, paprika, salt, and pepper.\n4. Bread the tenders:\nDip each chicken tender in egg, then coat in\nbreadcrumb mix.\n5. Bake the tenders:\nAfter breading, spray both sides of each\nchicken tender with avocado oil spray. Place on\na wire rack over a baking sheet. Bake for 5\nminutes, flip, and bake another 5 minutes.\n6. Finish:\nSwitch oven to broil for ~3 minutes until golden\nand crispy.\nCHICKEN TENDERS","notes":""},{"name":"Stuffed Chicken","category":"Dinner","volume":2,"timing":"POST","text":"P R O T E I N F A T C A R B S C A L O R I E S 3 9 g 5 g 6 g 2 2 5\nINSTRUCTIONS\n1. Prepare the Sauce:\nIn a blender, combine 3/4 cup cottage cheese, 1/2 cup greek\nyogurt, 1 garlic clove, 2 tsp Italian seasoning, and salt &\npepper. Blend until smooth. Set aside.\n2. Start the Sweet Potatoes (optional):\nPeel and quarter the sweet potatoes. Bring a pot of water to\na boil (no need to salt it). Add the sweet potatoes and cook\nfor 15\u201320 minutes, until fork-tender. Drain and set aside, or\nsimply turn off the heat so they stay warm until blending.\n3. Season the Chicken:\nRub chicken breasts with 1 1/4 tsp turmeric, 2 tsp paprika, 1\ntsp garlic powder, 1 1/4 tsp cumin, plus salt & pepper.\n4. Cook the Chicken:\nHeat 1 tsp olive oil in a large pan over medium heat. Sear\nchicken breasts for 3\u20134 minutes per side until golden but not\nfully cooked through. Remove and set aside.\nINGREDIENTS\nP O S T / R E C O V E R Y 4 5 M I N S 4 S E R V I N G S\nCREAMY SAUCE\n3/4 cup cottage cheese (2% or any type)\n1/2 cups greek yogurt (nonfat or any type)\n1 garlic clove\nSeasonings: 2 tsp Italian seasoning, salt & pepper to taste\nCHICKEN AND VEGETABLES\n1 lb of chicken breasts\n1 small onion, diced\n1 garlic clove, minced\n1 cup mushrooms, sliced\n1 cup cherry tomatoes, halved\n3 cups spinach\n1 1/2 cups broth (chicken or vegetable)\nSeasonings: 1 1/4 tsp turmeric, 2 tsp paprika, 1 tsp garlic powder, 1\ntsp cumin, & salt & pepper to taste\n1 tbsp olive oil (for cooking)\nOptional: MASHED SWEET POTATOES\n2 large sweet potatoes, peeled and quartered\n2 garlic cloves, minced\n1 cup cottage cheese (2% or any type)\nSeasonings: 1/2 cup shredded parmesan\n1/2 tsp salt, & 1/4 tsp pepper\nM F B G\n5. Cook the Vegetables:\nIn the same pan, saut\u00e9 the onion and minced garlic for 2\u20133\nminutes. Add mushrooms and cherry tomatoes, cooking until\nsoftened. Stir in the spinach until wilted.\n6. Simmer with Chicken:\nReturn chicken to the pan. Pour in 1 1/2 cups broth. Cover and\nsimmer on low heat for 10 minutes, or until chicken is fully\ncooked.\n7. Add the Sauce:\nReduce heat to very low and let the pan cool slightly (to\nprevent curdling). Stir in the creamy cottage cheese\u2013yogurt\nsauce until smooth and combined. Keep heat gentle.\n8. Finish the Mashed Sweet Potatoes (Optional):\nIn a blender, combine the boiled sweet potatoes with 2 garlic\ncloves, 1 cup cottage cheese, 1/2 cup parmesan, 1/2 tsp salt,\nand 1/4 tsp pepper. Blend until completely smooth and creamy.\n9. Serve:\nPlate the optional blended sweet potatoes, then top with\nchicken and creamy vegetable sauce.\nCREAMY CHICKEN","ingredients":"CREAMY SAUCE\n3/4 cup cottage cheese (2% or any type)\n1/2 cups greek yogurt (nonfat or any type)\n1 garlic clove\nSeasonings: 2 tsp Italian seasoning, salt & pepper to taste\nCHICKEN AND VEGETABLES\n1 lb of chicken breasts\n1 small onion, diced\n1 garlic clove, minced\n1 cup mushrooms, sliced\n1 cup cherry tomatoes, halved\n3 cups spinach\n1 1/2 cups broth (chicken or vegetable)\nSeasonings: 1 1/4 tsp turmeric, 2 tsp paprika, 1 tsp garlic powder, 1\ntsp cumin, & salt & pepper to taste\n1 tbsp olive oil (for cooking)\nOptional: MASHED SWEET POTATOES\n2 large sweet potatoes, peeled and quartered\n2 garlic cloves, minced\n1 cup cottage cheese (2% or any type)\nSeasonings: 1/2 cup shredded parmesan\n1/2 tsp salt, & 1/4 tsp pepper","instructions":"1. Prepare the Sauce:\nIn a blender, combine 3/4 cup cottage cheese, 1/2 cup greek\nyogurt, 1 garlic clove, 2 tsp Italian seasoning, and salt &\npepper. Blend until smooth. Set aside.\n2. Start the Sweet Potatoes (optional):\nPeel and quarter the sweet potatoes. Bring a pot of water to\na boil (no need to salt it). Add the sweet potatoes and cook\nfor 15\u201320 minutes, until fork-tender. Drain and set aside, or\nsimply turn off the heat so they stay warm until blending.\n3. Season the Chicken:\nRub chicken breasts with 1 1/4 tsp turmeric, 2 tsp paprika, 1\ntsp garlic powder, 1 1/4 tsp cumin, plus salt & pepper.\n4. Cook the Chicken:\nHeat 1 tsp olive oil in a large pan over medium heat. Sear\nchicken breasts for 3\u20134 minutes per side until golden but not\nfully cooked through. Remove and set aside.\n5. Cook the Vegetables:\nIn the same pan, saut\u00e9 the onion and minced garlic for 2\u20133\nminutes. Add mushrooms and cherry tomatoes, cooking until\nsoftened. Stir in the spinach until wilted.\n6. Simmer with Chicken:\nReturn chicken to the pan. Pour in 1 1/2 cups broth. Cover and\nsimmer on low heat for 10 minutes, or until chicken is fully\ncooked.\n7. Add the Sauce:\nReduce heat to very low and let the pan cool slightly (to\nprevent curdling). Stir in the creamy cottage cheese\u2013yogurt\nsauce until smooth and combined. Keep heat gentle.\n8. Finish the Mashed Sweet Potatoes (Optional):\nIn a blender, combine the boiled sweet potatoes with 2 garlic\ncloves, 1 cup cottage cheese, 1/2 cup parmesan, 1/2 tsp salt,\nand 1/4 tsp pepper. Blend until completely smooth and creamy.\n9. Serve:\nPlate the optional blended sweet potatoes, then top with\nchicken and creamy vegetable sauce.\nCREAMY CHICKEN","notes":""},{"name":"Fiesta Bake","category":"Dinner","volume":2,"timing":"POST/RECOVERY","text":"FIESTA BAKE\nINSTRUCTIONS\n1. Preheat oven to 400\u00b0F (175\u00b0C).\n2. Cook the chicken, shred it, and set aside.\n3. Cut the sweet potatoes into cubes, slice the onion,\nmince the garlic, and cube the tomatoes.\n4. In a large bowl, combine shredded chicken, sweet\npotatoes, onion, garlic, corn, black beans, tomatoes,\nolive oil, fresh cilantro, and all spices. Mix until evenly\ncoated.\n5. Transfer mixture to a 9\u00d713-inch dish and spread\nevenly (you may have extra so get another pan or\nbigger dish).\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 3 2 g 1 7 g 2 3 g 3 9 0\n5 0 M I N S 6 S E R V I N G S\nBAKE\n1 lb chicken breast (shredded)\n1 large sweet potato, cubed\n1 onion sliced\n3 cloves garlic, minced\n2 medium tomatoes, diced (about 2 cups)\n1 1/2 cups corn (1 can, drained)\n1 1/2 cups black beans (1 can, drained & rinsed)\n1/4 cup fresh cilantro, chopped\n2 tbsp olive oil\n1/2 cup mozzarella cheese (for topping,\u22488oz)\nSeasonings: 1 tbsp smoked paprika, 1 tbsp chili\npowder, 2 tsp ground cumin, 2 tsp oregano, 2\ntsp salt, & 1 tsp black pepper\nOPTIONAL TOPPINGS\nMFBG Avocado Sauce\nor\nMFBG Adobo Sauce\nM F B G\n6. Bake for 30 minutes or until vegetables are fork\ntender.\n7. Make the MFBG Avocado or Adobo Sauce\n(recipes in sauce section) while it's baking in the oven.\n8. Pull the bake out of the oven and add mozzarella on\ntop and bake another 10 minutes, until melted.\n9. Remove bake from oven and garnish with fresh\ncilantro, avocado slices, lime juice, and drizzle with\nMFBG Adobo Sauce before serving.\nP O S T / R E C O V E R Y","ingredients":"BAKE\n1 lb chicken breast (shredded)\n1 large sweet potato, cubed\n1 onion sliced\n3 cloves garlic, minced\n2 medium tomatoes, diced (about 2 cups)\n1 1/2 cups corn (1 can, drained)\n1 1/2 cups black beans (1 can, drained & rinsed)\n1/4 cup fresh cilantro, chopped\n2 tbsp olive oil\n1/2 cup mozzarella cheese (for topping,\u22488oz)\nSeasonings: 1 tbsp smoked paprika, 1 tbsp chili\npowder, 2 tsp ground cumin, 2 tsp oregano, 2\ntsp salt, & 1 tsp black pepper\nOPTIONAL TOPPINGS\nAvocado Sauce\nor\nAdobo Sauce","instructions":"1. Preheat oven to 400\u00b0F (175\u00b0C).\n2. Cook the chicken, shred it, and set aside.\n3. Cut the sweet potatoes into cubes, slice the onion,\nmince the garlic, and cube the tomatoes.\n4. In a large bowl, combine shredded chicken, sweet\npotatoes, onion, garlic, corn, black beans, tomatoes,\nolive oil, fresh cilantro, and all spices. Mix until evenly\ncoated.\n5. Transfer mixture to a 9\u00d713-inch dish and spread\nevenly (you may have extra so get another pan or\nbigger dish).\n6. Bake for 30 minutes or until vegetables are fork\ntender.\n7. Make the  Avocado or Adobo Sauce\n(recipes in sauce section) while it's baking in the oven.\n8. Pull the bake out of the oven and add mozzarella on\ntop and bake another 10 minutes, until melted.\n9. Remove bake from oven and garnish with fresh\ncilantro, avocado slices, lime juice, and drizzle with\nAdobo Sauce before serving.","notes":""},{"name":"Harvest Salad","category":"Dinner","volume":2,"timing":"RECOVERY","text":"HARVEST SALAD\nINSTRUCTIONS\n1. Preheat oven to 400\u00b0F (200\u00b0C).\n2. Cook quinoa according to package instructions.\n3. Dice the sweet potato, halve the brussels sprouts,\nand slice the red onion. Spread on a baking sheet with\npumpkin seeds.\n4. Drizzle with olive oil, then season with paprika, onion\npowder, garlic powder, salt, and pepper. Toss to coat.\nRoast for 25\u201330 minutes, tossing halfway, until golden\nand tender.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 2 9 g 1 5 g 3 7 g 4 2 0\n4 5 M I N S 6 S E R V I N G S\nROASTED VEGGIES\n1 large sweet potato, diced\n2 cups brussels sprouts, halved\n1/2 red onion, sliced\n3 tbsp pumpkin seeds\n1 tbsp olive oil\nSeasonings: 2 tsp paprika, 2 tsp onion\npowder, 2 tsp garlic powder, 1 tsp\ncumin, 1/2 tsp salt, & 1/2 tsp pepper\nSALAD BASE\n1 lb shredded chicken\n1 cup quinoa\n1 cup kale, chopped\n1 apple, chopped\nMFBG TAHINI SAUCE\n1/4 cup apple cider vinegar\n1 1/2 tbsp honey\n1/4 cup tahini\n1/2 cup greek yogurt (nonfat)\n2 garlic cloves, minced\n1/4 tsp salt\nA few cracks of black pepper\nWater, as needed for thinning\nM F B G\n5. Make the sauce: in a bowl, whisk together apple cider\nvinegar, honey, tahini, greek yogurt, garlic, black pepper,\nand salt. Add water slowly until creamy and pourable.\n6. Assemble the salad: in a large bowl, combine roasted\nveggies, quinoa, kale, apple, and shredded chicken.\nDrizzle with MFBG Tahini Sauce, toss, and serve.\nP O S T / R E C O V E R Y","ingredients":"ROASTED VEGGIES\n1 large sweet potato, diced\n2 cups brussels sprouts, halved\n1/2 red onion, sliced\n3 tbsp pumpkin seeds\n1 tbsp olive oil\nSeasonings: 2 tsp paprika, 2 tsp onion\npowder, 2 tsp garlic powder, 1 tsp\ncumin, 1/2 tsp salt, & 1/2 tsp pepper\nSALAD BASE\n1 lb shredded chicken\n1 cup quinoa\n1 cup kale, chopped\n1 apple, chopped\nTAHINI SAUCE\n1/4 cup apple cider vinegar\n1 1/2 tbsp honey\n1/4 cup tahini\n1/2 cup greek yogurt (nonfat)\n2 garlic cloves, minced\n1/4 tsp salt\nA few cracks of black pepper\nWater, as needed for thinning","instructions":"1. Preheat oven to 400\u00b0F (200\u00b0C).\n2. Cook quinoa according to package instructions.\n3. Dice the sweet potato, halve the brussels sprouts,\nand slice the red onion. Spread on a baking sheet with\npumpkin seeds.\n4. Drizzle with olive oil, then season with paprika, onion\npowder, garlic powder, salt, and pepper. Toss to coat.\nRoast for 25\u201330 minutes, tossing halfway, until golden\nand tender.\n5. Make the sauce: in a bowl, whisk together apple cider\nvinegar, honey, tahini, greek yogurt, garlic, black pepper,\nand salt. Add water slowly until creamy and pourable.\n6. Assemble the salad: in a large bowl, combine roasted\nveggies, quinoa, kale, apple, and shredded chicken.\nDrizzle with  Tahini Sauce, toss, and serve.","notes":""},{"name":"Harvest Soup","category":"Dinner","volume":2,"timing":"RECOVERY","text":"HARVEST SOUP\nINSTRUCTIONS\n1. Prepare your shredded chicken to your liking\nand set aside.\n2. Cook the rice: Add black rice and salted water\nto a pot. Bring to a boil, cover, reduce to a simmer,\nand cook for about 40 minutes until tender.\n3. Saut\u00e9 the vegetables: While the rice cooks, heat\nolive oil in a large soup pot over medium-high heat.\nAdd carrots, squash, onion, and celery. Saut\u00e9 for\nabout 10 minutes, stirring often, until softened.\n4. Add seasonings: Stir in garlic, thyme, rosemary,\nsage, paprika, cayenne, salt, and pepper. Cook for\n2\u20133 minutes until fragrant.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 3 0 g 7 g 3 2 g 3 4 6\n5 0 M I N S 6 S E R V I N G S\n1 cup black rice\n1 lb chicken breast (\u22483 cups, shredded)\n2 cups carrots, peeled and sliced into rounds\n2 cups butternut squash, cubed\n1 onion, diced\n1 cup celery (about 2 stalks), chopped\n3 garlic cloves, minced\n2 cups mushrooms, chopped\n5 cups broth (chicken or vegetable)\n3 cups coconut milk (from the refrigerated\nsection)\n1 tbsp olive oil (for saut\u00e9ing)\nSEASONINGS\n1 tbsp fresh thyme (2\u20133 sprigs)\n1 tbsp fresh rosemary\n1 1/2 tsp dried sage\n2 tsp paprika\n1/4 tsp cayenne pepper\n1 tsp salt (adjust as you go)\n1/2 tsp black pepper\nM F B G\n5. Cook mushrooms: Add mushrooms and saut\u00e9\nanother 5 minutes until they release liquid and soften.\n6. Simmer the soup: Pour in broth, then add the\ncooked rice and shredded chicken. Bring to a simmer,\ncover, and cook for 30 minutes to let flavors combine.\n7. Finish with coconut milk: Stir in coconut milk,\nsimmer another 5 minutes, then taste and adjust\nseasonings.\n8. Serve: Ladle hot soup into bowls and enjoy\nimmediately.\nP O S T / R E C O V E R Y","ingredients":"1 cup black rice\n1 lb chicken breast (\u22483 cups, shredded)\n2 cups carrots, peeled and sliced into rounds\n2 cups butternut squash, cubed\n1 onion, diced\n1 cup celery (about 2 stalks), chopped\n3 garlic cloves, minced\n2 cups mushrooms, chopped\n5 cups broth (chicken or vegetable)\n3 cups coconut milk (from the refrigerated\nsection)\n1 tbsp olive oil (for saut\u00e9ing)\nSEASONINGS\n1 tbsp fresh thyme (2\u20133 sprigs)\n1 tbsp fresh rosemary\n1 1/2 tsp dried sage\n2 tsp paprika\n1/4 tsp cayenne pepper\n1 tsp salt (adjust as you go)\n1/2 tsp black pepper","instructions":"1. Prepare your shredded chicken to your liking\nand set aside.\n2. Cook the rice: Add black rice and salted water\nto a pot. Bring to a boil, cover, reduce to a simmer,\nand cook for about 40 minutes until tender.\n3. Saut\u00e9 the vegetables: While the rice cooks, heat\nolive oil in a large soup pot over medium-high heat.\nAdd carrots, squash, onion, and celery. Saut\u00e9 for\nabout 10 minutes, stirring often, until softened.\n4. Add seasonings: Stir in garlic, thyme, rosemary,\nsage, paprika, cayenne, salt, and pepper. Cook for\n2\u20133 minutes until fragrant.\n5. Cook mushrooms: Add mushrooms and saut\u00e9\nanother 5 minutes until they release liquid and soften.\n6. Simmer the soup: Pour in broth, then add the\ncooked rice and shredded chicken. Bring to a simmer,\ncover, and cook for 30 minutes to let flavors combine.\n7. Finish with coconut milk: Stir in coconut milk,\nsimmer another 5 minutes, then taste and adjust\nseasonings.\n8. Serve: Ladle hot soup into bowls and enjoy\nimmediately.","notes":""},{"name":"Pre-Race Pasta","category":"Dinner","volume":2,"timing":"PRE","text":"PRE-RACE PASTA\nINSTRUCTIONS\n1. Make the Sauce\nAdd tomatoes, garlic, basil, Italian seasoning, paprika, salt, and\npepper to a blender. Blend until smooth, then pour into a\nsaucepan. Bring to a light boil, reduce to a simmer, and cook\nfor about 20 minutes, stirring occasionally until thickened.\n2. Cook the Meat and Veggies\nWhile the sauce simmers, heat 2 tsp olive oil in a skillet over\nmedium heat. Cook the turkey with salt and pepper until\nbrowned, then remove and set aside. Add 1 tsp olive oil, saut\u00e9\nonion and mushrooms until soft, then add spinach until wilted.\nReturn the turkey, mix well, and remove from heat.\n3. Cool the Sauce\nOnce the sauce has thickened, remove it from heat and let it\ncool for 5\u201310 minutes so it doesn\u2019t curdle when you add the\ncottage cheese.\n4. Cook the Pasta\nBring a large pot of salted water to a boil. Cook the fresh\npasta according to package instructions.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 3 2 g 1 2 g 6 5 g 5 1 6\n4 5 M I N S 4 S E R V I N G S\nMEAT AND VEGGIE MIXTURE\n1/2 lb lean ground turkey\n1/2 yellow onion, diced\n1 cup mushrooms, sliced\n2 cups spinach\n3 tsp olive oil (divided)\n1 tsp salt, plus more to taste\n1 tsp pepper, plus more to taste\nTOMATO SAUCE\n5 tomatoes, quartered\n2 garlic cloves\n2 tbsp fresh basil (or 1 tbsp dried)\n1 tbsp Italian seasoning\n2 tsp paprika\n1 tsp salt, plus more to taste\n1 tsp pepper, plus more to taste\n1/2 cup cottage cheese (2%)\nPASTA\nFresh semolina pasta (340g or 3/4 lb)\nM F B G\n5. Reserve Pasta Water\nScoop out 1/2 cup of pasta water mid-cook to loosen the\nsauce later. Drain pasta once cooked.\n6. Blend and Combine\nBlend 1/2 cup cottage cheese with a few spoonfuls of cooled\nsauce until smooth, then stir it back into the pan until\ncreamy. If it curdles, just re-blend the sauce until smooth\nagain.\n7. Assemble\nAdd the sauce to the turkey and veggies, pour in a splash of\npasta water, and toss with the pasta until combined.\n8. Finish\nServe warm and season to taste.\nP O S T / R E C O V E R Y\nNOTES:\nThe number listed above reflects this recipe \u2014 not your\nindividual requirements.","ingredients":"MEAT AND VEGGIE MIXTURE\n1/2 lb lean ground turkey\n1/2 yellow onion, diced\n1 cup mushrooms, sliced\n2 cups spinach\n3 tsp olive oil (divided)\n1 tsp salt, plus more to taste\n1 tsp pepper, plus more to taste\nTOMATO SAUCE\n5 tomatoes, quartered\n2 garlic cloves\n2 tbsp fresh basil (or 1 tbsp dried)\n1 tbsp Italian seasoning\n2 tsp paprika\n1 tsp salt, plus more to taste\n1 tsp pepper, plus more to taste\n1/2 cup cottage cheese (2%)\nPASTA\nFresh semolina pasta (340g or 3/4 lb)","instructions":"-RACE PASTA\n1. Make the Sauce\nAdd tomatoes, garlic, basil, Italian seasoning, paprika, salt, and\npepper to a blender. Blend until smooth, then pour into a\nsaucepan. Bring to a light boil, reduce to a simmer, and cook\nfor about 20 minutes, stirring occasionally until thickened.\n2. Cook the Meat and Veggies\nWhile the sauce simmers, heat 2 tsp olive oil in a skillet over\nmedium heat. Cook the turkey with salt and pepper until\nbrowned, then remove and set aside. Add 1 tsp olive oil, saut\u00e9\nonion and mushrooms until soft, then add spinach until wilted.\nReturn the turkey, mix well, and remove from heat.\n3. Cool the Sauce\nOnce the sauce has thickened, remove it from heat and let it\ncool for 5\u201310 minutes so it doesn\u2019t curdle when you add the\ncottage cheese.\n4. Cook the Pasta\nBring a large pot of salted water to a boil. Cook the fresh\npasta according to package instructions.\n5. Reserve Pasta Water\nScoop out 1/2 cup of pasta water mid-cook to loosen the\nsauce later. Drain pasta once cooked.\n6. Blend and Combine\nBlend 1/2 cup cottage cheese with a few spoonfuls of cooled\nsauce until smooth, then stir it back into the pan until\ncreamy. If it curdles, just re-blend the sauce until smooth\nagain.\n7. Assemble\nAdd the sauce to the turkey and veggies, pour in a splash of\npasta water, and toss with the pasta until combined.\n8. Finish\nServe warm and season to taste.\nNOTES:\nThe number listed above reflects this recipe \u2014 not your\nindividual requirements.","notes":""},{"name":"Spaghetti & Meatballs","category":"Dinner","volume":2,"timing":"POST/RECOVERY","text":"P R O T E I N F A T C A R B S C A L O R I E S\n3 5 g 1 7 g 2 7 g 4 2 0\nSPAGHETTI & MEATBALLS\nINSTRUCTIONS\n1. Preheat oven to 350\u00b0F (175\u00b0C).\n2. Cut tomatoes, red peppers, garlic, and onion into\nquarters.\n3. Toss them with 1 tbsp olive oil until evenly coated.\n4. Cut spaghetti squash in half vertically, score the\ninside with a fork, and place face down on a\nparchment-lined baking sheet.\n5. Bake the squash and vegetables together for 30\u2013\n35 minutes or until tender.\n6. While they bake, prepare the meatballs:\n\u2022 Combine ground beef, paprika, italian seasoning,\nsalt, and pepper.\n\u2022 Form into \u224810 meatballs.\n\u2022 Heat a skillet over medium-high heat and sear\neach side for 2\u20133 minutes until browned. Set aside.\nINGREDIENTS\nP O S T / R E C O V E R Y 5 0 M I N S 4 S E R V I N G S\nBASE\n1 spaghetti squash (\u22486 cups)\n3 red peppers\n6 roma tomatoes\n1 yellow onion\n1 head garlic\n1/4 cup fresh basil\n1 tbsp olive oil\nMEATBALLS\n1 lb lean ground beef (90%)\n2 tbsp paprika\n1 tbsp italian seasoning\n1/2 tsp salt\n1/4 tsp black pepper\nOPTIONAL TOPPINGS\nParmesan, shredded\nExtra fresh basil\nM F B G\n7. Transfer roasted vegetables to a blender with\n1/4 cup fresh basil and blend until smooth (or use\nan immersion blender).\n8. Pour the sauce into a saucepan over medium\nheat and cook for 5\u20137 minutes to thicken.\n9. Once thickened, cut the heat.\n10. Fork out the spaghetti squash strands and add\nto the sauce. Mix until evenly coated.\n11. Add meatballs and toss gently to combine.\n12. Top with shredded parmesan and fresh basil to\nfinish.","ingredients":"BASE\n1 spaghetti squash (\u22486 cups)\n3 red peppers\n6 roma tomatoes\n1 yellow onion\n1 head garlic\n1/4 cup fresh basil\n1 tbsp olive oil\nMEATBALLS\n1 lb lean ground beef (90%)\n2 tbsp paprika\n1 tbsp italian seasoning\n1/2 tsp salt\n1/4 tsp black pepper\nOPTIONAL TOPPINGS\nParmesan, shredded\nExtra fresh basil","instructions":"3 5 g 1 7 g 2 7 g 4 2 0\n1. Preheat oven to 350\u00b0F (175\u00b0C).\n2. Cut tomatoes, red peppers, garlic, and onion into\nquarters.\n3. Toss them with 1 tbsp olive oil until evenly coated.\n4. Cut spaghetti squash in half vertically, score the\ninside with a fork, and place face down on a\nparchment-lined baking sheet.\n5. Bake the squash and vegetables together for 30\u2013\n35 minutes or until tender.\n6. While they bake, prepare the meatballs:\n\u2022 Combine ground beef, paprika, italian seasoning,\nsalt, and pepper.\n\u2022 Form into \u224810 meatballs.\n\u2022 Heat a skillet over medium-high heat and sear\neach side for 2\u20133 minutes until browned. Set aside.\n7. Transfer roasted vegetables to a blender with\n1/4 cup fresh basil and blend until smooth (or use\nan immersion blender).\n8. Pour the sauce into a saucepan over medium\nheat and cook for 5\u20137 minutes to thicken.\n9. Once thickened, cut the heat.\n10. Fork out the spaghetti squash strands and add\nto the sauce. Mix until evenly coated.\n11. Add meatballs and toss gently to combine.\n12. Top with shredded parmesan and fresh basil to\nfinish.","notes":""},{"name":"Squash Lasagna","category":"Dinner","volume":2,"timing":"POST/RECOVERY","text":"P R O T E I N F A T C A R B S C A L O R I E S 4 5 g 1 6 g 1 8 g 4 0 3\nSQUASH LASAGNA\nINSTRUCTIONS\n1. Preheat oven to 425\u00b0F (218\u00b0C).\n2. Slice butternut squash into thin circles (the thinner,\nthe faster it bakes).\n3. Make the cheese sauce: blend or mix cottage\ncheese, eggs, 3/4 cup parmesan, paprika, garlic\npowder, onion powder, salt, and pepper. Set aside.\n4. Cook the meat mixture: heat a pan over medium\nheat. Add diced onion, garlic, paprika, chili powder, salt,\npepper, and italian seasoning. Once softened, add\nmushrooms and cook 3\u20134 minutes until they release\nliquid and start to brown. Stir in tomato paste and mix\nwell. Add ground beef and cook until fully browned.\nINGREDIENTS\nP O S T / R E C O V E R Y 1 H R 1 5 M I N S 8 S E R V I N G S\nBASE\n1 butternut squash, sliced very thin (\u2248750 g)\nCHEESE SAUCE\n2 eggs\n2 cups cottage cheese (2%)\n3/4 cup parmesan, shredded\n1/4 tsp paprika\n1/4 tsp garlic powder\n1/4 tsp onion powder\nPinch of salt & pepper\nMEAT MIXTURE\n32 oz (2 lb) 93/7 lean ground beef\n1 yellow onion, diced\n1/2 cup tomato paste (6oz can)\n3 garlic cloves, minced\n2 cups mushrooms, sliced\n1\u20132 tsp paprika\n1/4 tsp chili powder\n1 tbsp italian seasoning\n1 tsp salt\n1/2 tsp pepper\nTOPPING\n1/4 cup grated parmesan\nM F B G\n5. Assemble: grease a 9\u00d713-inch glass pan with\navocado oil. Layer squash slices, cheese sauce, and\nmeat mixture. Repeat layers, finishing with cheese\nsauce, meat, and 1/4 cup parmesan on top.\n6. Bake: cover with foil and bake for 50 minutes, until\nsquash is tender and cooked through.\n7. Broil: remove foil and broil a few minutes to crisp\nthe top.\nNotes:\nThinner squash slices = faster bake.\nFor a smaller serving, cut recipe in half and use a 9\u00d79\npan.","ingredients":"BASE\n1 butternut squash, sliced very thin (\u2248750 g)\nCHEESE SAUCE\n2 eggs\n2 cups cottage cheese (2%)\n3/4 cup parmesan, shredded\n1/4 tsp paprika\n1/4 tsp garlic powder\n1/4 tsp onion powder\nPinch of salt & pepper\nMEAT MIXTURE\n32 oz (2 lb) 93/7 lean ground beef\n1 yellow onion, diced\n1/2 cup tomato paste (6oz can)\n3 garlic cloves, minced\n2 cups mushrooms, sliced\n1\u20132 tsp paprika\n1/4 tsp chili powder\n1 tbsp italian seasoning\n1 tsp salt\n1/2 tsp pepper\nTOPPING\n1/4 cup grated parmesan","instructions":"1. Preheat oven to 425\u00b0F (218\u00b0C).\n2. Slice butternut squash into thin circles (the thinner,\nthe faster it bakes).\n3. Make the cheese sauce: blend or mix cottage\ncheese, eggs, 3/4 cup parmesan, paprika, garlic\npowder, onion powder, salt, and pepper. Set aside.\n4. Cook the meat mixture: heat a pan over medium\nheat. Add diced onion, garlic, paprika, chili powder, salt,\npepper, and italian seasoning. Once softened, add\nmushrooms and cook 3\u20134 minutes until they release\nliquid and start to brown. Stir in tomato paste and mix\nwell. Add ground beef and cook until fully browned.\n5. Assemble: grease a 9\u00d713-inch glass pan with\navocado oil. Layer squash slices, cheese sauce, and\nmeat mixture. Repeat layers, finishing with cheese\nsauce, meat, and 1/4 cup parmesan on top.\n6. Bake: cover with foil and bake for 50 minutes, until\nsquash is tender and cooked through.\n7. Broil: remove foil and broil a few minutes to crisp\nthe top.","notes":"Thinner squash slices = faster bake.\nFor a smaller serving, cut recipe in half and use a 9\u00d79\npan."},{"name":"Stuffed Acorn Squash","category":"Dinner","volume":2,"timing":"RECOVERY","text":"INSTRUCTIONS\nSQUASH BASE\n2 acorn squash, halved and seeds removed\n1 tbsp honey\n1/2 tsp paprika\nSalt and pepper, to taste\nFILLING\n1 lb lean ground turkey (93%)\n1/2 onion, diced\n3 garlic cloves, minced\n2 cups mushrooms, finely diced\n1/4 cup walnuts (\u224825g), chopped\n1 cup kale, chopped\n1 tbsp fresh rosemary, chopped\n1 tbsp honey\n1 tbsp olive oil\nPinch of cayenne pepper (optional, for spice)\nSalt and pepper (to taste)\nTOPPINGS\n1/4 cup parmesan, shredded\n1 tbsp honey\nRed pepper flakes, to taste\nSTUFFED SQUASH\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 3 7 g 2 3 g 3 0 g 4 8 6 P O S T / R E C O V E R Y 5 5 M I N S 4 S E R V I N G S\nM F B G\n1. Preheat oven to 420\u00b0F (215\u00b0C). Cut the acorn squash in\nhalf, scoop out the seeds, and lightly score the flesh. Drizzle\nwith 2 tsp honey and season with paprika, salt, and pepper.\nRoast cut-side up for 35\u201340 minutes, until tender.\n2. While the squash roasts, heat 1 tbsp olive oil in a pan over\nmedium heat. Add diced onion and cook until softened. Stir in\ngarlic and cook until fragrant.\n3. Add the ground turkey or beef and cook until browned.\nAdd mushrooms and cook until tender.\n4. Mix in chopped walnuts, rosemary, 1 tbsp honey, and a\npinch of cayenne. Season with salt and pepper, then add\nchopped kale and cook until wilted.\n5. Remove roasted squash from the oven and fill each half\nwith the meat and mushroom mixture.\n6. Drizzle 1 tbsp honey over the stuffed squash, sprinkle\nwith red pepper flakes, and top with shredded parmesan.","ingredients":"2 acorn squash, halved and seeds removed\n1 tbsp honey\n1/2 tsp paprika\nSalt and pepper, to taste\n1 lb lean ground turkey (93%)\n1/2 onion, diced\n3 garlic cloves, minced\n2 cups mushrooms, finely diced\n1/4 cup walnuts (\u224825g), chopped\n1 cup kale, chopped\n1 tbsp fresh rosemary, chopped\n1 tbsp honey\n1 tbsp olive oil\nPinch of cayenne pepper (optional, for spice)\nSalt and pepper (to taste)\n1/4 cup parmesan, shredded\n1 tbsp honey\nRed pepper flakes, to taste\nSTUFFED SQUASH","instructions":"1. Preheat oven to 420\u00b0F (215\u00b0C). Cut the acorn squash in\nhalf, scoop out the seeds, and lightly score the flesh. Drizzle\nwith 2 tsp honey and season with paprika, salt, and pepper.\nRoast cut-side up for 35\u201340 minutes, until tender.\n2. While the squash roasts, heat 1 tbsp olive oil in a pan over\nmedium heat. Add diced onion and cook until softened. Stir in\ngarlic and cook until fragrant.\n3. Add the ground turkey or beef and cook until browned.\nAdd mushrooms and cook until tender.\n4. Mix in chopped walnuts, rosemary, 1 tbsp honey, and a\npinch of cayenne. Season with salt and pepper, then add\nchopped kale and cook until wilted.\n5. Remove roasted squash from the oven and fill each half\nwith the meat and mushroom mixture.\n6. Drizzle 1 tbsp honey over the stuffed squash, sprinkle\nwith red pepper flakes, and top with shredded parmesan.","notes":""},{"name":"Chicken Skillet","category":"Dinner","volume":2,"timing":"POST/RECOVERY","text":"P R O T E I N F A T C A R B S C A L O R I E S 3 7 g 1 4 g 8 g 3 5 3\nINSTRUCTIONS\n1. Season the chicken:\nIn a large bowl, coat chicken with paprika, salt, and\npepper.\n2. Sear:\nHeat a large skillet over medium-high. Add coconut\noil. Sear chicken 4\u20135 minutes per side until browned\nand cooked through. Remove to a plate.\n3. Deglaze with lime juice:\nLower heat to medium. Pour in lime juice and\nscrape up browned bits.\n4. Build flavor:\nAdd garlic, jalape\u00f1o, and ginger; saut\u00e9 1\u20132 minutes\nuntil fragrant.\nINGREDIENTS\nP O S T / R E C O V E R Y 1 H R 3 0 M I N S 5 S E R V I N G S\nCHICKEN\n2 lbs chicken breast tenders\n1 tbsp coconut oil\n2 tsp paprika\n1 1/2 tsp black pepper\n1 1/2 tsp salt\nSAUCE\n1/4 cup tomato paste\n3 tbsp soy sauce (or tamari, additive free)\n3/4 cup coconut milk (canned, unsweetened)\n3/4 cup greek yogurt (nonfat)\n1/3 cups lime juice\n2 tbsp ginger, shredded (grated)\n3 garlic cloves, minced\n1 jalape\u00f1o, finely chopped\nTOPPINGS\nGreen onion, finely chopped\nRed bell pepper, finely diced\nM F B G\n5. Add tomato paste:\nStir in and cook 1\u20132 minutes.\n6. Soy + coconut milk:\nCut the heat and add the soy sauce, stirring to\ncombine. As the sauce cools slightly, whisk\ntogether the coconut milk and greek yogurt in a\nseparate bowl. Slowly pour the coconut\u2013yogurt\nmixture into the pan, stirring continuously until\nsmooth and orange.\n7. Finish chicken:\nReturn the chicken into the pan, mixing it in\nwith the sauce until fully coated.\n8. Top + serve:\nGarnish with green onion and red bell pepper.\nServe with rice, quinoa, or veggies.\nTHAI LIME CHICKEN","ingredients":"CHICKEN\n2 lbs chicken breast tenders\n1 tbsp coconut oil\n2 tsp paprika\n1 1/2 tsp black pepper\n1 1/2 tsp salt\nSAUCE\n1/4 cup tomato paste\n3 tbsp soy sauce (or tamari, additive free)\n3/4 cup coconut milk (canned, unsweetened)\n3/4 cup greek yogurt (nonfat)\n1/3 cups lime juice\n2 tbsp ginger, shredded (grated)\n3 garlic cloves, minced\n1 jalape\u00f1o, finely chopped\nTOPPINGS\nGreen onion, finely chopped\nRed bell pepper, finely diced","instructions":"1. Season the chicken:\nIn a large bowl, coat chicken with paprika, salt, and\npepper.\n2. Sear:\nHeat a large skillet over medium-high. Add coconut\noil. Sear chicken 4\u20135 minutes per side until browned\nand cooked through. Remove to a plate.\n3. Deglaze with lime juice:\nLower heat to medium. Pour in lime juice and\nscrape up browned bits.\n4. Build flavor:\nAdd garlic, jalape\u00f1o, and ginger; saut\u00e9 1\u20132 minutes\nuntil fragrant.\n5. Add tomato paste:\nStir in and cook 1\u20132 minutes.\n6. Soy + coconut milk:\nCut the heat and add the soy sauce, stirring to\ncombine. As the sauce cools slightly, whisk\ntogether the coconut milk and greek yogurt in a\nseparate bowl. Slowly pour the coconut\u2013yogurt\nmixture into the pan, stirring continuously until\nsmooth and orange.\n7. Finish chicken:\nReturn the chicken into the pan, mixing it in\nwith the sauce until fully coated.\n8. Top + serve:\nGarnish with green onion and red bell pepper.\nServe with rice, quinoa, or veggies.\nTHAI LIME CHICKEN","notes":""},{"name":"Tomato Soup","category":"Dinner","volume":2,"timing":"RECOVERY","text":"TOMATO SOUP\nINSTRUCTIONS\n1. Prep: Dice the onion and tomatoes. Mince the\ngarlic.\n2. Saut\u00e9: Heat olive oil in a large pot over medium\nheat. Add onion and garlic, and cook until translucent\nand fragrant, about 3\u20134 minutes.\n3. Add tomatoes + spices: Add diced tomatoes,\noregano, basil, salt, pepper, paprika, and cayenne. Stir\nand cook until the tomatoes soften, about 5\u20137\nminutes.\n4. Simmer: Add the beans and broth, stir well, and let\nit simmer for about 20 minutes so the flavors\ncombine.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 2 1 g 5 g 2 1 g 2 2 8\n5 0 M I N S 5 S E R V I N G S\n12 roma tomatoes (\u22488 cups), diced\n1 yellow onion, diced\n6 cloves garlic, minced\n1 can white beans (Cannellini), drained and rinsed\n1 1/2 cups cottage cheese (2%)\n3 cups broth (chicken or vegetable)\n1 tbsp olive oil\nSEASONINGS\n2 tsp oregano\n2 tbsp fresh basil, chopped\n1 tsp salt\n1 tsp pepper\n2 tsp paprika\n1/4 tsp cayenne pepper (optional for spice)\nM F B G\n5. Blend until smooth: Turn off the heat. Transfer\nthe soup to a blender (or use an immersion\nblender) and blend until smooth.\n6. Add cottage cheese (without curdling):\nIn a blender, combine 1 cup of hot soup with all of\nthe cottage cheese and blend until completely\nsmooth. Let the main soup cool for about 5 minutes\noff heat, then slowly stir in the blended cottage\ncheese mixture. Do not boil again; if needed, warm\ngently over low heat.\nIf it separates slightly, re-blend gently \u2014 it\u2019ll return\nto a smooth texture.\n7. Serve: Ladle into bowls and top with fresh basil\nand cracked pepper.\nP O S T / R E C O V E R Y","ingredients":"12 roma tomatoes (\u22488 cups), diced\n1 yellow onion, diced\n6 cloves garlic, minced\n1 can white beans (Cannellini), drained and rinsed\n1 1/2 cups cottage cheese (2%)\n3 cups broth (chicken or vegetable)\n1 tbsp olive oil\nSEASONINGS\n2 tsp oregano\n2 tbsp fresh basil, chopped\n1 tsp salt\n1 tsp pepper\n2 tsp paprika\n1/4 tsp cayenne pepper (optional for spice)","instructions":"1. Prep: Dice the onion and tomatoes. Mince the\ngarlic.\n2. Saut\u00e9: Heat olive oil in a large pot over medium\nheat. Add onion and garlic, and cook until translucent\nand fragrant, about 3\u20134 minutes.\n3. Add tomatoes + spices: Add diced tomatoes,\noregano, basil, salt, pepper, paprika, and cayenne. Stir\nand cook until the tomatoes soften, about 5\u20137\nminutes.\n4. Simmer: Add the beans and broth, stir well, and let\nit simmer for about 20 minutes so the flavors\ncombine.\n5. Blend until smooth: Turn off the heat. Transfer\nthe soup to a blender (or use an immersion\nblender) and blend until smooth.\n6. Add cottage cheese (without curdling):\nIn a blender, combine 1 cup of hot soup with all of\nthe cottage cheese and blend until completely\nsmooth. Let the main soup cool for about 5 minutes\noff heat, then slowly stir in the blended cottage\ncheese mixture. Do not boil again; if needed, warm\ngently over low heat.\nIf it separates slightly, re-blend gently \u2014 it\u2019ll return\nto a smooth texture.\n7. Serve: Ladle into bowls and top with fresh basil\nand cracked pepper.","notes":""},{"name":"Veggie Wraps","category":"Dinner","volume":2,"timing":"POST","text":"VEGGIE WRAPS\nINSTRUCTIONS\n1. Preheat the oven to 350\u00b0F (175\u00b0C) and line a\nbaking sheet with parchment paper.\n2. In a large bowl, mix together the shredded\ncarrot, shredded zucchini, eggs, parmesan, and\nall seasonings until fully combined.\n3. Spread the mixture thinly, flatten evenly over\nthe parchment paper, and smooth out the\nsurface.\nINGREDIENTS\nP R O T E I N F A T C A R B S C A L O R I E S 1 9 g 1 5 g 1 4 g 2 8 2\n4 0 M I N S 1 S E R V I N G\n1 cup carrot, shredded\n1 cup zucchini, shredded\n2 eggs\n2 tbsp shredded parmesan\n1 tsp paprika\n1 tsp garlic powder\n1 tsp onion powder\n1/4 tsp salt\n1/4 tsp pepper\nOPTIONAL FILLINGS\nMFBG Beet Sauce (see sauce section)\nGrilled chicken\nSaut\u00e9ed mushrooms\nRed onion\nSpinach\nRed pepper\nM F B G\n4. Bake for 25\u201330 minutes, or until the wrap is\nfirm and lightly golden.\n5. Let cool, then fill it with whatever you like \u2014\ngrilled chicken, saut\u00e9ed mushrooms, red onion,\nspinach, red pepper, or the MFBG Beet Tahini\nSauce (located in the Sauce section).\nP O S T / R E C O V E R Y","ingredients":"1 cup carrot, shredded\n1 cup zucchini, shredded\n2 eggs\n2 tbsp shredded parmesan\n1 tsp paprika\n1 tsp garlic powder\n1 tsp onion powder\n1/4 tsp salt\n1/4 tsp pepper\nOPTIONAL FILLINGS\nBeet Sauce (see sauce section)\nGrilled chicken\nSaut\u00e9ed mushrooms\nRed onion\nSpinach\nRed pepper","instructions":"1. Preheat the oven to 350\u00b0F (175\u00b0C) and line a\nbaking sheet with parchment paper.\n2. In a large bowl, mix together the shredded\ncarrot, shredded zucchini, eggs, parmesan, and\nall seasonings until fully combined.\n3. Spread the mixture thinly, flatten evenly over\nthe parchment paper, and smooth out the\nsurface.\n4. Bake for 25\u201330 minutes, or until the wrap is\nfirm and lightly golden.\n5. Let cool, then fill it with whatever you like \u2014\ngrilled chicken, saut\u00e9ed mushrooms, red onion,\nspinach, red pepper, or the  Beet Tahini\nSauce (located in the Sauce section).","notes":""},{"name":"Beet Chicken Bowl","category":"Dinner","volume":2,"timing":"POST/RECOVERY","text":"APPLE PIE COOKIE DOUGH 37\nAPPLE CRISP 38\nBANANA BREAD 39\nBANANA PUDDING 40\nBAKED APPLES 41\nBERRY CRISP 42\nCARROT CAKE 43\nCARROT CAKE COOKIE DOUGH 44\nCARROT CAKE COOKIES 45\nENERGY BALLS 46\nMATCHA PUDDING 47\nPUMPKIN BREAD 48\nPUMPKIN CHEESECAKE 49\nPUMPKIN CHEESECAKE CUPS 50\nPUMPKIN PROTEIN BARS 51\nPUMPKIN PUDDING 52\nRECOVERY BALLS 53\nSTRAWBERRY PUD
