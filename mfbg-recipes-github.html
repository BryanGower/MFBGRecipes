<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFBG RECIPES</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Han+Sans&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f0e8;--red:#d42b2b;--orange:#e85d04;--yellow:#f9a825;--card:#111;--border:#252525;--muted:#555}
body{background:var(--black);color:var(--white);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:#2a2a2a}
.header{position:sticky;top:0;z-index:100;background:var(--black);border-bottom:1px solid var(--border);padding:0 24px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:20px;height:60px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--red);flex-shrink:0;cursor:pointer;user-select:none}
.logo span{color:var(--white)}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;background:#161616;border:1px solid var(--border);color:var(--white);font-family:'DM Mono',monospace;font-size:13px;padding:9px 16px 9px 36px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--red)}
.search-wrap input::placeholder{color:var(--muted)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.count-badge{font-size:11px;color:var(--muted);flex-shrink:0;white-space:nowrap}
.layout{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 60px)}
.sidebar{border-right:1px solid var(--border);padding:20px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
.s-section{margin-bottom:22px}
.s-label{font-size:9px;letter-spacing:3px;color:var(--muted);padding:0 18px;margin-bottom:6px;text-transform:uppercase;display:block}
.f-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 18px;background:none;border:none;color:rgba(245,240,232,0.5);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;text-align:left;transition:all .15s}
.f-btn:hover{color:var(--white);background:#161616}
.f-btn.on{color:var(--red);background:#1a0000}
.f-btn .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;margin-right:7px;opacity:0}
.f-btn.on .dot{opacity:1}
.fl{display:flex;align-items:center}
.fc{font-size:10px;color:var(--muted)}
.vol-row{display:flex;gap:4px;padding:0 18px;margin-bottom:4px}
.v-btn{flex:1;padding:6px 4px;background:#161616;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;text-align:center}
.v-btn:hover{color:var(--white)}
.v-btn.on{background:var(--red);border-color:var(--red);color:var(--white)}
.main{padding:24px}
.hero{background:linear-gradient(135deg,#1a0000 0%,#0a0a0a 55%,#001500 100%);border:1px solid var(--border);padding:36px 40px;margin-bottom:28px;position:relative;overflow:hidden}
.hero::after{content:'MFBG';position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:130px;color:rgba(212,43,43,0.05);line-height:1;pointer-events:none;letter-spacing:4px}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;line-height:1;margin-bottom:6px}
.hero h1 em{color:var(--red);font-style:normal}
.hero p{font-size:11px;color:var(--muted);letter-spacing:1px}
.stats{display:flex;gap:28px;margin-top:20px}
.sn{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--red);line-height:1}
.sl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.sec{margin-bottom:36px}
.cat-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.cat-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px}
.cat-line{flex:1;height:1px;background:var(--border)}
.cat-ct{font-size:10px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);padding:18px;cursor:pointer;transition:all .15s;position:relative}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .15s}
.card:hover{border-color:#333;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.card:hover::before{background:var(--red)}
.c-vol{font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:5px}
.c-name{font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:0.5px;line-height:1.25;margin-bottom:10px;color:var(--white)}
.c-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:9px;letter-spacing:1px;padding:2px 6px;border:1px solid;text-transform:uppercase}
.tag.pre{border-color:var(--yellow);color:var(--yellow)}
.tag.post{border-color:var(--orange);color:var(--orange)}
.tag.rec{border-color:#52b788;color:#52b788}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px)}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#111;border:1px solid #2a2a2a;max-width:700px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s}
.overlay.open .modal{transform:translateY(0)}
.m-hdr{padding:26px 30px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#111;z-index:1}
.m-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.m-vol{font-size:9px;letter-spacing:2px;padding:2px 8px;background:var(--red);color:white}
.m-cat{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.m-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;line-height:1;color:var(--white);margin-bottom:10px}
.m-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.m-nutrition{display:flex;gap:16px;margin-top:10px}
.m-nutr-item{text-align:center}
.m-nutr-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--red);line-height:1}
.m-nutr-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.m-close{position:absolute;top:18px;right:18px;background:none;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.m-close:hover{border-color:var(--red);color:var(--red)}
.m-body{padding:0 30px 30px}
.m-section{margin-top:22px}
.m-section-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--red);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ing-list{list-style:none;font-size:12px;line-height:1.9;color:#ccc}
.ing-list li{padding:2px 0;border-bottom:1px solid #1a1a1a}
.ing-list li:last-child{border-bottom:none}
.ing-section-hdr{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--orange);margin-top:10px;margin-bottom:4px;border-bottom:none!important}
.inst-text{font-size:12px;line-height:1.85;color:#bbb;white-space:pre-wrap;font-family:'DM Mono',monospace}
.notes-box{background:#0d0d0d;border-left:2px solid var(--yellow);padding:10px 14px;margin-top:12px;font-size:11px;color:#999;line-height:1.7}
.m-time-row{display:flex;gap:14px;margin-top:8px;font-size:10px;color:var(--muted);letter-spacing:1px}
.nores{text-align:center;padding:80px 20px;color:var(--muted)}
.nores-t{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;margin-bottom:8px;color:#222}
.loading{text-align:center;padding:80px 20px;color:var(--muted)}
.loading-t{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;margin-bottom:8px;color:#333;animation:pulse 1.5s ease-in-out infinite}
.load-err{text-align:center;padding:60px 20px}
.load-err-t{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--red);margin-bottom:8px}
.load-err p{font-size:11px;color:var(--muted);line-height:1.7;margin-top:8px}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
@media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border)}.hero{padding:24px}.hero h1{font-size:34px}.hero::after{font-size:70px}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo" id="logoBtn">MFBG<span> RECIPES</span></div>
    <div class="search-wrap">
      <span class="si">&#x2315;</span>
      <input type="text" id="searchInput" placeholder="Search recipes..." autocomplete="off" spellcheck="false">
    </div>
    <div class="count-badge" id="countBadge">Loading...</div>
  </div>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="s-section">
      <span class="s-label">Volume</span>
      <div class="vol-row">
        <button class="v-btn on" id="vbtn-all">ALL</button>
        <button class="v-btn" id="vbtn-1">VOL.1</button>
        <button class="v-btn" id="vbtn-2">VOL.2</button>
      </div>
    </div>
    <div class="s-section">
      <span class="s-label">Category</span>
      <button class="f-btn on" id="cbtn-all"><span class="fl"><span class="dot"></span>All</span><span class="fc" id="cct-all">—</span></button>
      <button class="f-btn" id="cbtn-Breakfast"><span class="fl"><span class="dot"></span>Breakfast</span><span class="fc" id="cct-Breakfast">—</span></button>
      <button class="f-btn" id="cbtn-Dinner"><span class="fl"><span class="dot"></span>Dinner</span><span class="fc" id="cct-Dinner">—</span></button>
      <button class="f-btn" id="cbtn-Dessert"><span class="fl"><span class="dot"></span>Dessert</span><span class="fc" id="cct-Dessert">—</span></button>
      <button class="f-btn" id="cbtn-Snacks"><span class="fl"><span class="dot"></span>Snacks &amp; Sides</span><span class="fc" id="cct-Snacks">—</span></button>
      <button class="f-btn" id="cbtn-Sauces"><span class="fl"><span class="dot"></span>Sauces</span><span class="fc" id="cct-Sauces">—</span></button>
    </div>
    <div class="s-section">
      <span class="s-label">When to Eat</span>
      <button class="f-btn on" id="tbtn-all"><span class="fl"><span class="dot"></span>Any Time</span></button>
      <button class="f-btn" id="tbtn-PRE"><span class="fl"><span class="dot"></span>Pre-Workout</span></button>
      <button class="f-btn" id="tbtn-POST"><span class="fl"><span class="dot"></span>Post-Workout</span></button>
      <button class="f-btn" id="tbtn-REC"><span class="fl"><span class="dot"></span>Recovery</span></button>
    </div>
  </aside>
  <main class="main">
    <div class="hero">
      <h1>MADE WITH<br><em>REAL FOOD.</em></h1>
      <p id="heroSub">LOADING RECIPES...</p>
      <div class="stats" id="heroStats" style="visibility:hidden">
        <div><div class="sn" id="statVol1">—</div><div class="sl">Vol. 1</div></div>
        <div><div class="sn" id="statVol2">—</div><div class="sl">Vol. 2</div></div>
        <div><div class="sn">5</div><div class="sl">Categories</div></div>
      </div>
    </div>
    <div id="content">
      <div class="loading"><div class="loading-t">LOADING RECIPES</div><p style="font-size:11px;color:var(--muted)">Fetching from GitHub...</p></div>
    </div>
  </main>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="m-hdr">
      <button class="m-close" id="mClose">&#x2715;</button>
      <div class="m-meta"><span class="m-vol" id="mVol"></span><span class="m-cat" id="mCat"></span></div>
      <div class="m-title" id="mTitle"></div>
      <div class="m-tags" id="mTags"></div>
      <div class="m-nutrition" id="mNutrition"></div>
      <div class="m-time-row" id="mTimeRow"></div>
    </div>
    <div class="m-body">
      <div class="m-section">
        <div class="m-section-title">Ingredients</div>
        <ul class="ing-list" id="mIngredients"></ul>
      </div>
      <div class="m-section" id="mInstructionsSection">
        <div class="m-section-title">Instructions</div>
        <div class="inst-text" id="mInstructions"></div>
      </div>
      <div class="m-section" id="mNotesWrap" style="display:none">
        <div class="m-section-title">Notes</div>
        <div class="notes-box" id="mNotes"></div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  var GITHUB_USER   = 'BryanGower';
  var GITHUB_REPO   = 'MFBGRecipes';
  var GITHUB_BRANCH = 'main';
  var MANIFEST_PATH = 'manifest.json';
  var RAW_BASE = 'https://raw.githubusercontent.com/'+GITHUB_USER+'/'+GITHUB_REPO+'/'+GITHUB_BRANCH+'/';

  var RECIPES=[], CACHE={};
  var CATS=['Breakfast','Dinner','Dessert','Snacks & Sides','Sauces'];
  var st={vol:'all',cat:'all',timing:'all',q:''};

  function parseFrontmatter(text){
    var fm={}, body=text;
    var m=text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
    if(m){
      body=m[2];
      m[1].split('\n').forEach(function(l){
        var kv=l.match(/^(\w+):\s*"?([^"]*)"?\s*$/);
        if(kv) fm[kv[1].trim()]=kv[2].trim();
      });
    }
    return{fm:fm,body:body};
  }

  function parseBody(body){
    var ingredients='',instructions='',notes='',current=null,buf=[];
    function flush(){
      if(current==='ingredients') ingredients=buf.join('\n').trim();
      else if(current==='instructions') instructions=buf.join('\n').trim();
      else if(current==='notes') notes=buf.join('\n').trim();
      buf=[];
    }
    body.split('\n').forEach(function(line){
      var h2=line.match(/^## (.+)/);
      if(h2){flush();var s=h2[1].toLowerCase().trim();current=s==='ingredients'?'ingredients':s==='instructions'?'instructions':s==='notes'?'notes':null;return;}
      if(current) buf.push(line);
    });
    flush();
    return{ingredients:ingredients,instructions:instructions,notes:notes};
  }

  function renderIngredients(text){
    var html='';
    text.split('\n').forEach(function(line){
      line=line.trim();if(!line) return;
      var h3=line.match(/^### (.+)/);
      if(h3){html+='<li class="ing-section-hdr">'+h3[1]+'</li>';return;}
      line=line.replace(/^[-*]\s+/,'');
      if(line) html+='<li>'+line+'</li>';
    });
    return html;
  }

  function tags(t){
    if(!t) return '';
    var map={PRE:'pre',POST:'post',RECOVERY:'rec'};
    var lbl={PRE:'Pre-Workout',POST:'Post-Workout',RECOVERY:'Recovery'};
    return t.split('/').map(function(x){return'<span class="tag '+(map[x]||'")>'+(lbl[x]||x)+'</span>';}).join('');
  }

  // Fix tag rendering
  function renderTags(t){
    if(!t) return '';
    var map={PRE:'pre',POST:'post',RECOVERY:'rec'};
    var lbl={PRE:'Pre-Workout',POST:'Post-Workout',RECOVERY:'Recovery'};
    return t.split('/').map(function(x){
      x=x.trim();
      return '<span class="tag '+(map[x]||'')+'">'+(lbl[x]||x)+'</span>';
    }).join('');
  }

  function hasTiming(r,t){
    if(t==='all') return true;
    return r.timing&&r.timing.indexOf(t)!==-1;
  }
 
  function fetchRecipe(entry){
    if(CACHE[entry.path]) return Promise.resolve(CACHE[entry.path]);
    return fetch(RAW_BASE+entry.path).then(function(res){
      if(!res.ok) throw new Error('HTTP '+res.status);
      return res.text();
    }).then(function(text){
      var p=parseFrontmatter(text);
      var b=parseBody(p.body);
      var r=Object.assign({},p.fm,b,{
        name:p.fm.name||entry.name,
        category:p.fm.category||entry.category,
        volume:parseInt(p.fm.volume)||entry.volume,
        timing:p.fm.timing||entry.timing||'',
        _path:entry.path
      });
      CACHE[entry.path]=r;
      return r;
    });
  }

  function loadAll(){
    fetch(RAW_BASE+MANIFEST_PATH)
      .then(function(res){
        if(!res.ok) throw new Error('Could not load manifest.json (HTTP '+res.status+')');
        return res.json();
      })
      .then(function(manifest){
        return Promise.all(manifest.map(function(e){
          return fetchRecipe(e).catch(function(err){console.warn('Failed:',e.path,err);return null;});
        }));
      })
      .then(function(recipes){
        RECIPES=recipes.filter(Boolean);
        onLoaded();
      })
      .catch(function(err){ showError(err.message); });
  }

  function onLoaded(){
    var v1=RECIPES.filter(function(r){return r.volume===1;}).length;
    var v2=RECIPES.filter(function(r){return r.volume===2;}).length;
    document.getElementById('statVol1').textContent=v1;
    document.getElementById('statVol2').textContent=v2;
    document.getElementById('heroSub').textContent=RECIPES.length+' RECIPES \u00b7 2 VOLUMES';
    document.getElementById('heroStats').style.visibility='visible';
    document.getElementById('searchInput').placeholder='Search '+RECIPES.length+' recipes...';
    updateCounts();
    render();
  }

  function showError(msg){
    document.getElementById('countBadge').textContent='Error';
    document.getElementById('content').innerHTML=
      '<div class="load-err"><div class="load-err-t">Could Not Load Recipes</div>'+
      '<p>'+msg+'</p>'+
      '<p>Make sure <strong>manifest.json</strong> is in the root of your repo and the repo is <strong>public</strong>.</p>'+
      '<p>Expected URL:<br><code style="color:var(--yellow)">'+RAW_BASE+MANIFEST_PATH+'</code></p></div>';
  }

  function getFiltered(){
    var q=st.q.toLowerCase();
    return RECIPES.filter(function(r){
      if(st.vol!=='all'&&r.volume!==st.vol) return false;
      if(st.cat!=='all'&&r.category!==st.cat) return false;
      if(!hasTiming(r,st.timing)) return false;
      if(q){var h=(r.name+' '+(r.ingredients||'')+' '+(r.instructions||'')).toLowerCase();if(h.indexOf(q)===-1) return false;}
      return true;
    });
  }

  function updateCounts(){
    var m={'all':RECIPES.length,'Breakfast':0,'Dinner':0,'Dessert':0,'Snacks & Sides':0,'Sauces':0};
    RECIPES.forEach(function(r){if(m[r.category]!==undefined) m[r.category]++;});
    document.getElementById('cct-all').textContent=m['all'];
    document.getElementById('cct-Breakfast').textContent=m['Breakfast'];
    document.getElementById('cct-Dinner').textContent=m['Dinner'];
    document.getElementById('cct-Dessert').textContent=m['Dessert'];
    document.getElementById('cct-Snacks').textContent=m['Snacks & Sides'];
    document.getElementById('cct-Sauces').textContent=m['Sauces'];
  }

  function render(){
    var f=getFiltered();
    document.getElementById('countBadge').textContent=f.length+' recipe'+(f.length!==1?'s':'');
    var el=document.getElementById('content');
    if(!f.length){el.innerHTML='<div class="nores"><div class="nores-t">NO RECIPES FOUND</div><p>Adjust your filters or search</p></div>';return;}
    var cats=st.cat==='all'?CATS:[st.cat];
    var html='';
    cats.forEach(function(cat){
      var list=f.filter(function(r){return r.category===cat;});
      if(!list.length) return;
      html+='<div class="sec"><div class="cat-hdr"><div class="cat-title">'+cat.toUpperCase()+'</div><div class="cat-line"></div><div class="cat-ct">'+list.length+'</div></div><div class="grid">';
      list.forEach(function(r){
        var idx=RECIPES.indexOf(r);
        html+='<div class="card" data-idx="'+idx+'"><div class="c-vol">VOL. '+r.volume+'</div><div class="c-name">'+r.name+'</div><div class="c-tags">'+renderTags(r.timing)+'</div></div>';
      });
      html+='</div></div>';
    });
    el.innerHTML=html;
    el.querySelectorAll('.card').forEach(function(c){
      c.addEventListener('click',function(){openModal(parseInt(c.dataset.idx));});
    });
  }

  function openModal(idx){
    var r=RECIPES[idx];
    document.getElementById('mVol').textContent='VOL. '+r.volume;
    document.getElementById('mCat').textContent=r.category;
    document.getElementById('mTitle').textContent=r.name;
    document.getElementById('mTags').innerHTML=renderTags(r.timing);

    var ne=document.getElementById('mNutrition');
    if(r.protein||r.calories){
      var items=[{val:r.protein,lbl:'Protein'},{val:r.fat,lbl:'Fat'},{val:r.carbs,lbl:'Carbs'},{val:r.calories,lbl:'Cal'}];
      ne.innerHTML=items.filter(function(i){return i.val;}).map(function(i){
        return'<div class="m-nutr-item"><div class="m-nutr-val">'+i.val+'</div><div class="m-nutr-lbl">'+i.lbl+'</div></div>';
      }).join('');
      ne.style.display='flex';
    } else {ne.style.display='none';}

    var te=document.getElementById('mTimeRow'),th='';
    if(r.time) th+='<span>&#9201; '+r.time+'</span>';
    if(r.servings) th+='<span>&#127859; '+r.servings+' servings</span>';
    te.innerHTML=th;te.style.display=th?'flex':'none';

    document.getElementById('mIngredients').innerHTML=renderIngredients(r.ingredients||'');
    document.getElementById('mInstructions').textContent=(r.instructions||'').trim();
    var nw=document.getElementById('mNotesWrap');
    if(r.notes&&r.notes.trim()){document.getElementById('mNotes').textContent=r.notes.trim();nw.style.display='block';}
    else{nw.style.display='none';}

    document.getElementById('overlay').classList.add('open');
    document.querySelector('.modal').scrollTop=0;
    document.body.style.overflow='hidden';
  }

  function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}

  function setActive(prefix,ids,val){ids.forEach(function(x){var b=document.getElementById(prefix+x);if(b) b.classList.toggle('on',x===val);});}

  var catIds=['all','Breakfast','Dinner','Dessert','Snacks','Sauces'];
  var catVals=['all','Breakfast','Dinner','Dessert','Snacks & Sides','Sauces'];
  var timIds=['all','PRE','POST','REC'];
  var timVals=['all','PRE','POST','RECOVERY'];

  document.getElementById('vbtn-all').onclick=function(){st.vol='all';setActive('vbtn-',['all','1','2'],'all');render();};
  document.getElementById('vbtn-1').onclick=function(){st.vol=1;setActive('vbtn-',['all','1','2'],'1');render();};
  document.getElementById('vbtn-2').onclick=function(){st.vol=2;setActive('vbtn-',['all','1','2'],'2');render();};
  catIds.forEach(function(id,i){var b=document.getElementById('cbtn-'+id);if(b) b.onclick=function(){st.cat=catVals[i];setActive('cbtn-',catIds,id);render();};});
  timIds.forEach(function(id,i){var b=document.getElementById('tbtn-'+id);if(b) b.onclick=function(){st.timing=timVals[i];setActive('tbtn-',timIds,id);render();};});
  document.getElementById('searchInput').oninput=function(){st.q=this.value;render();};
  document.getElementById('logoBtn').onclick=function(){
    st={vol:'all',cat:'all',timing:'all',q:''};
    document.getElementById('searchInput').value='';
    setActive('vbtn-',['all','1','2'],'all');
    setActive('cbtn-',catIds,'all');
    setActive('tbtn-',timIds,'all');
    render();
  };
  document.getElementById('mClose').onclick=closeModal;
  document.getElementById('overlay').onclick=function(e){if(e.target===this) closeModal();};
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape') closeModal();
    if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('searchInput').focus();}
  });

  loadAll();
})();
</script>
</body>
</html>
